# Redocly lint config for the CONSOLIDATED spec (postman/specs/midaz.openapi.yaml).
#
# Baseline is the built-in `recommended` ruleset. The consolidated_lint_check()
# gate in check-docs.sh runs `redocly lint` against this config so that a NEW
# problem introduced by the `redocly join` merge (a broken $ref, a dropped
# security scheme, a structurally invalid document) still fails the gate.
#
# The rules relaxed below are NOT silenced blanket-style. Each is relaxed because
# the finding is either (a) inherited unchanged from the per-component source
# specs (which swag generates and we do not hand-edit), or (b) a structural
# artifact of the join itself that is intentional by design. None of them are
# caused by, or maskable at, the merge step.

extends:
  - recommended

rules:
  # (b) JOIN ARTIFACT — intentional. `redocly join` relocates the three components'
  # differing servers (ledger :3002, tracer :4020, reporter :4005) into per-path
  # `servers` blocks and leaves the root `servers` empty. That per-path relocation
  # is the whole reason we use join; an empty root `servers` is the expected shape.
  no-empty-servers: off

  # (a) INHERITED — the component source servers carry a trailing slash
  # (http://localhost:PORT/). swag/openapi-generator emit it; we do not hand-edit
  # the per-component specs. The join multiplies the 6 source occurrences across
  # every path's relocated `servers` block, but the root cause lives upstream.
  no-server-trailing-slash: off

  # (a) INHERITED — list-endpoint example payloads in the component specs do not
  # always validate against their declared schema (swag-generated examples).
  # 391 occurrences, all present 1:1 in the per-component specs.
  no-invalid-schema-examples: off

  # (a) INHERITED — tracer's /health, /readyz and /version are intentionally
  # public (documented in check-docs.sh security_coverage_check). They legitimately
  # carry no `security` block, which this rule flags. Ledger operation security is
  # still enforced separately by security_coverage_check against the source spec.
  security-defined: off

  # (a) INHERITED — a handful of tracer operations declare no 4xx response.
  # Present in the tracer source spec; the merge adds none.
  operation-4xx-response: off

  # (a) INHERITED — ledger declares balances/operations sub-paths that the rule
  # considers ambiguous against their parent collection paths. Present in the
  # ledger source spec.
  no-ambiguous-paths: off

  # (a) INHERITED — the ledger source spec carries a component schema that no
  # operation references. Present pre-merge.
  no-unused-components: off

  # (a) INHERITED — the component source servers point at localhost:PORT (the
  # local dev hosts). swag/openapi-generator emit them; we do not hand-edit the
  # per-component specs. Same source-server data the trailing-slash rule flags;
  # the join relocates it per-path, multiplying the occurrences.
  no-server-example.com: off
