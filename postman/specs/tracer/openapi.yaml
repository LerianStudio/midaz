components:
  schemas:
    AccountContext:
      example:
        accountId: 00000000-0000-0000-0000-000000000000
        metadata:
          key: "{}"
        type: checking
        status: active
      properties:
        accountId:
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        metadata:
          additionalProperties:
            type: object
          type: object
        status:
          example: active
          type: string
        type:
          example: checking
          type: string
      type: object
    Actor:
      properties:
        actorType:
          enum:
          - user
          - api_key
          - system
          example: user
          type: string
        id:
          example: 00000000-0000-0000-0000-000000000000
          type: string
        ipAddress:
          example: 203.0.113.42
          type: string
        name:
          example: Jane Doe
          type: string
        role:
          example: admin
          type: string
      type: object
    AuditEvent:
      description: "Immutable audit record for SOX/GLBA compliance. Each event captures\
        \ who performed what action on which resource, the outcome, and a full context\
        \ snapshot. Events are hash-chained to detect tampering; the hash covers all\
        \ core fields."
      example:
        actor: "{}"
        result: ALLOW
        createdAt: 2021-01-01T00:00:00Z
        eventId: 00000000-0000-0000-0000-000000000000
        metadata:
          key: "{}"
        resourceId: 00000000-0000-0000-0000-000000000000
        previousHash: b4e2f3a5c6d7e8f9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3
        context:
          key: "{}"
        action: VALIDATE
        eventType: TRANSACTION_VALIDATED
        hash: a3f1e2b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2
        resourceType: transaction
      properties:
        action:
          description: |-
            Action performed
            example: VALIDATE
            enums: VALIDATE,CREATE,UPDATE,DELETE,ACTIVATE,DEACTIVATE,DRAFT,RESERVE,CONFIRM,RELEASE,EXPIRE,SKIP
          enum:
          - VALIDATE
          - CREATE
          - UPDATE
          - DELETE
          - ACTIVATE
          - DEACTIVATE
          - DRAFT
          - RESERVE
          - CONFIRM
          - RELEASE
          - EXPIRE
          - SKIP
          example: VALIDATE
          type: string
        actor:
          allOf:
          - $ref: '#/components/schemas/Actor'
          description: Actor who performed the action
          type: object
        context:
          additionalProperties:
            type: object
          description: |-
            Context (JSONB): for validations: { request: {...}, response: {reason, processingTimeMs, matchedRuleIds, ...} }; for CRUD: { before: {...}, after: {...}, reason: "..." }
            Note: accountId, segmentId, portfolioId are in context.request.account (not first-level fields)
          type: object
        createdAt:
          description: |-
            Timestamp when the event occurred
            format: date-time
          example: 2021-01-01T00:00:00Z
          format: date-time
          type: string
        eventId:
          description: |-
            Unique identifier for this audit event
            format: uuid
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        eventType:
          description: |-
            Type of event that occurred
            example: TRANSACTION_VALIDATED
