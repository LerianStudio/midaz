openapi: 3.0.1
info:
  contact: {}
  description: Transaction validation service with rules and limits
  termsOfService: http://swagger.io/terms/
  title: Tracer API
  version: 4.0.0
servers:
- url: http://localhost:4020/
- url: https://localhost:4020/
paths:
  /health:
    get:
      description: Returns 503 until startup self-probe completes; 200 "healthy" thereafter.
      operationId: getHealth
      responses:
        "200":
          content:
            text/plain:
              schema:
                type: string
          description: healthy
        "503":
          content:
            text/plain:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: self-probe has not completed
      summary: Health check (liveness probe)
      tags:
      - health
  /readyz:
    get:
      description: Live dependency probes — never cached. Returns 200 only when every
        check is up/skipped/n/a; any down or degraded forces 503.
      operationId: getReadyz
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ReadyzResponse'
          description: Service is ready
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ReadyzResponse'
          description: Service is not ready
      summary: Readiness check (Lerian canonical contract)
      tags:
      - health
  /v1/audit-events:
    get:
      description: Lists audit events with filters and cursor-based pagination. SOX/GLBA
        compliance endpoint.
      operationId: listAuditEvents
      parameters:
      - description: Start date (RFC3339 format)
        in: query
        name: start_date
        schema:
          format: date-time
          type: string
      - description: End date (RFC3339 format)
        in: query
        name: end_date
        schema:
          format: date-time
          type: string
      - description: Filter by event type
        in: query
        name: event_type
        schema:
          enum:
          - TRANSACTION_VALIDATED
          - RULE_CREATED
          - RULE_UPDATED
          - RULE_ACTIVATED
          - RULE_DEACTIVATED
          - RULE_DRAFTED
          - RULE_DELETED
          - LIMIT_CREATED
          - LIMIT_UPDATED
          - LIMIT_ACTIVATED
          - LIMIT_DEACTIVATED
          - LIMIT_DRAFTED
          - LIMIT_DELETED
          type: string
      - description: Filter by action
        in: query
        name: action
        schema:
          enum:
          - VALIDATE
          - CREATE
          - UPDATE
          - DELETE
          - ACTIVATE
          - DEACTIVATE
          - DRAFT
          type: string
      - description: Filter by result
        in: query
        name: result
        schema:
          enum:
          - SUCCESS
          - FAILED
          - ALLOW
          - DENY
          - REVIEW
          type: string
      - description: Filter by resource type
        in: query
        name: resource_type
        schema:
          enum:
          - transaction
          - rule
          - limit
          type: string
      - description: Filter by resource ID
        in: query
        name: resource_id
        schema:
          type: string
      - description: Filter by actor type
        in: query
        name: actor_type
        schema:
          enum:
          - user
          - system
          type: string
      - description: Filter by actor ID
        in: query
        name: actor_id
        schema:
          type: string
      - description: Filter by account ID (UUID)
        in: query
        name: account_id
        schema:
          format: uuid
          type: string
      - description: Filter by segment ID (UUID)
        in: query
        name: segment_id
        schema:
          format: uuid
          type: string
      - description: Filter by portfolio ID (UUID)
        in: query
        name: portfolio_id
        schema:
          format: uuid
          type: string
      - description: Filter by transaction type
        in: query
        name: transaction_type
        schema:
          enum:
          - CARD
          - WIRE
          - PIX
          - CRYPTO
          type: string
      - description: Filter by matched rule ID (UUID)
        in: query
        name: matched_rule_id
        schema:
          format: uuid
          type: string
      - description: "Max items per page (1-1000, default: 100)"
        in: query
        name: limit
        schema:
          maximum: 1000
          minimum: 1
          type: integer
      - description: Pagination token (empty for first page)
        in: query
        name: cursor
        schema:
          type: string
      - description: Sort field
        in: query
        name: sort_by
        schema:
          enum:
          - created_at
          - event_type
          type: string
      - description: Sort direction
        in: query
        name: sort_order
        schema:
          enum:
          - ASC
          - DESC
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in.ListAuditEventsResponse'
          description: Audit events listed successfully
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Invalid parameters
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: List audit events
      tags:
      - audit
  /v1/audit-events/{id}:
    get:
      description: Retrieves a single audit event by its unique identifier. SOX/GLBA
        compliance endpoint.
      operationId: getAuditEvent
      parameters:
      - description: Event ID (UUID)
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_midaz_v4_components_tracer_pkg_model.AuditEvent'
          description: Audit event retrieved successfully
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Invalid event ID
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Audit event not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: Get an audit event by ID
      tags:
      - audit
  /v1/audit-events/{id}/verify:
    get:
      description: Verifies the integrity of the audit event hash chain up to a specific
        event. Detects tampering attempts. SOX/GLBA compliance endpoint.
      operationId: verifyAuditEvent
      parameters:
      - description: Event ID to verify up to (UUID)
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_midaz_v4_components_tracer_pkg_model.HashChainVerificationResult'
          description: Hash chain verification completed
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Invalid event ID
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Event not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: Verify audit event hash chain integrity
      tags:
      - audit
  /v1/limits:
    get:
      description: Lists limits with cursor-based pagination and optional filters.
      operationId: listLimits
      parameters:
      - description: "Max items per page (1-100, default: 10)"
        in: query
        name: limit
        schema:
          maximum: 100
          minimum: 1
          type: integer
      - description: Pagination cursor (empty for first page)
        in: query
        name: cursor
        schema:
          type: string
      - description: Filter by name (case-insensitive partial match)
        in: query
        name: name
        schema:
          maxLength: 255
          type: string
      - description: Filter by status
        in: query
        name: status
        schema:
          enum:
          - DRAFT
          - ACTIVE
          - INACTIVE
          type: string
      - description: Filter by limit type
        in: query
        name: limit_type
        schema:
          enum:
          - DAILY
          - WEEKLY
          - MONTHLY
          - CUSTOM
          - PER_TRANSACTION
          type: string
      - description: Filter by scope account_id (UUID)
        in: query
        name: account_id
        schema:
          format: uuid
          type: string
      - description: Filter by scope segment_id (UUID)
        in: query
        name: segment_id
        schema:
          format: uuid
          type: string
      - description: Filter by scope portfolio_id (UUID)
        in: query
        name: portfolio_id
        schema:
          format: uuid
          type: string
      - description: Filter by scope merchant_id (UUID)
        in: query
        name: merchant_id
        schema:
          format: uuid
          type: string
      - description: Filter by scope transaction_type
        in: query
        name: transaction_type
        schema:
          enum:
          - CARD
          - WIRE
          - PIX
          - CRYPTO
          type: string
      - description: "Filter by scope sub_type (case-insensitive, normalized to lowercase;\
          \ max 50 chars)"
        in: query
        name: sub_type
        schema:
          maxLength: 50
          type: string
      - description: Sort field
        in: query
        name: sort_by
        schema:
          enum:
          - created_at
          - updated_at
          - name
          - max_amount
          type: string
      - description: Sort direction
        in: query
        name: sort_order
        schema:
          enum:
          - ASC
          - DESC
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in.ListLimitsResponse'
          description: Limits listed successfully
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Invalid parameters
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: List spending limits
      tags:
      - limits
    post:
      description: Creates a limit with scopes array. Limits are created in DRAFT
        status.
      operationId: createLimit
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/internal_adapters_http_in.CreateLimitInput'
        description: Limit details
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_midaz_v4_components_tracer_pkg_model.Limit'
          description: Limit created successfully
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Invalid input
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Unauthorized
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Limit name already exists
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: Create a new spending limit
      tags:
      - limits
      x-codegen-request-body-name: limit
  /v1/limits/{id}:
    delete:
      description: Soft-deletes a limit (transitions to DELETED status). Only DRAFT
        and INACTIVE limits can be deleted. ACTIVE limits must be deactivated first.
      operationId: deleteLimit
      parameters:
      - description: Limit ID (UUID)
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "204":
          content: {}
          description: Limit deleted successfully
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Invalid limit ID or transition
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Limit not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: Delete a spending limit
      tags:
      - limits
    get:
      description: Retrieves a limit by its unique identifier.
      operationId: getLimit
      parameters:
      - description: Limit ID (UUID)
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_midaz_v4_components_tracer_pkg_model.Limit'
          description: Limit retrieved successfully
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Invalid limit ID
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Limit not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: Get a spending limit by ID
      tags:
      - limits
    patch:
      description: "Partially updates a limit. Only provided fields are updated, omitted\
        \ fields remain unchanged."
      operationId: updateLimit
      parameters:
      - description: Limit ID (UUID)
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/internal_adapters_http_in.UpdateLimitInput'
        description: Fields to update
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_midaz_v4_components_tracer_pkg_model.Limit'
          description: Limit updated successfully
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Invalid input
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Limit not found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Limit name already exists
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: Partially update an existing spending limit
      tags:
      - limits
      x-codegen-request-body-name: limit
  /v1/limits/{id}/activate:
    post:
      description: Activates an inactive limit (INACTIVE → ACTIVE).
      operationId: activateLimit
      parameters:
      - description: Limit ID (UUID)
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_midaz_v4_components_tracer_pkg_model.Limit'
          description: Limit activated successfully
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Invalid limit ID or transition
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Limit not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: Activate a spending limit
      tags:
      - limits
  /v1/limits/{id}/deactivate:
    post:
      description: Deactivates an active limit (ACTIVE → INACTIVE).
      operationId: deactivateLimit
      parameters:
      - description: Limit ID (UUID)
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_midaz_v4_components_tracer_pkg_model.Limit'
          description: Limit deactivated successfully
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Invalid limit ID or transition
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Limit not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: Deactivate a spending limit
      tags:
      - limits
  /v1/limits/{id}/draft:
    post:
      description: Transitions a limit from INACTIVE to DRAFT status. Allows re-editing
        a previously deactivated limit.
      operationId: draftLimit
      parameters:
      - description: Limit ID (UUID)
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_midaz_v4_components_tracer_pkg_model.Limit'
          description: Limit transitioned to draft successfully
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Invalid limit ID or transition
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Limit not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: Transition a limit back to draft
      tags:
      - limits
  /v1/limits/{id}/usage:
    get:
      description: "Retrieves current usage snapshot for a limit, showing aggregated\
        \ usage, utilization percentage, and reset time."
      operationId: getLimitUsage
      parameters:
      - description: Limit ID (UUID)
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_LerianStudio_midaz_v4_components_tracer_pkg_model.UsageSnapshot'
          description: Usage snapshot retrieved successfully
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Invalid limit ID
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Limit not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: Get usage snapshot for a limit
      tags:
      - limits
  /v1/reservations:
    post:
      description: "Holds limit capacity for a ledger transaction without committing\
        \ it. Returns one reservation id per counter-backed limit, or denied=true\
        \ when a limit would be exceeded."
      operationId: createReservation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/internal_adapters_http_in.ReserveRequest'
        description: Reservation request
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in.ReserveResponse'
          description: Capacity reserved
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Invalid input
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Unauthorized
        "413":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Payload too large (exceeds 100KB)
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: Reserve transaction capacity (phase one)
      tags:
      - reservations
      x-codegen-request-body-name: request
  /v1/reservations/transaction/{transaction_id}/confirm:
    post:
      description: "Confirms EVERY held reservation a transaction holds, addressed\
        \ by the ledger transaction id. The ledger /commit drives this with only the\
        \ transaction id. Idempotent — flipped=0 (no reservations, or all already\
        \ terminal) returns 200."
      operationId: confirmReservationByTransaction
      parameters:
      - description: Transaction ID (UUID)
        in: path
        name: transaction_id
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in.TransactionActionResponse'
          description: Reservations confirmed
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Invalid path parameter
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: Confirm a transaction's reservations (phase two — commit by transaction)
      tags:
      - reservations
  /v1/reservations/transaction/{transaction_id}/release:
    post:
      description: "Releases EVERY held reservation a transaction holds, addressed\
        \ by the ledger transaction id. The ledger /cancel drives this with only the\
        \ transaction id. Idempotent — flipped=0 returns 200."
      operationId: releaseReservationByTransaction
      parameters:
      - description: Transaction ID (UUID)
        in: path
        name: transaction_id
        required: true
        schema:
          format: uuid
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_adapters_http_in.TransactionActionResponse'
          description: Reservations released
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Invalid path parameter
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ErrorResponse'
          description: Internal server error
      security:
