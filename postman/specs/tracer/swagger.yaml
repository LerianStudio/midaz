basePath: /
definitions:
  AccountContext:
    properties:
      accountId:
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      metadata:
        additionalProperties: {}
        type: object
      status:
        example: active
        type: string
      type:
        example: checking
        type: string
    type: object
  Actor:
    properties:
      actorType:
        enum:
        - user
        - api_key
        - system
        example: user
        type: string
      id:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      ipAddress:
        example: 203.0.113.42
        type: string
      name:
        example: Jane Doe
        type: string
      role:
        example: admin
        type: string
    type: object
  AuditEvent:
    description: Immutable audit record for SOX/GLBA compliance. Each event captures
      who performed what action on which resource, the outcome, and a full context
      snapshot. Events are hash-chained to detect tampering; the hash covers all core
      fields.
    properties:
      action:
        description: |-
          Action performed
          example: VALIDATE
          enums: VALIDATE,CREATE,UPDATE,DELETE,ACTIVATE,DEACTIVATE,DRAFT,RESERVE,CONFIRM,RELEASE,EXPIRE,SKIP
        enum:
        - VALIDATE
        - CREATE
        - UPDATE
        - DELETE
        - ACTIVATE
        - DEACTIVATE
        - DRAFT
        - RESERVE
        - CONFIRM
        - RELEASE
        - EXPIRE
        - SKIP
        example: VALIDATE
        type: string
      actor:
        allOf:
        - $ref: '#/definitions/Actor'
        description: Actor who performed the action
      context:
        additionalProperties: {}
        description: |-
          Context (JSONB): for validations: { request: {...}, response: {reason, processingTimeMs, matchedRuleIds, ...} }; for CRUD: { before: {...}, after: {...}, reason: "..." }
          Note: accountId, segmentId, portfolioId are in context.request.account (not first-level fields)
        type: object
      createdAt:
        description: |-
          Timestamp when the event occurred
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      eventId:
        description: |-
          Unique identifier for this audit event
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      eventType:
        description: |-
          Type of event that occurred
          example: TRANSACTION_VALIDATED
          enums: TRANSACTION_VALIDATED,RULE_CREATED,RULE_UPDATED,RULE_ACTIVATED,RULE_DEACTIVATED,RULE_DRAFTED,RULE_DELETED,LIMIT_CREATED,LIMIT_UPDATED,LIMIT_DELETED,LIMIT_ACTIVATED,LIMIT_DEACTIVATED,LIMIT_DRAFTED,RESERVATION_RESERVED,RESERVATION_CONFIRMED,RESERVATION_RELEASED,RESERVATION_EXPIRED,RESERVATION_SKIPPED
        enum:
        - TRANSACTION_VALIDATED
        - RULE_CREATED
        - RULE_UPDATED
        - RULE_ACTIVATED
        - RULE_DEACTIVATED
        - RULE_DRAFTED
        - RULE_DELETED
        - LIMIT_CREATED
        - LIMIT_UPDATED
        - LIMIT_DELETED
        - LIMIT_ACTIVATED
        - LIMIT_DEACTIVATED
        - LIMIT_DRAFTED
        - RESERVATION_RESERVED
        - RESERVATION_CONFIRMED
        - RESERVATION_RELEASED
        - RESERVATION_EXPIRED
        - RESERVATION_SKIPPED
        example: TRANSACTION_VALIDATED
        type: string
      hash:
        description: |-
          SHA-256 hash of this event's fields for tamper detection
          example: a3f1e2b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2
        example: a3f1e2b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2
        type: string
      metadata:
        additionalProperties: {}
        description: Additional metadata such as ticketId or correlationId
        type: object
      previousHash:
        description: |-
          Hash of the preceding event in the chain, empty for the first event
          example: b4e2f3a5c6d7e8f9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3
        example: b4e2f3a5c6d7e8f9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3
        type: string
      resourceId:
        description: |-
          ID of the resource affected by this event
          example: 00000000-0000-0000-0000-000000000000
        example: 00000000-0000-0000-0000-000000000000
        type: string
      resourceType:
        description: |-
          Type of resource affected
          example: transaction
          enums: transaction,rule,limit,reservation
        enum:
        - transaction
        - rule
        - limit
        - reservation
        example: transaction
        type: string
      result:
        description: |-
          Outcome: ALLOW/DENY/REVIEW for validations; SUCCESS/FAILED for CRUD operations
          example: ALLOW
          enums: ALLOW,DENY,REVIEW,SUCCESS,FAILED
        enum:
        - ALLOW
        - DENY
        - REVIEW
        - SUCCESS
        - FAILED
        example: ALLOW
        type: string
    type: object
  CreateLimitInput:
    properties:
      activeTimeEnd:
        example: "17:00"
        type: string
      activeTimeStart:
        example: "09:00"
        type: string
      currency:
        example: USD
        maxLength: 3
        minLength: 3
        type: string
      customEndDate:
        example: "2026-11-29T00:00:00Z"
        format: date-time
        type: string
      customStartDate:
        example: "2026-11-27T00:00:00Z"
        format: date-time
        type: string
      description:
        maxLength: 1000
        type: string
      limitType:
        enum:
        - DAILY
        - MONTHLY
        - PER_TRANSACTION
        - WEEKLY
        - CUSTOM
        example: DAILY
        type: string
      maxAmount:
        example: "1000.00"
        type: string
      name:
        maxLength: 255
        minLength: 1
        type: string
      scopes:
        items:
          $ref: '#/definitions/Scope'
        maxItems: 100
        minItems: 1
        type: array
    required:
    - currency
    - limitType
    - maxAmount
    - name
    - scopes
    type: object
  CreateRuleInput:
    properties:
      action:
        enum:
        - ALLOW
        - DENY
        - REVIEW
        example: DENY
        type: string
      description:
        maxLength: 1000
        type: string
      expression:
        maxLength: 5000
        minLength: 1
        type: string
      name:
        maxLength: 255
        minLength: 1
        type: string
      scopes:
        items:
          $ref: '#/definitions/Scope'
        maxItems: 100
        type: array
    required:
    - action
    - expression
    - name
    type: object
  ErrorResponse:
    properties:
      code:
        example: "0053"
        type: string
      message:
        example: Invalid input provided
        type: string
      title:
        example: Bad Request
        type: string
    required:
    - code
    - message
    - title
    type: object
  HashChainVerificationResult:
    properties:
      firstInvalidId:
        example: 42
        type: integer
      isValid:
        example: true
        type: boolean
      message:
        example: hash chain intact
        type: string
      totalChecked:
        example: 1000
        type: integer
    type: object
  Limit:
    description: A transaction spending limit enforced during validation. Limits accumulate
      usage across a configurable period (DAILY/WEEKLY/MONTHLY/CUSTOM/PER_TRANSACTION)
      and block or flag transactions that would exceed the configured MaxAmount for
      the matched currency and scope.
    properties:
      activeTimeEnd:
        description: End of the daily time window when the limit is active (HH:MM),
          null means 24/7
        example: "17:00"
        type: string
      activeTimeStart:
        description: Start of the daily time window when the limit is active (HH:MM),
          null means 24/7
        example: "09:00"
        type: string
      createdAt:
        description: |-
          Timestamp when the limit was created
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      currency:
        description: |-
          ISO 4217 currency code this limit applies to
          example: USD
        example: USD
        type: string
      customEndDate:
        description: |-
          End of custom period (only for CUSTOM limitType)
          format: date-time
        example: "2021-12-31T23:59:59Z"
        format: date-time
        type: string
      customStartDate:
        description: |-
          Start of custom period (only for CUSTOM limitType)
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      deletedAt:
        description: |-
          Timestamp when the limit was soft deleted, null if not deleted
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      description:
        description: |-
          Optional description of the limit's purpose
          example: Caps daily USD outflows for retail accounts
        example: Caps daily USD outflows for retail accounts
        type: string
      limitId:
        description: |-
          Unique identifier for the limit
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      limitType:
        description: |-
          Period type for usage accumulation
          enums: DAILY,WEEKLY,MONTHLY,CUSTOM,PER_TRANSACTION
        enum:
        - DAILY
        - WEEKLY
        - MONTHLY
        - CUSTOM
        - PER_TRANSACTION
        example: DAILY
        type: string
      maxAmount:
        description: Maximum amount allowed within the period
        example: "1000.00"
        type: string
      name:
        description: |-
          Human-readable name of the limit
          example: Daily USD spending cap
          maxLength: 255
        example: Daily USD spending cap
        maxLength: 255
        type: string
      resetAt:
        description: |-
          Next reset timestamp, null for PER_TRANSACTION limits
          format: date-time
        example: "2021-01-02T00:00:00Z"
        format: date-time
        type: string
      scopes:
        description: Scopes that restrict which transactions this limit applies to
        items:
          $ref: '#/definitions/Scope'
        type: array
      status:
        description: |-
          Current lifecycle status of the limit
          enums: DRAFT,ACTIVE,INACTIVE,DELETED
        enum:
        - DRAFT
        - ACTIVE
        - INACTIVE
        - DELETED
        example: ACTIVE
        type: string
      updatedAt:
        description: |-
          Timestamp when the limit was last updated
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
    type: object
  LimitUsageDetail:
    properties:
      attemptedAmount:
        description: |-
          AttemptedAmount is the transaction amount being validated against this limit.
          Matches the amount from the validation request.
        example: "100.00"
        type: string
      currentUsage:
        description: |-
          CurrentUsage represents the PROJECTED usage after applying the transaction amount,
          not the actual persisted counter value. This is calculated as:
          (counter.CurrentUsage + input.Amount) for DAILY/WEEKLY/MONTHLY/CUSTOM limits, or 0 for PER_TRANSACTION.
          When Exceeded=true, the counter was NOT incremented, but CurrentUsage still shows
          what the usage would have been if the transaction were allowed.
        example: "500.00"
        type: string
      exceeded:
        type: boolean
      limitAmount:
        example: "1000.00"
        type: string
      limitId:
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      period:
        description: Period indicates the type of limit (DAILY, WEEKLY, MONTHLY, CUSTOM,
          PER_TRANSACTION).
        enum:
        - DAILY
        - MONTHLY
        - PER_TRANSACTION
        - WEEKLY
        - CUSTOM
        example: DAILY
        type: string
      scope:
        description: |-
          Scope is a human-readable string representation of the limit's scope
          (e.g., "account:uuid" or "segment:uuid" or "global").
        example: account:00000000-0000-0000-0000-000000000000
        type: string
      skipReason:
        description: |-
          SkipReason explains why the limit was skipped (only set when Skipped=true).
          Values: "outside_time_window" (outside active hours), "outside_custom_period" (outside custom date range).
        example: outside_time_window
        type: string
      skipped:
        description: |-
          Skipped indicates whether this limit was skipped during evaluation (not enforced).
          When true, the counter was NOT incremented and Exceeded is always false.
        type: boolean
    type: object
  ListAuditEventsResponse:
    properties:
      auditEvents:
        items:
          $ref: '#/definitions/AuditEvent'
        maxItems: 1000
        type: array
      hasMore:
        example: true
        type: boolean
      nextCursor:
        example: eyJpZCI6IjAxOTI4In0=
        type: string
    type: object
  ListLimitsResponse:
    properties:
      hasMore:
        example: true
        type: boolean
      limits:
        items:
          $ref: '#/definitions/Limit'
        type: array
      nextCursor:
        example: eyJpZCI6IjAxOTI4In0=
        type: string
    type: object
  ListRulesResponse:
    properties:
      hasMore:
        example: true
        type: boolean
      nextCursor:
        example: eyJpZCI6IjAxOTI4In0=
        type: string
      rules:
        items:
          $ref: '#/definitions/Rule'
        type: array
    type: object
  ListTransactionValidationsResponse:
    properties:
      hasMore:
        example: true
        type: boolean
      nextCursor:
        example: eyJpZCI6IjAxOTI4In0=
        type: string
      transactionValidations:
        items:
          $ref: '#/definitions/ValidationSummary'
        type: array
    type: object
  MerchantContext:
    properties:
      category:
        description: e.g., ISO 18245 MCC code
        example: "5411"
        type: string
      country:
        description: ISO 3166-1 alpha-2 code
        example: US
        type: string
      merchantId:
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      metadata:
        additionalProperties: {}
        type: object
      name:
        example: Acme Store
        type: string
    type: object
  PortfolioContext:
    properties:
      metadata:
        additionalProperties: {}
        type: object
      name:
        example: growth
        type: string
      portfolioId:
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
    type: object
  ReadyzCheck:
    properties:
      error:
        type: string
      latency_ms:
        example: 3
        type: integer
      status:
        enum:
        - up
        - down
        - degraded
        - skipped
        - n/a
        example: up
        type: string
      tls:
        example: true
        type: boolean
    type: object
  ReadyzResponse:
    properties:
      checks:
        additionalProperties:
          $ref: '#/definitions/ReadyzCheck'
        type: object
      deployment_mode:
        example: saas
        type: string
      draining:
        example: false
        type: boolean
      status:
        enum:
        - healthy
        - unhealthy
        example: healthy
        type: string
      version:
        example: 1.2.3
        type: string
    type: object
  ReservationActionResponse:
    properties:
      reservationId:
        format: uuid
        type: string
      status:
        enum:
        - CONFIRMED
        - RELEASED
        example: CONFIRMED
        type: string
    type: object
  ReserveRequest:
    properties:
      longLived:
        description: |-
          LongLived selects the reservation lifetime. false (the default, a direct
          transaction) gets the short reaper-swept TTL; true (a PENDING transaction)
          gets the long-lived TTL so the reservation does not expire under a
          still-valid pending that has no existing sweep (R18). It is a sibling wire
          field, NOT part of the embedded ValidationRequest, so the relaxed reserve
          validation never sees it.
        example: false
        type: boolean
      transactionId:
        description: |-
          TransactionID is the ledger transaction correlation id. It is the
          idempotency grain for retried reserves and the handle the ledger later
          confirms or releases. Not a foreign key — the ledger transaction lives in a
          different service.
        format: uuid
        type: string
    required:
    - transactionId
    type: object
  ReserveResponse:
    properties:
      denied:
        example: false
        type: boolean
      reservationIds:
        items:
          format: uuid
          type: string
        type: array
      transactionId:
        format: uuid
        type: string
    type: object
  Rule:
    description: A validation rule containing a CEL expression evaluated against transaction
      context. Rules are created in DRAFT status, activated to apply enforcement,
      and produce a Decision (ALLOW/DENY/REVIEW) when matched.
    properties:
      action:
        description: |-
          Decision produced when this rule matches
          enums: ALLOW,DENY,REVIEW
        enum:
        - ALLOW
        - DENY
        - REVIEW
        example: DENY
        type: string
      activatedAt:
        description: |-
          Timestamp when the rule was last activated, null if never activated
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      createdAt:
        description: |-
          Timestamp when the rule was created
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      deactivatedAt:
        description: |-
          Timestamp when the rule was last deactivated, null if currently active or never deactivated
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      deletedAt:
        description: |-
          Timestamp when the rule was soft deleted, null if not deleted
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      description:
        description: |-
          Optional description of the rule's purpose
          example: Denies transactions over $1000 from checking accounts
        example: Denies transactions over $1000 from checking accounts
        type: string
      expression:
        description: |-
          CEL expression evaluated against transaction context
          example: transaction.amount > 1000 && account.type == 'checking'
        example: transaction.amount > 1000 && account.type == 'checking'
        type: string
      name:
        description: |-
          Human-readable name of the rule
          example: Block high-value checking transactions
          maxLength: 255
        example: Block high-value checking transactions
        maxLength: 255
        type: string
      ruleId:
        description: |-
          Unique identifier for the rule
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      scopes:
        description: Scopes that restrict which transactions this rule applies to
        items:
          $ref: '#/definitions/Scope'
        type: array
      status:
        description: |-
          Current lifecycle status of the rule
          enums: DRAFT,ACTIVE,INACTIVE,DELETED
        enum:
        - DRAFT
        - ACTIVE
        - INACTIVE
        - DELETED
        example: ACTIVE
        type: string
      updatedAt:
        description: |-
          Timestamp when the rule was last updated
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
    type: object
  Scope:
    description: Hierarchical scope that constrains which transactions a rule or limit
      applies to. At least one field must be set. When multiple fields are set, all
      must match (AND semantics). Nil fields match any value.
    properties:
      accountId:
        description: |-
          Account the scope is restricted to (optional)
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      merchantId:
        description: |-
          Merchant the scope is restricted to (optional)
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      portfolioId:
        description: |-
          Portfolio the scope is restricted to (optional)
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      segmentId:
        description: |-
          Segment the scope is restricted to (optional)
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      subType:
        description: |-
          SubType is normalized to lowercase canonical form; matching is case-insensitive.
          example: purchase
          maxLength: 50
        example: purchase
        maxLength: 50
        type: string
        x-normalization: lowercase
      transactionType:
        description: |-
          Transaction type the scope is restricted to (optional)
          example: CARD
        enum:
        - CARD
        - WIRE
        - PIX
        - CRYPTO
        example: CARD
        type: string
    type: object
  SegmentContext:
    properties:
      metadata:
        additionalProperties: {}
        type: object
      name:
        example: retail
        type: string
      segmentId:
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
    type: object
  TransactionActionResponse:
    properties:
      flipped:
        example: 2
        type: integer
      status:
        enum:
        - CONFIRMED
        - RELEASED
        example: CONFIRMED
        type: string
      transactionId:
        format: uuid
        type: string
    type: object
  TransactionValidation:
    description: Persisted record of a completed transaction validation, combining
      the original request context with the evaluation outcome. Used for compliance
      auditing, idempotency replay, and historical querying. Embeds EvaluationResult
      fields (decision, reason, matchedRuleIds, etc.) directly.
    properties:
      account:
        allOf:
        - $ref: '#/definitions/AccountContext'
        description: Account context from the validation request
      amount:
        description: Transaction amount that was validated
        example: "100.00"
        type: string
      createdAt:
        description: |-
          Timestamp when this validation record was created
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      currency:
        description: |-
          ISO 4217 currency code of the transaction
          example: USD
        example: USD
        type: string
      decision:
        description: |-
          Final decision produced by rule evaluation
          enums: ALLOW,DENY,REVIEW
        enum:
        - ALLOW
        - DENY
        - REVIEW
        example: ALLOW
        type: string
      evaluatedRuleIds:
        description: IDs of all rules evaluated during this request
        items:
          format: uuid
          type: string
        type: array
      limitUsageDetails:
        description: Per-limit usage details captured at validation time
        items:
          $ref: '#/definitions/LimitUsageDetail'
        type: array
      matchedRuleIds:
        description: IDs of rules that matched the transaction scope and CEL expression
        items:
          format: uuid
          type: string
        type: array
      merchant:
        allOf:
        - $ref: '#/definitions/MerchantContext'
        description: Merchant context from the validation request (optional)
      metadata:
        additionalProperties: {}
        description: Additional metadata from the validation request
        type: object
      portfolio:
        allOf:
        - $ref: '#/definitions/PortfolioContext'
        description: Portfolio context from the validation request (optional)
      processingTimeMs:
        description: |-
          Time taken to evaluate rules and limits in milliseconds
          example: 12.5
        example: 12.5
        type: number
      reason:
        description: |-
          Human-readable explanation of the decision
          example: Transaction denied by rule 'Block high-value checking transactions'
        example: Transaction denied by rule 'Block high-value checking transactions'
        type: string
      requestId:
        description: |-
          Idempotency key from the originating validation request
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      segment:
        allOf:
        - $ref: '#/definitions/SegmentContext'
        description: Segment context from the validation request (optional)
      subType:
        description: |-
          SubType is stored in its lowercase canonical form; matching is case-insensitive.
          example: purchase
          maxLength: 50
        example: purchase
        maxLength: 50
        type: string
        x-normalization: lowercase
      totalRulesLoaded:
        description: |-
          Total number of active rules loaded for evaluation before any truncation
          example: 42
        example: 42
        type: integer
      transactionTimestamp:
        description: |-
          Timestamp of the original transaction
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      transactionType:
        description: |-
          Type of the transaction that was validated
          example: CARD
        enum:
        - CARD
        - WIRE
        - PIX
        - CRYPTO
        example: CARD
        type: string
      truncated:
        description: |-
          True when active rules exceeded MAX_RULES_PER_REQUEST and were truncated
          example: false
        example: false
        type: boolean
      validationId:
        description: |-
          Unique identifier for this validation record
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
    type: object
  UpdateLimitInput:
    properties:
      activeTimeEnd:
        example: "17:00"
        type: string
      activeTimeStart:
        example: "09:00"
        type: string
      customEndDate:
        example: "2026-11-29T00:00:00Z"
        format: date-time
        type: string
      customStartDate:
        example: "2026-11-27T00:00:00Z"
        format: date-time
        type: string
      description:
        maxLength: 1000
        type: string
      maxAmount:
        example: "1000.00"
        type: string
      name:
        maxLength: 255
        minLength: 1
        type: string
      scopes:
        items:
          $ref: '#/definitions/Scope'
        maxItems: 100
        minItems: 1
        type: array
    type: object
  UpdateRuleInput:
    properties:
      action:
        enum:
        - ALLOW
        - DENY
        - REVIEW
        example: DENY
        type: string
      description:
        maxLength: 1000
        type: string
      expression:
        maxLength: 5000
        minLength: 1
        type: string
      name:
        maxLength: 255
        minLength: 1
        type: string
      scopes:
        items:
          $ref: '#/definitions/Scope'
        maxItems: 100
        type: array
    type: object
  UsageSnapshot:
    properties:
      currentUsage:
        description: Current usage amount (sum of all counters)
        example: "500.00"
        type: string
      limitAmount:
        description: Total limit amount (from Limit.MaxAmount)
        example: "1000.00"
        type: string
      limitId:
        description: Limit identifier
        format: uuid
        type: string
      nearLimit:
        description: True if usage > 80%
        example: false
        type: boolean
      resetAt:
        description: When counter resets (nil for PER_TRANSACTION)
        format: date-time
        type: string
      utilizationPercent:
        description: Usage percentage (currentUsage / limitAmount * 100)
        example: 50
        type: number
    type: object
  ValidationRequest:
    properties:
      account:
        $ref: '#/definitions/AccountContext'
      amount:
        example: "100.00"
        type: string
      currency:
        example: USD
        type: string
      merchant:
        $ref: '#/definitions/MerchantContext'
      metadata:
        additionalProperties: {}
        type: object
      portfolio:
        $ref: '#/definitions/PortfolioContext'
      requestId:
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      segment:
        $ref: '#/definitions/SegmentContext'
      subType:
        description: SubType is normalized to lowercase canonical form; matching is
          case-insensitive.
        example: purchase
        maxLength: 50
        type: string
        x-normalization: lowercase
      transactionTimestamp:
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      transactionType:
        enum:
        - CARD
        - WIRE
        - PIX
        - CRYPTO
        example: CARD
        type: string
    required:
    - account
    - amount
    - currency
    - requestId
    - transactionTimestamp
    - transactionType
    type: object
  ValidationResponse:
    description: Response returned after evaluating a transaction against the active
      rules and limits. Contains the evaluation decision, matched rule identifiers,
      per-limit usage details, and timing metadata. EvaluationResult fields (decision,
      reason, matchedRuleIds, evaluatedRuleIds, totalRulesLoaded, truncated) are promoted
      to the top level via Go embedding.
    properties:
      decision:
        description: |-
          Final decision produced by rule evaluation
          enums: ALLOW,DENY,REVIEW
        enum:
        - ALLOW
        - DENY
        - REVIEW
        example: ALLOW
        type: string
      evaluatedAt:
        description: |-
          Timestamp when the evaluation was performed
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      evaluatedRuleIds:
        description: IDs of all rules evaluated during this request
        items:
          format: uuid
          type: string
        type: array
      limitUsageDetails:
        description: Per-limit usage details for every limit checked during this validation
        items:
          $ref: '#/definitions/LimitUsageDetail'
        type: array
      matchedRuleIds:
        description: IDs of rules that matched the transaction scope and CEL expression
        items:
          format: uuid
          type: string
        type: array
      processingTimeMs:
        description: |-
          Time taken to evaluate rules and limits in milliseconds
          example: 12.5
        example: 12.5
        type: number
      reason:
        description: |-
          Human-readable explanation of the decision
          example: Transaction denied by rule 'Block high-value checking transactions'
        example: Transaction denied by rule 'Block high-value checking transactions'
        type: string
      requestId:
        description: |-
          Idempotency key echoed from the request
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      totalRulesLoaded:
        description: |-
          Total number of active rules loaded for evaluation before any truncation
          example: 42
        example: 42
        type: integer
      truncated:
        description: |-
          True when active rules exceeded MAX_RULES_PER_REQUEST and were truncated
          example: false
        example: false
        type: boolean
      validationId:
        description: |-
          Unique identifier for this validation result
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
    type: object
  ValidationSummary:
    properties:
      accountId:
        format: uuid
        type: string
      amount:
        example: "100.00"
        type: string
      createdAt:
        format: date-time
        type: string
      currency:
        example: USD
        type: string
      decision:
        enum:
        - ALLOW
        - DENY
        - REVIEW
        example: ALLOW
        type: string
      exceededLimitIds:
        items:
          format: uuid
          type: string
        type: array
      matchedRuleIds:
        items:
          format: uuid
          type: string
        type: array
      portfolioId:
        format: uuid
        type: string
      processingTimeMs:
        example: 12.5
        type: number
      reason:
        example: All rules passed
        type: string
      segmentId:
        format: uuid
        type: string
      transactionType:
        enum:
        - CARD
        - WIRE
        - PIX
        - CRYPTO
        example: CARD
        type: string
      validationId:
        format: uuid
        type: string
    type: object
  VersionResponse:
    properties:
      buildTime:
        example: "2025-01-01T00:00:00Z"
        type: string
      commit:
        example: a1b2c3d
        type: string
      dirty:
        example: false
        type: boolean
      requestDate:
        example: "2025-01-01T00:00:00Z"
        type: string
      version:
        example: 1.0.0
        type: string
    type: object
host: localhost:4020
info:
  contact:
    name: Discord community
    url: https://discord.gg/DnhqKwkGv3
  description: Midaz Tracer API — pre-flight transaction validation. Provides CEL-based
    rule evaluation, spending limits, two-phase reservations (hold / confirm / release),
    validation decisions, and a hash-chained audit trail.
  license:
    name: Elastic License 2.0
    url: https://www.elastic.co/licensing/elastic-license
  termsOfService: https://www.elastic.co/licensing/elastic-license
  title: Midaz Tracer API
  version: 4.0.0
paths:
  /health:
    get:
      consumes:
      - text/plain
      description: Returns 503 until startup self-probe completes; 200 "healthy" thereafter.
      operationId: getHealth
      produces:
      - text/plain
      responses:
        "200":
          description: healthy
          schema:
            type: string
        "503":
          description: self-probe has not completed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check (liveness probe)
      tags:
      - Health
  /readyz:
    get:
      consumes:
      - application/json
      description: Live dependency probes — never cached. Returns 200 only when every
        check is up/skipped/n/a; any down or degraded forces 503.
      operationId: getReadyz
      produces:
      - application/json
      responses:
        "200":
          description: Service is ready
          schema:
            $ref: '#/definitions/ReadyzResponse'
        "503":
          description: Service is not ready
          schema:
            $ref: '#/definitions/ReadyzResponse'
      summary: Readiness check (Lerian canonical contract)
      tags:
      - Health
  /v1/audit-events:
    get:
      consumes:
      - application/json
      description: Lists audit events with filters and cursor-based pagination. SOX/GLBA
        compliance endpoint.
      operationId: listAuditEvents
      parameters:
      - description: Start date (RFC3339 format)
        format: date-time
        in: query
        name: start_date
        type: string
      - description: End date (RFC3339 format)
        format: date-time
        in: query
        name: end_date
        type: string
      - description: Filter by event type
        enum:
        - TRANSACTION_VALIDATED
        - RULE_CREATED
        - RULE_UPDATED
        - RULE_ACTIVATED
        - RULE_DEACTIVATED
        - RULE_DRAFTED
        - RULE_DELETED
        - LIMIT_CREATED
        - LIMIT_UPDATED
        - LIMIT_ACTIVATED
        - LIMIT_DEACTIVATED
        - LIMIT_DRAFTED
        - LIMIT_DELETED
        in: query
        name: event_type
        type: string
      - description: Filter by action
        enum:
        - VALIDATE
        - CREATE
        - UPDATE
        - DELETE
        - ACTIVATE
        - DEACTIVATE
        - DRAFT
        in: query
        name: action
        type: string
      - description: Filter by result
        enum:
        - SUCCESS
        - FAILED
        - ALLOW
        - DENY
        - REVIEW
        in: query
        name: result
        type: string
      - description: Filter by resource type
        enum:
        - transaction
        - rule
        - limit
        in: query
        name: resource_type
        type: string
      - description: Filter by resource ID
        in: query
        name: resource_id
        type: string
      - description: Filter by actor type
        enum:
        - user
        - system
        in: query
        name: actor_type
        type: string
      - description: Filter by actor ID
        in: query
        name: actor_id
        type: string
      - description: Filter by account ID (UUID)
        format: uuid
        in: query
        name: account_id
        type: string
      - description: Filter by segment ID (UUID)
        format: uuid
        in: query
        name: segment_id
        type: string
      - description: Filter by portfolio ID (UUID)
        format: uuid
        in: query
        name: portfolio_id
        type: string
      - description: Filter by transaction type
        enum:
        - CARD
        - WIRE
        - PIX
        - CRYPTO
        in: query
        name: transaction_type
        type: string
      - description: Filter by matched rule ID (UUID)
        format: uuid
        in: query
        name: matched_rule_id
        type: string
      - description: 'Max items per page (1-1000, default: 100)'
        in: query
        maximum: 1000
        minimum: 1
        name: limit
        type: integer
      - description: Pagination token (empty for first page)
        in: query
        name: cursor
        type: string
      - description: Sort field
        enum:
        - created_at
        - event_type
        in: query
        name: sort_by
        type: string
      - description: Sort direction
        enum:
        - ASC
        - DESC
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Audit events listed successfully
          schema:
            $ref: '#/definitions/ListAuditEventsResponse'
        "400":
          description: Invalid parameters
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List audit events
      tags:
      - Audit
  /v1/audit-events/{id}:
    get:
      consumes:
      - application/json
      description: Retrieves a single audit event by its unique identifier. SOX/GLBA
        compliance endpoint.
      operationId: getAuditEvent
      parameters:
      - description: Event ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Audit event retrieved successfully
          schema:
            $ref: '#/definitions/AuditEvent'
        "400":
          description: Invalid event ID
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Audit event not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get an audit event by ID
      tags:
      - Audit
  /v1/audit-events/{id}/verify:
    get:
      consumes:
      - application/json
      description: Verifies the integrity of the audit event hash chain up to a specific
        event. Detects tampering attempts. SOX/GLBA compliance endpoint.
      operationId: verifyAuditEvent
      parameters:
      - description: Event ID to verify up to (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Hash chain verification completed
          schema:
            $ref: '#/definitions/HashChainVerificationResult'
        "400":
          description: Invalid event ID
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Event not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Verify audit event hash chain integrity
      tags:
      - Audit
  /v1/limits:
    get:
      consumes:
      - application/json
      description: Lists limits with cursor-based pagination and optional filters.
      operationId: listLimits
      parameters:
      - description: 'Max items per page (1-100, default: 10)'
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: Pagination cursor (empty for first page)
        in: query
        name: cursor
        type: string
      - description: Filter by name (case-insensitive partial match)
        in: query
        maxLength: 255
        name: name
        type: string
      - description: Filter by status
        enum:
        - DRAFT
        - ACTIVE
        - INACTIVE
        in: query
        name: status
        type: string
      - description: Filter by limit type
        enum:
        - DAILY
        - WEEKLY
        - MONTHLY
        - CUSTOM
        - PER_TRANSACTION
        in: query
        name: limit_type
        type: string
      - description: Filter by scope account_id (UUID)
        format: uuid
        in: query
        name: account_id
        type: string
      - description: Filter by scope segment_id (UUID)
        format: uuid
        in: query
        name: segment_id
        type: string
      - description: Filter by scope portfolio_id (UUID)
        format: uuid
        in: query
        name: portfolio_id
        type: string
      - description: Filter by scope merchant_id (UUID)
        format: uuid
        in: query
        name: merchant_id
        type: string
      - description: Filter by scope transaction_type
        enum:
        - CARD
        - WIRE
        - PIX
        - CRYPTO
        in: query
        name: transaction_type
        type: string
      - description: Filter by scope sub_type (case-insensitive, normalized to lowercase;
          max 50 chars)
        in: query
        maxLength: 50
        name: sub_type
        type: string
      - description: Sort field
        enum:
        - created_at
        - updated_at
        - name
        - max_amount
        in: query
        name: sort_by
        type: string
      - description: Sort direction
        enum:
        - ASC
        - DESC
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Limits listed successfully
          schema:
            $ref: '#/definitions/ListLimitsResponse'
        "400":
          description: Invalid parameters
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List spending limits
      tags:
      - Limits
    post:
      consumes:
      - application/json
      description: Creates a limit with scopes array. Limits are created in DRAFT
        status.
      operationId: createLimit
      parameters:
      - description: Limit details
        in: body
        name: limit
        required: true
        schema:
          $ref: '#/definitions/CreateLimitInput'
      produces:
      - application/json
      responses:
        "201":
          description: Limit created successfully
          schema:
            $ref: '#/definitions/Limit'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Limit name already exists
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create a new spending limit
      tags:
      - Limits
  /v1/limits/{id}:
    delete:
      consumes:
      - application/json
      description: Soft-deletes a limit (transitions to DELETED status). Only DRAFT
        and INACTIVE limits can be deleted. ACTIVE limits must be deactivated first.
      operationId: deleteLimit
      parameters:
      - description: Limit ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Limit deleted successfully
        "400":
          description: Invalid limit ID or transition
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Limit not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a spending limit
      tags:
      - Limits
    get:
      consumes:
      - application/json
      description: Retrieves a limit by its unique identifier.
      operationId: getLimit
      parameters:
      - description: Limit ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Limit retrieved successfully
          schema:
            $ref: '#/definitions/Limit'
        "400":
          description: Invalid limit ID
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Limit not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get a spending limit by ID
      tags:
      - Limits
    patch:
      consumes:
      - application/json
      description: Partially updates a limit. Only provided fields are updated, omitted
        fields remain unchanged.
      operationId: updateLimit
      parameters:
      - description: Limit ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: limit
        required: true
        schema:
          $ref: '#/definitions/UpdateLimitInput'
      produces:
      - application/json
      responses:
        "200":
          description: Limit updated successfully
          schema:
            $ref: '#/definitions/Limit'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Limit not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Limit name already exists
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Partially update an existing spending limit
      tags:
      - Limits
  /v1/limits/{id}/activate:
    post:
      consumes:
      - application/json
      description: Activates an inactive limit (INACTIVE → ACTIVE).
      operationId: activateLimit
      parameters:
      - description: Limit ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Limit activated successfully
          schema:
            $ref: '#/definitions/Limit'
        "400":
          description: Invalid limit ID or transition
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Limit not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Activate a spending limit
      tags:
      - Limits
  /v1/limits/{id}/deactivate:
    post:
      consumes:
      - application/json
      description: Deactivates an active limit (ACTIVE → INACTIVE).
      operationId: deactivateLimit
      parameters:
      - description: Limit ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Limit deactivated successfully
          schema:
            $ref: '#/definitions/Limit'
        "400":
          description: Invalid limit ID or transition
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Limit not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Deactivate a spending limit
      tags:
      - Limits
  /v1/limits/{id}/draft:
    post:
      consumes:
      - application/json
      description: Transitions a limit from INACTIVE to DRAFT status. Allows re-editing
        a previously deactivated limit.
      operationId: draftLimit
      parameters:
      - description: Limit ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Limit transitioned to draft successfully
          schema:
            $ref: '#/definitions/Limit'
        "400":
          description: Invalid limit ID or transition
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Limit not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Transition a limit back to draft
      tags:
      - Limits
  /v1/limits/{id}/usage:
    get:
      consumes:
      - application/json
      description: Retrieves current usage snapshot for a limit, showing aggregated
        usage, utilization percentage, and reset time.
      operationId: getLimitUsage
      parameters:
      - description: Limit ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Usage snapshot retrieved successfully
          schema:
            $ref: '#/definitions/UsageSnapshot'
        "400":
          description: Invalid limit ID
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Limit not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get usage snapshot for a limit
      tags:
      - Limits
  /v1/reservations:
    post:
      consumes:
      - application/json
      description: Holds limit capacity for a ledger transaction without committing
        it. Returns one reservation id per counter-backed limit, or denied=true when
        a limit would be exceeded.
      operationId: createReservation
      parameters:
      - description: Reservation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ReserveRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Capacity reserved
          schema:
            $ref: '#/definitions/ReserveResponse'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "413":
          description: Payload too large (exceeds 100KB)
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
        "503":
          description: Service unavailable (context cancelled)
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Reserve transaction capacity (phase one)
      tags:
      - Reservations
  /v1/reservations/{id}/confirm:
    post:
      description: 'Commits a held reservation: the amount moves from reserved to
        current usage. Idempotent — a retry against an already-terminal reservation
        returns 200.'
      operationId: confirmReservation
      parameters:
      - description: Reservation ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Reservation confirmed
          schema:
            $ref: '#/definitions/ReservationActionResponse'
        "400":
          description: Invalid path parameter
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Reservation not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
        "503":
          description: Service unavailable (context cancelled)
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Confirm a reservation (phase two — commit)
      tags:
      - Reservations
  /v1/reservations/{id}/release:
    post:
      description: Returns a held reservation's capacity on an aborted ledger transaction.
        Idempotent — a retry against an already-terminal reservation returns 200.
      operationId: releaseReservation
      parameters:
      - description: Reservation ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Reservation released
          schema:
            $ref: '#/definitions/ReservationActionResponse'
        "400":
          description: Invalid path parameter
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Reservation not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
        "503":
          description: Service unavailable (context cancelled)
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Release a reservation (phase two — abort)
      tags:
      - Reservations
  /v1/reservations/transaction/{transaction_id}/confirm:
    post:
      description: Confirms EVERY held reservation a transaction holds, addressed
        by the ledger transaction id. The ledger /commit drives this with only the
        transaction id. Idempotent — flipped=0 (no reservations, or all already terminal)
        returns 200.
      operationId: confirmReservationByTransaction
      parameters:
      - description: Transaction ID (UUID)
        format: uuid
        in: path
        name: transaction_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Reservations confirmed
          schema:
            $ref: '#/definitions/TransactionActionResponse'
        "400":
          description: Invalid path parameter
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
        "503":
          description: Service unavailable (context cancelled)
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Confirm a transaction's reservations (phase two — commit by transaction)
      tags:
      - Reservations
  /v1/reservations/transaction/{transaction_id}/release:
    post:
      description: Releases EVERY held reservation a transaction holds, addressed
        by the ledger transaction id. The ledger /cancel drives this with only the
        transaction id. Idempotent — flipped=0 returns 200.
      operationId: releaseReservationByTransaction
      parameters:
      - description: Transaction ID (UUID)
        format: uuid
        in: path
        name: transaction_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Reservations released
          schema:
            $ref: '#/definitions/TransactionActionResponse'
        "400":
          description: Invalid path parameter
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
        "503":
          description: Service unavailable (context cancelled)
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Release a transaction's reservations (phase two — abort by transaction)
      tags:
      - Reservations
  /v1/rules:
    get:
      consumes:
      - application/json
      description: Lists rules with cursor-based pagination and optional filters.
        Supports filtering by scope fields to find rules applicable to specific contexts.
        Global rules (empty scopes) are always included in scope-filtered results.
      operationId: listRules
      parameters:
      - description: 'Max items per page (1-100, default: 10)'
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: Pagination cursor (empty for first page)
        in: query
        name: cursor
        type: string
      - description: Filter by name (case-insensitive partial match)
        in: query
        name: name
        type: string
      - description: Filter by status (DELETED not allowed)
        enum:
        - DRAFT
        - ACTIVE
        - INACTIVE
        in: query
        name: status
        type: string
      - description: Filter by action
        enum:
        - ALLOW
        - DENY
        - REVIEW
        in: query
        name: action
        type: string
      - description: Filter by scope account_id (UUID)
        format: uuid
        in: query
        name: account_id
        type: string
      - description: Filter by scope segment_id (UUID)
        format: uuid
        in: query
        name: segment_id
        type: string
      - description: Filter by scope portfolio_id (UUID)
        format: uuid
        in: query
        name: portfolio_id
        type: string
      - description: Filter by scope merchant_id (UUID)
        format: uuid
        in: query
        name: merchant_id
        type: string
      - description: Filter by scope transaction_type
        enum:
        - CARD
        - WIRE
        - PIX
        - CRYPTO
        in: query
        name: transaction_type
        type: string
      - description: Filter by scope sub_type (case-insensitive, normalized to lowercase;
          max 50 chars)
        in: query
        maxLength: 50
        name: sub_type
        type: string
      - description: Sort field
        enum:
        - created_at
        - updated_at
        - name
        - status
        in: query
        name: sort_by
        type: string
      - description: Sort direction
        enum:
        - ASC
        - DESC
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Rules listed successfully
          schema:
            $ref: '#/definitions/ListRulesResponse'
        "400":
          description: Invalid parameters
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List fraud rules
      tags:
      - Rules
    post:
      consumes:
      - application/json
      description: Creates a rule with CEL expression and scopes array. Rules are
        created in DRAFT status.
      operationId: createRule
      parameters:
      - description: Rule details
        in: body
        name: rule
        required: true
        schema:
          $ref: '#/definitions/CreateRuleInput'
      produces:
      - application/json
      responses:
        "201":
          description: Rule created successfully
          schema:
            $ref: '#/definitions/Rule'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Rule name already exists
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Business rule violation (e.g. expression cost limit exceeded)
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create a new fraud rule
      tags:
      - Rules
  /v1/rules/{id}:
    delete:
      consumes:
      - application/json
      description: Soft-deletes a rule (transitions to DELETED status). Only DRAFT
        and INACTIVE rules can be deleted. ACTIVE rules must be deactivated first.
      operationId: deleteRule
      parameters:
      - description: Rule ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Rule deleted successfully
        "400":
          description: Invalid rule ID or transition
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Rule not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Business rule violation (e.g. invalid status transition — active
            rules must be deactivated first)
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a fraud rule
      tags:
      - Rules
    get:
      consumes:
      - application/json
      description: Retrieves a rule by its unique identifier.
      operationId: getRule
      parameters:
      - description: Rule ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Rule retrieved successfully
          schema:
            $ref: '#/definitions/Rule'
        "400":
          description: Invalid rule ID
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Rule not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get a fraud rule by ID
      tags:
      - Rules
    patch:
      consumes:
      - application/json
      description: Partially updates a rule. Only provided fields are updated, omitted
        fields remain unchanged.
      operationId: updateRule
      parameters:
      - description: Rule ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: rule
        required: true
        schema:
          $ref: '#/definitions/UpdateRuleInput'
      produces:
      - application/json
      responses:
        "200":
          description: Rule updated successfully
          schema:
            $ref: '#/definitions/Rule'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Rule not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Rule name already exists
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Business rule violation (e.g. expression cost limit exceeded
            or expression not modifiable)
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Partially update an existing fraud rule
      tags:
      - Rules
  /v1/rules/{id}/activate:
    post:
      consumes:
      - application/json
      description: Activates a rule (DRAFT/INACTIVE → ACTIVE). Validates CEL expression
        before activation.
      operationId: activateRule
      parameters:
      - description: Rule ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Rule activated successfully
          schema:
            $ref: '#/definitions/Rule'
        "400":
          description: Invalid rule ID or transition
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Rule not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Business rule violation (e.g. invalid status transition or
            expression cost exceeded)
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Activate a fraud rule
      tags:
      - Rules
  /v1/rules/{id}/deactivate:
    post:
      consumes:
      - application/json
      description: Deactivates a rule (ACTIVE/DRAFT → INACTIVE).
      operationId: deactivateRule
      parameters:
      - description: Rule ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Rule deactivated successfully
          schema:
            $ref: '#/definitions/Rule'
        "400":
          description: Invalid rule ID or transition
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Rule not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Business rule violation (e.g. invalid status transition)
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Deactivate a fraud rule
      tags:
      - Rules
  /v1/rules/{id}/draft:
    post:
      consumes:
      - application/json
      description: Transitions a rule from INACTIVE to DRAFT status. Allows re-editing
        a previously deactivated rule.
      operationId: draftRule
      parameters:
      - description: Rule ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Rule transitioned to draft successfully
          schema:
            $ref: '#/definitions/Rule'
        "400":
          description: Invalid rule ID or transition
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Rule not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Business rule violation (e.g. invalid status transition)
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Transition a rule back to draft
      tags:
      - Rules
  /v1/validations:
    get:
      consumes:
      - application/json
      description: Lists transaction validation records with cursor-based pagination
        and filters.
      operationId: listValidations
      parameters:
      - description: 'Max items per page (1-1000, default: 100)'
        in: query
        maximum: 1000
        minimum: 1
        name: limit
        type: integer
      - description: Pagination cursor from previous response
        in: query
        name: cursor
        type: string
      - description: 'Field to sort by (default: created_at)'
        enum:
        - created_at
        - processing_time_ms
        in: query
        name: sort_by
        type: string
      - description: 'Sort direction (default: DESC)'
        enum:
        - ASC
        - DESC
        in: query
        name: sort_order
        type: string
      - description: Filter from this date (RFC3339)
        format: date-time
        in: query
        name: start_date
        type: string
      - description: Filter to this date (RFC3339)
        format: date-time
        in: query
        name: end_date
        type: string
      - description: Filter by decision
        enum:
        - ALLOW
        - DENY
        - REVIEW
        in: query
        name: decision
        type: string
      - description: Filter by account ID (UUID)
        format: uuid
        in: query
        name: account_id
        type: string
      - description: Filter by matched rule ID (UUID)
        format: uuid
        in: query
        name: matched_rule_id
        type: string
      - description: Filter by exceeded limit ID (UUID)
        format: uuid
        in: query
        name: exceeded_limit_id
        type: string
      - description: Filter by segment ID (UUID)
        format: uuid
        in: query
        name: segment_id
        type: string
      - description: Filter by portfolio ID (UUID)
        format: uuid
        in: query
        name: portfolio_id
        type: string
      - description: Filter by transaction type
        enum:
        - CARD
        - WIRE
        - PIX
        - CRYPTO
        in: query
        name: transaction_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Transaction validations listed successfully
          schema:
            $ref: '#/definitions/ListTransactionValidationsResponse'
        "400":
          description: Invalid parameters
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List transaction validation records
      tags:
      - Validations
    post:
      consumes:
      - application/json
      description: Validates a transaction against configured rules and limits.
      operationId: validateTransaction
      parameters:
      - description: Validation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ValidationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Duplicate request (idempotent)
          schema:
            $ref: '#/definitions/ValidationResponse'
        "201":
          description: New validation created
          schema:
            $ref: '#/definitions/ValidationResponse'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "413":
          description: Payload too large (exceeds 100KB)
          schema:
            $ref: '#/definitions/ErrorResponse'
        "422":
          description: Business rule violation (e.g. amount exceeds safe precision)
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
        "503":
          description: Service unavailable
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Validate a transaction
      tags:
      - Validations
  /v1/validations/{id}:
    get:
      consumes:
      - application/json
      description: Retrieves a transaction validation record by its unique identifier.
      operationId: getValidation
      parameters:
      - description: Transaction Validation ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Transaction validation retrieved successfully
          schema:
            $ref: '#/definitions/TransactionValidation'
        "400":
          description: Invalid transaction validation ID
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Transaction validation not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get a transaction validation record by ID
      tags:
      - Validations
  /version:
    get:
      consumes:
      - application/json
      description: Returns the current version of the service plus build provenance
      operationId: getVersion
      produces:
      - application/json
      responses:
        "200":
          description: Version information
          schema:
            $ref: '#/definitions/VersionResponse'
      summary: Get service version
      tags:
      - Info
schemes:
- http
- https
securityDefinitions:
  ApiKeyAuth:
    description: API Key for authentication
    in: header
    name: X-API-Key
    type: apiKey
swagger: "2.0"
tags:
- description: CEL-based validation rules.
  name: Rules
- description: Spending limits and usage windows.
  name: Limits
- description: Pre-flight transaction validation decisions.
  name: Validations
- description: 'Two-phase balance reservations: hold, then confirm or release.'
  name: Reservations
- description: Hash-chained audit event trail.
  name: Audit
- description: Liveness and readiness probes.
  name: Health
- description: Service build and version metadata.
  name: Info
