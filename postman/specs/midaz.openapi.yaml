    AuditEvent:
      description: >-
        Immutable audit record for SOX/GLBA compliance. Each event captures who
        performed what action on which resource, the outcome, and a full context
        snapshot. Events are hash-chained to detect tampering; the hash covers
        all core fields.
      example:
        actor: '{}'
        result: ALLOW
        createdAt: '2021-01-01T00:00:00Z'
        eventId: 00000000-0000-0000-0000-000000000000
        metadata:
          key: '{}'
        resourceId: 00000000-0000-0000-0000-000000000000
        previousHash: b4e2f3a5c6d7e8f9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3
        context:
          key: '{}'
        action: VALIDATE
        eventType: TRANSACTION_VALIDATED
        hash: a3f1e2b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2
        resourceType: transaction
      properties:
        action:
          description: >-
            Action performed

            example: VALIDATE

            enums:
            VALIDATE,CREATE,UPDATE,DELETE,ACTIVATE,DEACTIVATE,DRAFT,RESERVE,CONFIRM,RELEASE,EXPIRE,SKIP
          enum:
            - VALIDATE
            - CREATE
            - UPDATE
            - DELETE
            - ACTIVATE
            - DEACTIVATE
            - DRAFT
            - RESERVE
            - CONFIRM
            - RELEASE
            - EXPIRE
            - SKIP
          example: VALIDATE
          type: string
        actor:
          allOf:
            - $ref: '#/components/schemas/Actor'
          description: Actor who performed the action
          type: object
        context:
          additionalProperties:
            type: object
          description: >-
            Context (JSONB): for validations: { request: {...}, response:
            {reason, processingTimeMs, matchedRuleIds, ...} }; for CRUD: {
            before: {...}, after: {...}, reason: "..." }

            Note: accountId, segmentId, portfolioId are in
            context.request.account (not first-level fields)
          type: object
        createdAt:
          description: |-
            Timestamp when the event occurred
            format: date-time
          example: '2021-01-01T00:00:00Z'
          format: date-time
          type: string
        eventId:
          description: |-
            Unique identifier for this audit event
            format: uuid
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        eventType:
          description: >-
            Type of event that occurred

            example: TRANSACTION_VALIDATED

            enums:
            TRANSACTION_VALIDATED,RULE_CREATED,RULE_UPDATED,RULE_ACTIVATED,RULE_DEACTIVATED,RULE_DRAFTED,RULE_DELETED,LIMIT_CREATED,LIMIT_UPDATED,LIMIT_DELETED,LIMIT_ACTIVATED,LIMIT_DEACTIVATED,LIMIT_DRAFTED,RESERVATION_RESERVED,RESERVATION_CONFIRMED,RESERVATION_RELEASED,RESERVATION_EXPIRED,RESERVATION_SKIPPED
          enum:
            - TRANSACTION_VALIDATED
            - RULE_CREATED
            - RULE_UPDATED
            - RULE_ACTIVATED
            - RULE_DEACTIVATED
            - RULE_DRAFTED
            - RULE_DELETED
            - LIMIT_CREATED
            - LIMIT_UPDATED
            - LIMIT_DELETED
            - LIMIT_ACTIVATED
            - LIMIT_DEACTIVATED
            - LIMIT_DRAFTED
            - RESERVATION_RESERVED
            - RESERVATION_CONFIRMED
            - RESERVATION_RELEASED
            - RESERVATION_EXPIRED
            - RESERVATION_SKIPPED
          example: TRANSACTION_VALIDATED
          type: string
        hash:
          description: >-
            SHA-256 hash of this event's fields for tamper detection

            example:
            a3f1e2b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2
          example: a3f1e2b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2
          type: string
        metadata:
          additionalProperties:
            type: object
          description: Additional metadata such as ticketId or correlationId
          type: object
        previousHash:
          description: >-
            Hash of the preceding event in the chain, empty for the first event

            example:
            b4e2f3a5c6d7e8f9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3
          example: b4e2f3a5c6d7e8f9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3
          type: string
        resourceId:
          description: |-
            ID of the resource affected by this event
            example: 00000000-0000-0000-0000-000000000000
          example: 00000000-0000-0000-0000-000000000000
          type: string
        resourceType:
          description: |-
            Type of resource affected
            example: transaction
            enums: transaction,rule,limit,reservation
          enum:
            - transaction
            - rule
            - limit
            - reservation
          example: transaction
          type: string
        result:
          description: >-
            Outcome: ALLOW/DENY/REVIEW for validations; SUCCESS/FAILED for CRUD
            operations

            example: ALLOW

            enums: ALLOW,DENY,REVIEW,SUCCESS,FAILED
          enum:
            - ALLOW
            - DENY
            - REVIEW
            - SUCCESS
            - FAILED
          example: ALLOW
          type: string
      type: object
