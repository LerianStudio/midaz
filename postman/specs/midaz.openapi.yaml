          description: The accounting entry for the cancel action.
          type: object
        commit:
          allOf:
            - $ref: '#/components/schemas/AccountingEntry'
          description: The accounting entry for the commit action.
          type: object
        direct:
          allOf:
            - $ref: '#/components/schemas/AccountingEntry'
          description: The accounting entry for the direct action.
          type: object
        hold:
          allOf:
            - $ref: '#/components/schemas/AccountingEntry'
          description: The accounting entry for the hold action.
          type: object
        overdraft:
          allOf:
            - $ref: '#/components/schemas/AccountingEntry'
          description: >-
            The accounting entry for the overdraft lifecycle. Debit rubric
            classifies

            overdraft usage (deficit grows); credit rubric classifies overdraft

            repayment (deficit shrinks). Both rubrics are REQUIRED when this
            entry

            is present.
          type: object
        revert:
          allOf:
            - $ref: '#/components/schemas/AccountingEntry'
          description: The accounting entry for the revert action.
          type: object
      type: object
    AccountingEntry:
      description: >-
        AccountingEntry object containing debit and credit rubrics for a
        specific action.  Field requirements depend on the parent operationType
        and scenario: - source + direct or commit: debit is REQUIRED, credit is
        optional. - source + hold or cancel: both debit AND credit are REQUIRED.
        - destination + direct or commit: credit is REQUIRED, debit is optional.
        - destination + hold or cancel: NOT ALLOWED (rejected at creation). -
        destination + revert: NOT ALLOWED (rejected at creation). - source +
        revert: NOT ALLOWED (rejected at creation). - bidirectional (all
        scenarios including revert): both debit AND credit are REQUIRED.  An
        entry with neither debit nor credit is always rejected.
      properties:
        credit:
          allOf:
            - $ref: '#/components/schemas/AccountingRubric'
          description: >-
            The credit rubric for this entry. Required based on
            operationType/scenario matrix (see type description).
          type: object
        debit:
          allOf:
            - $ref: '#/components/schemas/AccountingRubric'
          description: >-
            The debit rubric for this entry. Required based on
            operationType/scenario matrix (see type description).
          type: object
      type: object
    AccountingRubric:
      description: >-
        AccountingRubric object containing the code and description for a debit
        or credit entry.
      properties:
        code:
          description: The accounting rubric code.
          example: '1001'
          maxLength: 50
          type: string
        description:
          description: The accounting rubric description.
          example: Cash
          maxLength: 250
          type: string
      required:
        - code
        - description
      type: object
    AccountingValidation:
      properties:
        requireHolder:
          description: >-
            RequireHolder enables enforcement that accounts must reference an
            existing holder.

            When true, account creation rejects accounts whose resolved holder
            does not exist.

            Default: false (permissive - no validation)
          example: false
          type: boolean
        validateAccountType:
          description: >-
