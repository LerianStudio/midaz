            direct

            transaction) gets the short reaper-swept TTL; true (a PENDING
            transaction)

            gets the long-lived TTL so the reservation does not expire under a

            still-valid pending that has no existing sweep (R18). It is a
            sibling wire

            field, NOT part of the embedded ValidationRequest, so the relaxed
            reserve

            validation never sees it.
          example: false
          type: boolean
        transactionId:
          description: >-
            TransactionID is the ledger transaction correlation id. It is the

            idempotency grain for retried reserves and the handle the ledger
            later

            confirms or releases. Not a foreign key — the ledger transaction
            lives in a

            different service.
          format: uuid
          type: string
