components:
  schemas:
    Account:
      description: >-
        Complete account entity containing all fields including system-generated
        fields like ID, creation timestamps, and metadata. This is the response
        format for account operations. Accounts represent individual financial
        entities (bank accounts, cards, expense categories, etc.) within a
        ledger and are the primary structures for tracking balances and
        transactions.
      example:
        metadata:
          key: '{}'
        assetCode: USD
        holderCheckSkipped: false
        entityId: EXT-ACC-12345
        type: deposit
        holderId: 00000000-0000-0000-0000-000000000000
        ledgerId: 00000000-0000-0000-0000-000000000000
        organizationId: 00000000-0000-0000-0000-000000000000
        parentAccountId: 00000000-0000-0000-0000-000000000000
        createdAt: '2021-01-01T00:00:00Z'
        deletedAt: '2021-01-01T00:00:00Z'
        portfolioId: 00000000-0000-0000-0000-000000000000
        blocked: true
        segmentId: 00000000-0000-0000-0000-000000000000
        name: Corporate Checking Account
        alias: '@treasury_checking'
        id: 00000000-0000-0000-0000-000000000000
        status: '{}'
        updatedAt: '2021-01-01T00:00:00Z'
      properties:
        alias:
          description: |-
            Unique alias for the account (makes referencing easier)
            example: @treasury_checking
            maxLength: 100
          example: '@treasury_checking'
          maxLength: 100
          type: string
        assetCode:
          description: >-
            Asset code associated with this account (determines currency/asset
            type)

            example: USD

            maxLength: 100
          example: USD
          maxLength: 100
          type: string
        blocked:
          description: Indicates if the account is blocked
          type: boolean
        createdAt:
          description: |-
            Timestamp when the account was created (RFC3339 format)
            example: 2021-01-01T00:00:00Z
            format: date-time
          example: '2021-01-01T00:00:00Z'
          format: date-time
          type: string
        deletedAt:
