    Limit:
      description: >-
        A transaction spending limit enforced during validation. Limits
        accumulate usage across a configurable period
        (DAILY/WEEKLY/MONTHLY/CUSTOM/PER_TRANSACTION) and block or flag
        transactions that would exceed the configured MaxAmount for the matched
        currency and scope.
      example:
        resetAt: '2021-01-02T00:00:00Z'
        customEndDate: '2021-12-31T23:59:59Z'
        activeTimeEnd: '17:00'
        description: Caps daily USD outflows for retail accounts
        limitId: 00000000-0000-0000-0000-000000000000
        limitType: DAILY
        activeTimeStart: '09:00'
        createdAt: '2021-01-01T00:00:00Z'
        deletedAt: '2021-01-01T00:00:00Z'
        name: Daily USD spending cap
        currency: USD
        scopes:
          - transactionType: CARD
            accountId: 00000000-0000-0000-0000-000000000000
            portfolioId: 00000000-0000-0000-0000-000000000000
            merchantId: 00000000-0000-0000-0000-000000000000
            segmentId: 00000000-0000-0000-0000-000000000000
            subType: purchase
          - transactionType: CARD
            accountId: 00000000-0000-0000-0000-000000000000
            portfolioId: 00000000-0000-0000-0000-000000000000
            merchantId: 00000000-0000-0000-0000-000000000000
            segmentId: 00000000-0000-0000-0000-000000000000
            subType: purchase
        maxAmount: '1000.00'
        customStartDate: '2021-01-01T00:00:00Z'
        status: ACTIVE
        updatedAt: '2021-01-01T00:00:00Z'
      properties:
        activeTimeEnd:
          description: >-
            End of the daily time window when the limit is active (HH:MM), null
            means 24/7
          example: '17:00'
          type: string
        activeTimeStart:
          description: >-
            Start of the daily time window when the limit is active (HH:MM),
            null means 24/7
          example: '09:00'
          type: string
        createdAt:
          description: |-
            Timestamp when the limit was created
            format: date-time
          example: '2021-01-01T00:00:00Z'
          format: date-time
          type: string
        currency:
          description: |-
            ISO 4217 currency code this limit applies to
            example: USD
          example: USD
          type: string
        customEndDate:
          description: |-
            End of custom period (only for CUSTOM limitType)
            format: date-time
          example: '2021-12-31T23:59:59Z'
          format: date-time
          type: string
        customStartDate:
          description: |-
            Start of custom period (only for CUSTOM limitType)
            format: date-time
          example: '2021-01-01T00:00:00Z'
          format: date-time
          type: string
        deletedAt:
          description: |-
            Timestamp when the limit was soft deleted, null if not deleted
            format: date-time
          example: '2021-01-01T00:00:00Z'
          format: date-time
          type: string
        description:
          description: |-
            Optional description of the limit's purpose
            example: Caps daily USD outflows for retail accounts
          example: Caps daily USD outflows for retail accounts
          type: string
        limitId:
          description: |-
            Unique identifier for the limit
            format: uuid
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        limitType:
          description: |-
            Period type for usage accumulation
            enums: DAILY,WEEKLY,MONTHLY,CUSTOM,PER_TRANSACTION
          enum:
            - DAILY
            - WEEKLY
            - MONTHLY
            - CUSTOM
            - PER_TRANSACTION
          example: DAILY
          type: string
        maxAmount:
          description: Maximum amount allowed within the period
          example: '1000.00'
          type: string
        name:
          description: |-
            Human-readable name of the limit
            example: Daily USD spending cap
            maxLength: 255
          example: Daily USD spending cap
          maxLength: 255
          type: string
        resetAt:
          description: |-
            Next reset timestamp, null for PER_TRANSACTION limits
            format: date-time
          example: '2021-01-02T00:00:00Z'
          format: date-time
          type: string
        scopes:
          description: Scopes that restrict which transactions this limit applies to
          items:
            $ref: '#/components/schemas/Scope'
          type: array
        status:
          description: |-
            Current lifecycle status of the limit
            enums: DRAFT,ACTIVE,INACTIVE,DELETED
          enum:
            - DRAFT
            - ACTIVE
            - INACTIVE
            - DELETED
          example: ACTIVE
          type: string
        updatedAt:
          description: |-
            Timestamp when the limit was last updated
            format: date-time
          example: '2021-01-01T00:00:00Z'
          format: date-time
          type: string
      type: object
    LimitUsageDetail:
      example:
        period: DAILY
        exceeded: true
        attemptedAmount: '100.00'
        scope: account:00000000-0000-0000-0000-000000000000
        currentUsage: '500.00'
        limitAmount: '1000.00'
        limitId: 00000000-0000-0000-0000-000000000000
        skipReason: outside_time_window
        skipped: true
      properties:
        attemptedAmount:
          description: >-
            AttemptedAmount is the transaction amount being validated against
            this limit.

            Matches the amount from the validation request.
          example: '100.00'
          type: string
        currentUsage:
          description: >-
            CurrentUsage represents the PROJECTED usage after applying the
            transaction amount,

            not the actual persisted counter value. This is calculated as:

            (counter.CurrentUsage + input.Amount) for
            DAILY/WEEKLY/MONTHLY/CUSTOM limits, or 0 for PER_TRANSACTION.

            When Exceeded=true, the counter was NOT incremented, but
            CurrentUsage still shows

            what the usage would have been if the transaction were allowed.
          example: '500.00'
          type: string
        exceeded:
          type: boolean
        limitAmount:
          example: '1000.00'
          type: string
        limitId:
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        period:
          description: >-
            Period indicates the type of limit (DAILY, WEEKLY, MONTHLY, CUSTOM,
            PER_TRANSACTION).
          enum:
            - DAILY
            - MONTHLY
            - PER_TRANSACTION
            - WEEKLY
            - CUSTOM
          example: DAILY
          type: string
        scope:
          description: |-
            Scope is a human-readable string representation of the limit's scope
            (e.g., "account:uuid" or "segment:uuid" or "global").
          example: account:00000000-0000-0000-0000-000000000000
          type: string
        skipReason:
          description: >-
            SkipReason explains why the limit was skipped (only set when
            Skipped=true).

            Values: "outside_time_window" (outside active hours),
            "outside_custom_period" (outside custom date range).
          example: outside_time_window
          type: string
        skipped:
          description: >-
            Skipped indicates whether this limit was skipped during evaluation
            (not enforced).

            When true, the counter was NOT incremented and Exceeded is always
            false.
          type: boolean
      type: object
