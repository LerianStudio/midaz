      description: >-
        Creates a new account within the specified ledger. Accounts represent
        individual financial entities like bank accounts, credit cards, or
        expense categories. An optional 'skip' object (see AccountSkip) carries
        per-call control opt-outs; skip.holder requests bypassing the holder
        existence check. A skip is honored only when the request asks
        (skip.holder=true) AND the ledger opts into it via
        overrides.allowHolderSkip=true; a skip requested without the override is
        rejected with HTTP 422 (error 0490, ErrSkipNotPermitted) regardless of
        accounting.requireHolder (which only governs whether the holder
        existence check would otherwise run).
