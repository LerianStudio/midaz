openapi: 3.0.1
info:
  contact:
    name: Discord community
    url: https://discord.gg/DnhqKwkGv3
  description: >-
    This is a swagger documentation for the Midaz Ledger API. This unified
    service combines Onboarding endpoints (organizations, ledgers, accounts,
    assets, portfolios, segments), Transaction endpoints (transactions,
    balances, operations, asset-rates), Holders and Instruments endpoints
    (holder and instrument account management), Fees endpoints (packages,
    estimates, billing), the Holder-Account composition endpoint, and Metadata
    Index endpoints in a single service.
  license:
    name: Elastic License 2.0
    url: https://www.elastic.co/licensing/elastic-license
  termsOfService: https://www.elastic.co/licensing/elastic-license
  title: Midaz Ledger API
  version: 4.0.0
tags:
  - description: Top-level tenant entities that own ledgers and all nested resources.
    name: Midaz_Ledger_API_Organizations
    x-displayName: Organizations
  - description: Bookkeeping containers scoping assets, accounts, and transactions.
    name: Midaz_Ledger_API_Ledgers
    x-displayName: Ledgers
  - description: Balance-holding entries that transactions debit and credit.
    name: Midaz_Ledger_API_Accounts
    x-displayName: Accounts
  - description: Currencies and instruments tracked within a ledger.
    name: Midaz_Ledger_API_Assets
    x-displayName: Assets
  - description: Logical groupings of accounts under a holder.
    name: Midaz_Ledger_API_Portfolios
    x-displayName: Portfolios
  - description: Sub-classifications for organizing accounts.
    name: Midaz_Ledger_API_Segments
    x-displayName: Segments
  - description: Reusable account classification definitions.
    name: Midaz_Ledger_API_Account Types
    x-displayName: Account Types
  - description: Double-entry postings that move value between accounts.
    name: Midaz_Ledger_API_Transactions
    x-displayName: Transactions
  - description: Per-account available, on-hold, and scale state.
    name: Midaz_Ledger_API_Balances
    x-displayName: Balances
  - description: The individual debit and credit legs of a transaction.
    name: Midaz_Ledger_API_Operations
    x-displayName: Operations
  - description: Conversion rates between assets.
    name: Midaz_Ledger_API_Asset Rates
    x-displayName: Asset Rates
  - description: Templates constraining which accounts an operation leg may touch.
    name: Midaz_Ledger_API_Operation Routes
    x-displayName: Operation Routes
  - description: Ordered sets of operation routes describing a transaction shape.
    name: Midaz_Ledger_API_Transaction Routes
    x-displayName: Transaction Routes
  - description: Index definitions over entity metadata for queryable lookups.
    name: Midaz_Ledger_API_Metadata Indexes
    x-displayName: Metadata Indexes
  - description: Holder identity records (the party behind accounts).
    name: Midaz_Ledger_API_Holders
    x-displayName: Holders
  - description: Financial instrument records bound to holders.
    name: Midaz_Ledger_API_Instruments
    x-displayName: Instruments
  - description: Holder + account creation in a single call.
    name: Midaz_Ledger_API_Composition
    x-displayName: Composition
  - description: Fee package definitions applied during transaction processing.
    name: Midaz_Ledger_API_Packages
    x-displayName: Packages
  - description: Fee estimation and application for transactions.
    name: Midaz_Ledger_API_Fees
    x-displayName: Fees
  - description: Billing package definitions for charge aggregation.
    name: Midaz_Ledger_API_Billing Packages
    x-displayName: Billing Packages
  - description: On-demand billing charge calculation.
    name: Midaz_Ledger_API_Billing Calculate
    x-displayName: Billing Calculate
  - description: CEL-based validation rules.
    name: Midaz_Tracer_API_Rules
    x-displayName: Rules
  - description: Spending limits and usage windows.
    name: Midaz_Tracer_API_Limits
    x-displayName: Limits
  - description: Pre-flight transaction validation decisions.
    name: Midaz_Tracer_API_Validations
    x-displayName: Validations
  - description: 'Two-phase balance reservations: hold, then confirm or release.'
    name: Midaz_Tracer_API_Reservations
    x-displayName: Reservations
  - description: Hash-chained audit event trail.
    name: Midaz_Tracer_API_Audit
    x-displayName: Audit
  - description: Liveness and readiness probes.
    name: Midaz_Tracer_API_Health
    x-displayName: Health
  - description: Service build and version metadata.
    name: Midaz_Tracer_API_Info
    x-displayName: Info
paths:
  /v1/organizations:
    servers:
      - url: http://localhost:3002/
      - url: https://localhost:3002/
    get:
      description: >-
        Returns a paginated list of organizations, optionally filtered by
        metadata, date range, and other criteria
      parameters:
        - description: Request ID for tracing
          in: header
          name: X-Request-Id
          schema:
            type: string
        - description: JSON string to filter organizations by metadata fields
          in: query
          name: metadata
          schema:
            type: string
        - description: Maximum number of records to return per page
          in: query
          name: limit
          schema:
            default: 10
            maximum: 100
            minimum: 1
            type: integer
        - description: Page number for pagination
          in: query
          name: page
          schema:
            default: 1
            minimum: 1
            type: integer
        - description: >-
            Filter organizations created on or after this date (format:
            YYYY-MM-DD)
          in: query
          name: start_date
          schema:
            type: string
        - description: >-
            Filter organizations created on or before this date (format:
            YYYY-MM-DD)
          in: query
          name: end_date
          schema:
            type: string
        - description: Sort direction for results based on creation date
          in: query
          name: sort_order
          schema:
            enum:
              - asc
              - desc
            type: string
        - description: Filter organizations by legal name (case-insensitive, prefix match)
          in: query
          name: legal_name
          schema:
            maxLength: 256
            type: string
        - description: >-
            Filter organizations by doing business as name (case-insensitive,
            prefix match)
          in: query
          name: doing_business_as
          schema:
            maxLength: 256
            type: string
        - description: Filter organizations by status
          in: query
          name: status
          schema:
            type: string
        - description: Filter organizations by legal document (exact match)
          in: query
          name: legal_document
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_v1_organizations_get_200_response'
          description: Successfully retrieved organizations list
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid query parameters
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
        - BearerAuth: []
      summary: List all organizations
      tags:
        - Midaz_Ledger_API_Organizations
    post:
      description: >-
        Creates a new organization with the provided details including legal
        name, legal document, and optional address information
      parameters:
        - description: Request ID for tracing
          in: header
          name: X-Request-Id
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationInput'
        description: >-
          Organization details including legal name, legal document, and
          optional address information
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: Successfully created organization
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid input, validation errors
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
        - BearerAuth: []
      summary: Create a new organization
      tags:
        - Midaz_Ledger_API_Organizations
      x-codegen-request-body-name: organization
  /v1/organizations/metrics/count:
    servers:
      - url: http://localhost:3002/
      - url: https://localhost:3002/
    head:
      description: >-
        Returns the total count of organizations as a header without a response
        body
      parameters:
        - description: Request ID for tracing
          in: header
          name: X-Request-Id
          schema:
            type: string
      responses:
        '204':
          content: {}
          description: No content with X-Total-Count header containing the count
        '401':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        '403':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        '404':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Organization not found
        '500':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
        - BearerAuth: []
      summary: Count total organizations
      tags:
        - Midaz_Ledger_API_Organizations
  /v1/organizations/{organization_id}:
    servers:
      - url: http://localhost:3002/
      - url: https://localhost:3002/
    delete:
      description: >-
        Permanently removes an organization identified by its UUID. Note: This
        operation is not available in production environments.
      parameters:
        - description: Request ID for tracing
          in: header
          name: X-Request-Id
          schema:
            type: string
        - description: Organization ID in UUID format
          in: path
          name: organization_id
          required: true
          schema:
            type: string
      responses:
        '204':
          content: {}
          description: Organization successfully deleted
        '401':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        '403':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden action or not permitted in production environment
        '404':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Organization not found
        '409':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: 'Conflict: Cannot delete organization with dependent resources'
        '500':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
        - BearerAuth: []
      summary: Delete an organization
      tags:
        - Midaz_Ledger_API_Organizations
    get:
      description: >-
        Returns detailed information about an organization identified by its
        UUID
      parameters:
        - description: Request ID for tracing
          in: header
          name: X-Request-Id
          schema:
            type: string
        - description: Organization ID in UUID format
          in: path
          name: organization_id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: Successfully retrieved organization
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Organization not found
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
        - BearerAuth: []
      summary: Retrieve a specific organization
      tags:
        - Midaz_Ledger_API_Organizations
    patch:
      description: >-
        Updates an organization's information such as legal name, address, or
        status. Only supplied fields will be updated.
      parameters:
        - description: Request ID for tracing
          in: header
          name: X-Request-Id
          schema:
            type: string
        - description: Organization ID in UUID format
          in: path
          name: organization_id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationInput'
        description: Organization fields to update. Only supplied fields will be modified.
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: Successfully updated organization
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid input, validation errors
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Organization not found
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
        - BearerAuth: []
      summary: Update an existing organization
      tags:
        - Midaz_Ledger_API_Organizations
      x-codegen-request-body-name: organization
  /v1/organizations/{organization_id}/billing-packages:
    servers:
      - url: http://localhost:3002/
      - url: https://localhost:3002/
    get:
      description: List all billing packages
      parameters:
        - description: Request ID for tracing
          in: header
          name: X-Request-Id
          schema:
            type: string
        - description: Organization ID in UUID format
          in: path
          name: organization_id
          required: true
          schema:
            type: string
        - description: >-
            Filter by ledger ID in UUID format (optional — omit to list all
            packages for the organization)
          in: query
          name: ledgerId
          schema:
            type: string
        - description: Filter by billing package type
          in: query
          name: type
          schema:
            enum:
              - volume
              - maintenance
            type: string
        - description: Number of items per page
          in: query
          name: limit
          schema:
            default: 10
            type: integer
        - description: Page number
          in: query
          name: page
          schema:
            default: 1
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/_v1_organizations__organization_id__billing_packages_get_200_response
          description: Successfully retrieved billing packages list
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid query parameters
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
        - BearerAuth: []
      summary: Get all billing packages
      tags:
        - Midaz_Ledger_API_Billing Packages
    post:
      description: Create a BillingPackage with the input payload
      parameters:
        - description: Request ID for tracing
          in: header
          name: X-Request-Id
          schema:
            type: string
        - description: Organization ID in UUID format
          in: path
          name: organization_id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingPackage'
        description: BillingPackage Input
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingPackage'
          description: Successfully created billing package
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid input, validation errors
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: >-
            Conflict: a billing package already exists for this organization,
            ledger, and transaction route
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
        - BearerAuth: []
      summary: Create a BillingPackage
      tags:
        - Midaz_Ledger_API_Billing Packages
      x-codegen-request-body-name: billingPackage
  /v1/organizations/{organization_id}/billing-packages/{id}:
    servers:
      - url: http://localhost:3002/
      - url: https://localhost:3002/
    delete:
      description: SoftDelete a BillingPackage with the input ID
      parameters:
        - description: Request ID for tracing
          in: header
          name: X-Request-Id
          schema:
            type: string
        - description: Organization ID in UUID format
          in: path
          name: organization_id
          required: true
          schema:
            type: string
        - description: BillingPackage ID in UUID format
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          content: {}
          description: Billing package successfully deleted
        '400':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid input, validation errors
        '401':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        '403':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        '404':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Billing package not found
        '500':
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
        - BearerAuth: []
      summary: SoftDelete a BillingPackage by ID
      tags:
        - Midaz_Ledger_API_Billing Packages
    get:
      description: Get a billing package by id
      parameters:
        - description: Request ID for tracing
          in: header
          name: X-Request-Id
          schema:
            type: string
        - description: Organization ID in UUID format
          in: path
          name: organization_id
          required: true
          schema:
            type: string
        - description: BillingPackage ID in UUID format
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingPackage'
          description: Successfully retrieved billing package
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid input, validation errors
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Billing package not found
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
        - BearerAuth: []
      summary: Get billing package
      tags:
        - Midaz_Ledger_API_Billing Packages
    patch:
      description: Update a billing package with the input payload
      parameters:
        - description: Request ID for tracing
          in: header
          name: X-Request-Id
          schema:
            type: string
        - description: Organization ID in UUID format
          in: path
          name: organization_id
          required: true
          schema:
            type: string
        - description: BillingPackage ID in UUID format
          in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingPackageUpdate'
        description: Update BillingPackage Input
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingPackage'
          description: Successfully updated billing package
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid input, validation errors
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Billing package not found
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
        - BearerAuth: []
      summary: Update a billing package
      tags:
        - Midaz_Ledger_API_Billing Packages
      x-codegen-request-body-name: billingPackage
  /v1/organizations/{organization_id}/billing/calculate:
    servers:
      - url: http://localhost:3002/
      - url: https://localhost:3002/
    post:
      description: Calculate billing for a given organization, ledger, and period
      parameters:
        - description: Request ID for tracing
          in: header
          name: X-Request-Id
          schema:
            type: string
        - description: Organization ID in UUID format
          in: path
          name: organization_id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingCalculateRequest'
        description: Billing Calculation Input
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCalculateResponse'
          description: Billing calculation completed successfully
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid input, validation errors
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Organization or ledger not found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: >-
            Business validation failed (e.g. invalid billing period or package
            type)
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
        - BearerAuth: []
      summary: Calculate billing
      tags:
        - Midaz_Ledger_API_Billing Calculate
      x-codegen-request-body-name: billingCalculate
  /v1/organizations/{organization_id}/estimates:
    servers:
      - url: http://localhost:3002/
      - url: https://localhost:3002/
    post:
      description: >-
        Performs a dry-run fee estimate for the given payload and returns the
        fees that would be applied, without creating or persisting any resource.
      parameters:
        - description: Request ID for tracing
          in: header
          name: X-Request-Id
          schema:
            type: string
        - description: Organization ID in UUID format
          in: path
          name: organization_id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeeEstimate'
        description: Fee Input
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeeEstimateResponse'
          description: Successfully estimated fee
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid input, validation errors
        '401':
          content:
