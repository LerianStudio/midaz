        reserve. A skip is honored only when the ledger opts into it via the
        matching override (overrides.allowFeeSkip / overrides.allowTracerSkip);
        a skip requested without the override is rejected with HTTP 422 (error
        0490, ErrSkipNotPermitted). On an idempotency replay the first
        transaction's outcome is returned and a replayer's differing skip is
        ignored.
