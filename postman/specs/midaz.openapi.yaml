        schema-aware deep merge. Only known settings fields are allowed -
        unknown fields return error 0147 (ErrUnknownSettingsField). Type
        validation is enforced - incorrect types return error 0148
        (ErrInvalidSettingsFieldType). Nested objects (like 'accounting') are
        deep-merged, preserving existing properties not specified in the update.
        Example: updating only 'accounting.validateRoutes' preserves the
        existing 'accounting.validateAccountType' value. Allowed fields:
        accounting.validateAccountType (boolean), accounting.validateRoutes
        (boolean), accounting.requireHolder (boolean), overrides.allowFeeSkip
        (boolean, default false), overrides.allowTracerSkip (boolean, default
        false), overrides.allowHolderSkip (boolean, default false). Each
        overrides.allow*Skip opt-in, when true, permits callers to skip the
        matching per-call control (fee/tracer on transaction creation, holder on
        account creation); all default false so no control can be skipped
        without an explicit opt-in.
      parameters:
        - description: Request ID for tracing
          in: header
