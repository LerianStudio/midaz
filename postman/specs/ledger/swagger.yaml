basePath: /
definitions:
  Account:
    description: Complete account entity containing all fields including system-generated
      fields like ID, creation timestamps, and metadata. This is the response format
      for account operations. Accounts represent individual financial entities (bank
      accounts, cards, expense categories, etc.) within a ledger and are the primary
      structures for tracking balances and transactions.
    properties:
      alias:
        description: |-
          Unique alias for the account (makes referencing easier)
          example: @treasury_checking
          maxLength: 100
        example: '@treasury_checking'
        maxLength: 100
        type: string
      assetCode:
        description: |-
          Asset code associated with this account (determines currency/asset type)
          example: USD
          maxLength: 100
        example: USD
        maxLength: 100
        type: string
      blocked:
        description: Indicates if the account is blocked
        type: boolean
      createdAt:
        description: |-
          Timestamp when the account was created (RFC3339 format)
          example: 2021-01-01T00:00:00Z
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      deletedAt:
        description: |-
          Timestamp when the account was soft deleted, null if not deleted (RFC3339 format)
          example: null
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      entityId:
        description: |-
          Free-form external reference for linking to external systems. This is NOT the
          ownership link: holderId is the formal owner of the account.
          example: EXT-ACC-12345
          maxLength: 256
        example: EXT-ACC-12345
        maxLength: 256
        type: string
      holderId:
        description: |-
          ID of the holder that formally owns this account (UUID format)
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      id:
        description: |-
          Unique identifier for the account (UUID format)
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      ledgerId:
        description: |-
          ID of the ledger this account belongs to (UUID format)
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      metadata:
        additionalProperties: {}
        description: |-
          Custom key-value pairs for extending the account information
          example: {"department": "Treasury", "purpose": "Operating Expenses", "region": "Global"}
        type: object
      name:
        description: |-
          Human-readable name of the account
          example: Corporate Checking Account
          maxLength: 256
        example: Corporate Checking Account
        maxLength: 256
        type: string
      organizationId:
        description: |-
          ID of the organization that owns this account (UUID format)
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      parentAccountId:
        description: |-
          ID of the parent account if this is a sub-account (UUID format)
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      portfolioId:
        description: |-
          ID of the portfolio this account belongs to (UUID format)
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      segmentId:
        description: |-
          ID of the segment this account belongs to (UUID format)
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      status:
        allOf:
        - $ref: '#/definitions/Status'
        description: Current operating status of the account
      type:
        description: |-
          Type of the account.
          example: deposit
        example: deposit
        type: string
      updatedAt:
        description: |-
          Timestamp when the account was last updated (RFC3339 format)
          example: 2021-01-01T00:00:00Z
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
    type: object
  AccountRule:
    description: AccountRule object containing the rule type and condition for account
      selection in operation routes.
    properties:
      ruleType:
        description: The rule type for account selection.
        example: alias
        type: string
      validIf:
        description: The rule condition for account selection. String for alias type
          (e.g. "@cash_account"), array for account_type.
    type: object
  AccountType:
    description: AccountType object
    properties:
      createdAt:
        description: The timestamp when the account type was created.
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      deletedAt:
        description: The timestamp when the account type was deleted.
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      description:
        description: Detailed description of the account type.
        example: Assets that are expected to be converted to cash within one year
        type: string
      id:
        description: The unique identifier of the Account Type.
        example: 01965ed9-7fa4-75b2-8872-fc9e8509ab0a
        type: string
      keyValue:
        description: A unique key value identifier for the account type.
        example: current_assets
        type: string
      ledgerId:
        description: The unique identifier of the Ledger.
        example: 01965ed9-7fa4-75b2-8872-fc9e8509ab0a
        type: string
      metadata:
        additionalProperties: {}
        description: |-
          Custom key-value pairs for extending the account type information
          example: {"department": "Treasury", "purpose": "Operating Expenses", "region": "Global"}
        type: object
      name:
        description: The name of the account type.
        example: Current Assets
        type: string
      organizationId:
        description: The unique identifier of the Organization.
        example: 01965ed9-7fa4-75b2-8872-fc9e8509ab0a
        type: string
      updatedAt:
        description: The timestamp when the account type was last updated.
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
    type: object
  AccountingEntries:
    description: AccountingEntries object containing optional accounting entries for
      each action type (direct, hold, commit, cancel, revert, overdraft, refund).
    properties:
      cancel:
        allOf:
        - $ref: '#/definitions/AccountingEntry'
        description: The accounting entry for the cancel action.
      commit:
        allOf:
        - $ref: '#/definitions/AccountingEntry'
        description: The accounting entry for the commit action.
      direct:
        allOf:
        - $ref: '#/definitions/AccountingEntry'
        description: The accounting entry for the direct action.
      hold:
        allOf:
        - $ref: '#/definitions/AccountingEntry'
        description: The accounting entry for the hold action.
      overdraft:
        allOf:
        - $ref: '#/definitions/AccountingEntry'
        description: |-
          The accounting entry for the overdraft lifecycle. Debit rubric classifies
          overdraft usage (deficit grows); credit rubric classifies overdraft
          repayment (deficit shrinks). Both rubrics are REQUIRED when this entry
          is present.
      revert:
        allOf:
        - $ref: '#/definitions/AccountingEntry'
        description: The accounting entry for the revert action.
    type: object
  AccountingEntry:
    description: 'AccountingEntry object containing debit and credit rubrics for a
      specific action.  Field requirements depend on the parent operationType and
      scenario: - source + direct or commit: debit is REQUIRED, credit is optional.
      - source + hold or cancel: both debit AND credit are REQUIRED. - destination
      + direct or commit: credit is REQUIRED, debit is optional. - destination + hold
      or cancel: NOT ALLOWED (rejected at creation). - destination + revert: NOT ALLOWED
      (rejected at creation). - source + revert: NOT ALLOWED (rejected at creation).
      - bidirectional (all scenarios including revert): both debit AND credit are
      REQUIRED.  An entry with neither debit nor credit is always rejected.'
    properties:
      credit:
        allOf:
        - $ref: '#/definitions/AccountingRubric'
        description: The credit rubric for this entry. Required based on operationType/scenario
          matrix (see type description).
      debit:
        allOf:
        - $ref: '#/definitions/AccountingRubric'
        description: The debit rubric for this entry. Required based on operationType/scenario
          matrix (see type description).
    type: object
  AccountingRubric:
    description: AccountingRubric object containing the code and description for a
      debit or credit entry.
    properties:
      code:
        description: The accounting rubric code.
        example: "1001"
        maxLength: 50
        type: string
      description:
        description: The accounting rubric description.
        example: Cash
        maxLength: 250
        type: string
    required:
    - code
    - description
    type: object
  Address:
    description: Structured address information following standard postal address
      format. Country field follows ISO 3166-1 alpha-2 standard (2-letter country
      codes). Used for organization physical locations and other address needs.
    properties:
      city:
        description: |-
          City or locality name
          example: New York
          maxLength: 100
        example: New York
        maxLength: 100
        type: string
      country:
        description: |-
          Country code in ISO 3166-1 alpha-2 format (two-letter country code)
          example: US
          minLength: 2
          maxLength: 2
        example: US
        maxLength: 2
        minLength: 2
        type: string
      description:
        description: |-
          A descriptive label for the address (e.g., "Home", "Office", "Billing")
          example: Home
          maxLength: 100
        example: Home
        maxLength: 100
        type: string
      line1:
        description: |-
          Primary address line (street address or PO Box)
          example: 123 Financial Avenue
          maxLength: 256
        example: 123 Financial Avenue
        maxLength: 256
        type: string
      line2:
        description: |-
          Secondary address information like apartment number, suite, or floor
          example: Suite 1500
          maxLength: 256
        example: Suite 1500
        maxLength: 256
        type: string
      state:
        description: |-
          State, province, or region name or code
          example: NY
          maxLength: 100
        example: NY
        maxLength: 100
        type: string
      zipCode:
        description: |-
          Postal code or ZIP code
          example: 10001
          maxLength: 20
        example: "10001"
        maxLength: 20
        type: string
    type: object
  Addresses:
    description: Addresses object
    properties:
      additional1:
        $ref: '#/definitions/Address'
      additional2:
        $ref: '#/definitions/Address'
      primary:
        $ref: '#/definitions/Address'
    type: object
  Amount:
    description: Amount is the struct designed to represent the amount of an operation.
      Contains the value and scale (decimal places) of an operation amount.
    properties:
      value:
        description: |-
          The amount value in the smallest unit of the asset (e.g., cents)
          example: 1500
          minimum: 0
        example: 1500
        minimum: 0
        type: number
    type: object
  Asset:
    description: Asset represents a financial instrument within a ledger, such as
      a currency, cryptocurrency, commodity, or other asset type.
    properties:
      code:
        description: Unique code/symbol for the asset (max length 100 characters)
        example: USD
        maxLength: 100
        type: string
      createdAt:
        description: Timestamp when the asset was created
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      deletedAt:
        description: Timestamp when the asset was deleted (null if not deleted)
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      id:
        description: Unique identifier for the asset (UUID format)
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      ledgerId:
        description: ID of the ledger this asset belongs to (UUID format)
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      metadata:
        additionalProperties: {}
        description: Additional custom attributes for the asset
        type: object
      name:
        description: Name of the asset (max length 256 characters)
        example: US Dollar
        maxLength: 256
        type: string
      organizationId:
        description: ID of the organization that owns this asset (UUID format)
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      status:
        allOf:
        - $ref: '#/definitions/Status'
        description: Status of the asset (active, inactive, pending)
      type:
        description: Type of the asset (e.g., currency, cryptocurrency, commodity,
          stock)
        example: currency
        type: string
      updatedAt:
        description: Timestamp when the asset was last updated
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
    type: object
  AssetRate:
    description: AssetRate is a struct designed to store asset rate data. Represents
      a complete asset rate entity containing conversion information between two assets,
      including all system-generated fields.
    properties:
      createdAt:
        description: |-
          Timestamp when the asset rate was created
          example: 2021-01-01T00:00:00Z
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      externalId:
        description: |-
          External identifier for integration with third-party systems
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      from:
        description: |-
          Source asset code
          example: USD
          minLength: 2
          maxLength: 10
        example: USD
        maxLength: 10
        minLength: 2
        type: string
      id:
        description: |-
          Unique identifier for the asset rate
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      ledgerId:
        description: |-
          Ledger containing this asset rate
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      metadata:
        additionalProperties: {}
        description: |-
          Additional custom attributes
          example: {"provider": "Central Bank", "rateName": "Official Exchange Rate"}
        type: object
      organizationId:
        description: |-
          Organization that owns this asset rate
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      rate:
        description: |-
          Conversion rate value
          example: 100
        example: 100
        type: number
      scale:
        description: |-
          Decimal places for the rate
          example: 2
          minimum: 0
        example: 2
        minimum: 0
        type: number
      source:
        description: |-
          Source of rate information
          example: External System
          maxLength: 200
        example: External System
        maxLength: 200
        type: string
      to:
        description: |-
          Target asset code
          example: BRL
          minLength: 2
          maxLength: 10
        example: BRL
        maxLength: 10
        minLength: 2
        type: string
      ttl:
        description: |-
          Time-to-live in seconds
          example: 3600
          minimum: 0
        example: 3600
        minimum: 0
        type: integer
      updatedAt:
        description: |-
          Timestamp when the asset rate was last updated
          example: 2021-01-01T00:00:00Z
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
    type: object
  Balance:
    description: Balance is the struct designed to represent the account balance.
      Contains available and on-hold amounts along with the scale (decimal places).
    properties:
      available:
        description: |-
          Amount available for transactions (in the smallest unit of asset)
          example: 1500
          minimum: 0
        example: 1500
        minimum: 0
        type: number
      onHold:
        description: |-
          Amount on hold and unavailable for transactions (in the smallest unit of asset)
          example: 500
          minimum: 0
        example: 500
        minimum: 0
        type: number
      overdraftUsed:
        description: |-
          OverdraftUsed is populated from OperationSnapshot.OverdraftUsedBefore when this Balance
          represents the state BEFORE the operation, or from OperationSnapshot.OverdraftUsedAfter
          when it represents the state AFTER. Parsed from the snapshot's string-encoded decimal.
          Always present under the always-populated wire-shape contract — non-overdraft
          operations carry decimal.Zero. Parse errors on malformed historical rows also
          fall back to decimal.Zero (read-only audit context, never a correctness gate).
          example: 130
          minimum: 0
        example: 130
        minimum: 0
        type: number
      version:
        description: |-
          Balance version after the operation
          example: 2
          minimum: 0
        example: 2
        minimum: 0
        type: integer
    type: object
  BalanceHistory:
    description: Historical balance snapshot at a specific point in time. Does not
      include permission flags (allowSending/allowReceiving) as these are not tracked
      historically.
    properties:
      accountId:
        description: |-
          Account that holds this balance
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      accountType:
        description: |-
          Type of account holding this balance
          example: creditCard
          maxLength: 50
        example: creditCard
        maxLength: 50
        type: string
      alias:
        description: |-
          Alias for the account, used for easy identification or tagging
          example: @person1
          maxLength: 256
        example: '@person1'
        maxLength: 256
        type: string
      assetCode:
        description: |-
          Asset code identifying the currency or asset type of this balance
          example: USD
          minLength: 2
          maxLength: 10
        example: USD
        maxLength: 10
        minLength: 2
        type: string
      available:
        description: |-
          Amount available for transactions (in the smallest unit of the asset, e.g. cents)
          example: 1500
          minimum: 0
        example: 1500
        minimum: 0
        type: number
      createdAt:
        description: |-
          Timestamp when the balance was created (RFC3339 format)
          example: 2021-01-01T00:00:00Z
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      direction:
        description: |-
          Direction is the accounting direction of the balance at the time of
          the snapshot. One of "credit" or "debit". Empty string denotes
          legacy rows predating the overdraft feature.
          example: credit
        example: credit
        type: string
      id:
        description: |-
          Unique identifier for the balance (UUID format)
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      key:
        description: |-
          Unique key for the balance
          example: asset-freeze
          maxLength: 100
        example: asset-freeze
        maxLength: 100
        type: string
      ledgerId:
        description: |-
          Ledger containing the account this balance belongs to
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      onHold:
        description: |-
          Amount currently on hold and unavailable for transactions
          example: 500
          minimum: 0
        example: 500
        minimum: 0
        type: number
      organizationId:
        description: |-
          Organization that owns this balance
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
        example: 00000000-0000-0000-0000-000000000000
        format: uuid
        type: string
      overdraftUsed:
        description: |-
          OverdraftUsed is the amount of overdraft consumed at the time of
          the snapshot. Always non-negative.
          example: 0
        example: 0
        type: number
      settings:
        allOf:
        - $ref: '#/definitions/BalanceSettings'
        description: |-
          Settings is the per-balance configuration snapshot at the time the
          history row was recorded. Nil for legacy balances.
      updatedAt:
        description: |-
          Timestamp when the balance was last updated (RFC3339 format)
          example: 2021-01-01T00:00:00Z
          format: date-time
        example: "2021-01-01T00:00:00Z"
        format: date-time
        type: string
      version:
        description: |-
          Optimistic concurrency control version
          example: 1
          minimum: 1
        example: 1
        minimum: 1
        type: integer
    type: object
  BalanceSettings:
    description: Optional per-balance configuration controlling overdraft behavior
      and balance scope.
    properties:
      allowOverdraft:
        description: |-
          AllowOverdraft enables overdraft behavior for the balance. When false,
          transactions that would drive Available below zero are rejected.
          example: false
        example: false
        type: boolean
      balanceScope:
        description: |-
          BalanceScope identifies how the balance participates in transactions.
          Allowed values: "transactional" (default), "internal". Empty string is
          treated as "transactional" for backwards compatibility.
          example: transactional
        example: transactional
        type: string
      overdraftLimit:
        description: |-
          OverdraftLimit is the maximum overdraft amount the balance may carry,
          expressed as a decimal string (to preserve precision). Ignored when
          OverdraftLimitEnabled is false.
          example: 1000.00
        example: "1000.00"
        type: string
      overdraftLimitEnabled:
        description: |-
          OverdraftLimitEnabled gates the OverdraftLimit field. When true, a
          non-empty, strictly positive OverdraftLimit MUST be supplied. When
          false, OverdraftLimit MUST be absent (overdraft is unlimited if
          AllowOverdraft is true).
          example: false
        example: false
        type: boolean
    type: object
  BankingDetails:
    type: object
  Calculation:
    description: Calculation is a struct designed to store the calculation details
      of a fee from a pack.
    properties:
      type:
        enum:
        - percentage
        - flat
        type: string
      value:
        example: "100.00"
        type: string
    required:
    - value
    type: object
  CalculationModel:
    description: CalculationModel is a struct designed to store the calculation of
      a fee from a pack.
    properties:
      applicationRule:
        enum:
        - maxBetweenTypes
        - flatFee
        - percentual
        example: maxBetweenTypes
        type: string
      calculations:
        items:
          $ref: '#/definitions/Calculation'
        type: array
    type: object
  Contact:
    description: Contact object
    properties:
      mobilePhone:
        description: The mobile phone number of the holder, including country code.
        example: "+1555555555"
        type: string
      otherPhone:
        description: Any additional phone number of the holder.
        example: "+1555555555"
        type: string
      primaryEmail:
        description: The primary email address of the holder.
        example: john.doe@example.com
        type: string
      secondaryEmail:
        description: The secondary email address of the holder.
        example: john.doe@example.com
        type: string
    type: object
  CreateAccountInput:
    description: Request payload for creating a new account within a ledger. Accounts
      represent individual financial entities such as bank accounts, credit cards,
      expense categories, or any other financial buckets within a ledger. Accounts
      are identified by a unique ID, can have aliases for easy reference, and are
      associated with a specific asset type.
    properties:
      alias:
        description: |-
          Unique alias for the account (optional, must follow alias format rules)
          required: false
          example: @treasury_checking
          maxLength: 100
        example: '@treasury_checking'
        maxLength: 100
        type: string
      assetCode:
        description: |-
          Asset code that this account will use for balances and transactions
          required: true
          example: USD
          maxLength: 100
        example: USD
        maxLength: 100
        type: string
      blocked:
        description: |-
          Whether the account should start blocked
          required: false
          default: false
        type: boolean
      entityId:
        description: |-
          Free-form external reference for linking to external systems. This is NOT the
          ownership link: use holderId to formally tie the account to a holder.
          required: false
          example: EXT-ACC-12345
          maxLength: 256
        example: EXT-ACC-12345
        maxLength: 256
        type: string
      holderId:
        description: |-
          ID of the holder that formally owns this account (optional)
          required: false
          format: uuid
        format: uuid
        type: string
      metadata:
        additionalProperties: {}
        description: |-
          Custom key-value pairs for extending the account information
          required: false
          example: {"department": "Treasury", "purpose": "Operating Expenses", "region": "Global"}
        type: object
      name:
        description: |-
          Human-readable name of the account
          required: false
          example: Corporate Checking Account
          maxLength: 256
        example: Corporate Checking Account
        maxLength: 256
        type: string
      parentAccountId:
        description: |-
          ID of the parent account if this is a subaccount (optional)
          required: false
          format: uuid
        format: uuid
        type: string
      portfolioId:
        description: |-
          ID of the portfolio this account belongs to (optional)
          required: false
          format: uuid
        format: uuid
        type: string
      segmentId:
        description: |-
          ID of the segment this account belongs to (optional)
          required: false
          format: uuid
        format: uuid
        type: string
      status:
        allOf:
        - $ref: '#/definitions/Status'
        description: |-
          Current operating status of the account
          required: false
      type:
        description: |-
          Type of the account
          required: true
          example: deposit
          maxLength: 256
        example: deposit
        maxLength: 256
        type: string
    required:
    - assetCode
    - type
    type: object
  CreateAccountTypeInput:
    description: CreateAccountTypeInput payload
    properties:
      description:
        description: Detailed description of the account type.
        example: Assets that are expected to be converted to cash within one year
