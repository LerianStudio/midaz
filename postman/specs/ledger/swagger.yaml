  github_com_LerianStudio_midaz_v4_components_ledger_pkg_feeshared_model.BillingPackageUpdate:
    properties:
      description:
        type: string
      enable:
        type: boolean
      label:
        type: string
    type: object
  github_com_LerianStudio_midaz_v4_components_ledger_pkg_feeshared_model.DiscountTier:
    properties:
      discountPercentage:
        example: "10.00"
        type: string
      minQuantity:
        type: integer
    type: object
  github_com_LerianStudio_midaz_v4_components_ledger_pkg_feeshared_model.EventFilter:
    properties:
      status:
        type: string
      transactionRoute:
        type: string
    type: object
  github_com_LerianStudio_midaz_v4_components_ledger_pkg_feeshared_model.PricingTier:
    properties:
      maxQuantity:
        type: integer
      minQuantity:
        type: integer
      unitPrice:
        example: "1.50"
        type: string
    type: object
  github_com_LerianStudio_midaz_v4_pkg_net_http.Pagination:
    properties:
      items: {}
      limit:
        type: integer
      next_cursor:
        type: string
      page:
        type: integer
      prev_cursor:
        type: string
    type: object
  mmodel.AccountingValidation:
    properties:
      requireHolder:
        description: |-
          RequireHolder enables enforcement that accounts must reference an existing holder.
          When true, account creation rejects accounts whose resolved holder does not exist.
          Default: false (permissive - no validation)
        type: boolean
      validateAccountType:
        description: |-
          ValidateAccountType enables validation of account types during transaction processing.
          When true, accounts must have types that match the operation route rules.
          Default: false (permissive - no validation)
        type: boolean
      validateRoutes:
        description: |-
          ValidateRoutes enables validation of transaction routes during processing.
          When true, transactions must specify valid route IDs that exist in the ledger.
          Default: false (permissive - no validation)
        type: boolean
    type: object
  mmodel.LedgerSettings:
    properties:
      accounting:
        allOf:
        - $ref: '#/definitions/mmodel.AccountingValidation'
        description: Accounting contains validation settings for accounting operations.
      tracer:
        allOf:
        - $ref: '#/definitions/mmodel.TracerSettings'
        description: Tracer contains the per-ledger tracer-integration settings.
    type: object
  mmodel.TracerSettings:
    properties:
      failPosture:
        description: |-
          FailPosture controls behavior when the tracer is unavailable (timeout/breaker-open).
          One of: "open" (proceed, record SKIPPED audit), "closed" (reject the transaction).
          Default: "open".
        type: string
      mode:
        description: |-
          Mode controls tracer participation in transaction processing.
          One of: "off" (skip), "advisory" (call but never block), "enforce" (call and gate).
          Default: "off".
        type: string
      timeoutMs:
        description: |-
          TimeoutMs is the per-call tracer reserve timeout, in milliseconds.
          Default: 250.
        type: integer
    type: object
