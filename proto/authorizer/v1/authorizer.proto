syntax = "proto3";

package authorizer.v1;

option go_package = "github.com/LerianStudio/midaz/v3/proto/authorizer/v1;authorizerv1";

service BalanceAuthorizer {
  rpc Authorize(AuthorizeRequest) returns (AuthorizeResponse);
  rpc AuthorizeStream(stream AuthorizeRequest) returns (stream AuthorizeResponse);
  rpc LoadBalances(LoadBalancesRequest) returns (LoadBalancesResponse);
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc PublishBalanceOperations(PublishBalanceOperationsRequest) returns (PublishBalanceOperationsResponse);

  // 2PC methods for cross-shard authorization between authorizer instances.
  // PrepareAuthorize validates operations and holds shard locks without committing.
  rpc PrepareAuthorize(AuthorizeRequest) returns (PrepareAuthorizeResponse);
  // CommitPrepared writes WAL, mutates balances, and releases locks for a prepared transaction.
  rpc CommitPrepared(CommitPreparedRequest) returns (CommitPreparedResponse);
  // AbortPrepared releases locks without any mutation for a prepared transaction.
  rpc AbortPrepared(AbortPreparedRequest) returns (AbortPreparedResponse);

  // Admin RPC for resolving stuck prepared transactions that have been flagged
  // for manual intervention. Requires AUTHORIZER_ADMIN_TOKEN in request
  // metadata (distinct from the peer-auth HMAC used by 2PC RPCs). Every
  // invocation is audit-logged regardless of outcome.
  rpc ResolveManualIntervention(ResolveManualInterventionRequest) returns (ResolveManualInterventionResponse);
}

message AuthorizeRequest {
  string transaction_id = 1;
  string organization_id = 2;
  string ledger_id = 3;
  bool pending = 4;
  string transaction_status = 5;
  repeated BalanceOperation operations = 6;
  map<string, string> metadata = 7;
}

message BalanceOperation {
  string operation_alias = 1;
  string account_alias = 2;
  string balance_key = 3;
  string asset_code = 4;
  string operation = 5;
  int64 amount = 6;
  int32 scale = 7;
  bool is_external = 8;
}

message AuthorizeResponse {
  bool authorized = 1;
  string rejection_code = 2;
  string rejection_message = 3;
  repeated BalanceSnapshot balances = 4;
}

message BalanceSnapshot {
  string operation_alias = 1;
  string account_alias = 2;
  string balance_key = 3;
  string balance_id = 4;
  string account_id = 5;
  string asset_code = 6;
  string account_type = 7;
  bool allow_sending = 8;
  bool allow_receiving = 9;
  int64 available = 10;
  int64 on_hold = 11;
  int32 scale = 12;
  uint64 version = 13;
}

message LoadBalancesRequest {
  string organization_id = 1;
  string ledger_id = 2;
  repeated int32 shard_ids = 3;
}

message LoadBalancesResponse {
  int64 balances_loaded = 1;
  int64 shards_loaded = 2;
}

message GetBalanceRequest {
  string organization_id = 1;
  string ledger_id = 2;
  string account_alias = 3;
  string balance_key = 4;
}

message GetBalanceResponse {
  BalanceSnapshot balance = 1;
}

message PublishBalanceOperationsRequest {
  string topic = 1;
  string partition_key = 2;
  bytes payload = 3;
  string content_type = 4;
  map<string, string> headers = 5;
}

message PublishBalanceOperationsResponse {
  bool published = 1;
  string message = 2;
}

// 2PC messages for cross-shard authorization.
message PrepareAuthorizeResponse {
  bool authorized = 1;
  string rejection_code = 2;
  string rejection_message = 3;
  string prepared_tx_id = 4;
  repeated BalanceSnapshot balances = 5;
}

message CommitPreparedRequest {
  string prepared_tx_id = 1;
}

message CommitPreparedResponse {
  bool committed = 1;
  repeated BalanceSnapshot balances = 2;
}

message AbortPreparedRequest {
  string prepared_tx_id = 1;
}

message AbortPreparedResponse {
  bool aborted = 1;
}

// ManualInterventionResolution enumerates the operator actions permitted on a
// prepared transaction that has been flagged for manual review. Values are
// stable — dashboards and audit trails pin on these names.
enum ManualInterventionResolution {
  // Sentinel default; rejected with InvalidArgument.
  RESOLUTION_UNSPECIFIED = 0;
  // Operator decision: force-commit the prepared transaction, mutating local
  // balances and writing the WAL entry as if a normal CommitPrepared arrived.
  RESOLUTION_FORCE_COMMIT = 1;
  // Operator decision: force-abort the prepared transaction, releasing the
  // locked balances without mutation. The intent is kept in
  // MANUAL_INTERVENTION_REQUIRED so downstream consumers can see the trail.
  RESOLUTION_FORCE_ABORT = 2;
  // Operator decision: acknowledge the intervention (e.g. after external
  // reconciliation) without mutating prepared state. Emits an audit event only.
  RESOLUTION_MARK_INVESTIGATED = 3;
}

// ResolveManualInterventionRequest carries the operator's decision for a
// single prepared transaction stuck awaiting resolution.
message ResolveManualInterventionRequest {
  // tx_id is the engine-assigned prepared_tx_id (e.g. "ptx-<uuid>"). This is
  // the same identifier emitted by the MANUAL_INTERVENTION_REQUIRED topic and
  // observed in operator dashboards.
  string tx_id = 1;
  // resolution selects the operator action. RESOLUTION_UNSPECIFIED is rejected.
  ManualInterventionResolution resolution = 2;
  // notes is a free-form operator comment persisted to the audit trail. MUST
  // identify the operator (e.g. ticket ID, on-call handle).
  string notes = 3;
}

// ResolveManualInterventionResponse returns the state transition observed and
// a server-side timestamp suitable for correlating with the audit log.
message ResolveManualInterventionResponse {
  // prior_status is the PreparedTx state at the moment the RPC arrived, e.g.
  // "pending", "commit_decided", "already_committed".
  string prior_status = 1;
  // new_status is the state after the resolution was applied, e.g. "committed",
  // "aborted", "investigated".
  string new_status = 2;
  // timestamp is the server-side UTC RFC3339Nano timestamp of the resolution.
  string timestamp = 3;
}
