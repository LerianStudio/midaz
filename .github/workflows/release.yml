name: Release

on:
  push:
    branches:
      - 'maintenance/v3.6.*'
    paths-ignore:
      - '.gitignore'
      - '**/*.env'   # Ignores all .env files
      - '*.env'      # Ignores .env files in the root directory
      - '**/*.md'    # Ignores all .md files
      - '*.md'       # Ignores .md files in the root directory
      - '**/*.txt'   # Ignores all .env files
      - '*.txt'      # Ignores .env files in the root directory
      - '.github/**' # Ignores all GitHub config (workflows, templates, dependabot, labeler, etc.)
    tags-ignore: ['**']

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # =========================
  # RELEASE
  # =========================
  release:
    name: Create Release
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/release.yml@v1.27.5
    with:
      runner_type: "blacksmith-4vcpu-ubuntu-2404"
    secrets: inherit
