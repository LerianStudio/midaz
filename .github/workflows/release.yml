name: Release

on:
  push:
    branches: [develop, release-candidate, main]
    tags: ['**']

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  pipeline:
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/go-release.yml@v1.36.0
    with:
      enable_changelog: ${{ github.ref == 'refs/heads/main' }}
      app_name_prefix: "midaz"
      filter_paths: |
        components/crm
        components/ledger
      shared_paths: |
        go.mod
        go.sum
        pkg/
        Makefile
      enable_gitops_artifacts: true
      enable_helm_dispatch: true
      helm_chart: "midaz"
      helm_values_key_mappings: '{"midaz-crm": "crm", "midaz-ledger": "ledger"}'
      gitops_yaml_key_mappings: '{"midaz-crm.tag": ".crm.image.tag", "midaz-ledger.tag": ".ledger.image.tag"}'
      enable_apidog_e2e: true
    secrets: inherit
