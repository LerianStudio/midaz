name: "Build"

on:
  push:
    tags:
      - '**'

permissions:
  id-token: write
  contents: read
  pull-requests: write
  packages: write

jobs:
  build:
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/build.yml@v1.33.0
    with:
      runner_type: "blacksmith-4vcpu-ubuntu-2404"
      filter_paths: |-
        components/ledger
        components/tracer
        components/reporter-manager
        components/reporter-worker
      shared_paths: |
        go.mod
        go.sum
        pkg/
        Makefile
      path_level: '2'
      app_name_prefix: "midaz"
      enable_dockerhub: true
      enable_ghcr: true
      dockerhub_org: lerianstudio
      enable_gitops_artifacts: true
      # helm dispatch configuration
      enable_helm_dispatch: true
      helm_chart: "midaz"
      helm_detect_env_changes: true
      # DEPLOY-GATED (P8-T20 ops lockstep, R12): this maps the four surviving
      # midaz-* images to their Helm value-block keys (bare keys). crm/fees are
      # collapsed into ledger and emit no image. The external midaz Helm chart MUST
      # gain tracer/manager/worker value blocks and drop crm/plugin-fees BEFORE a
      # real tag fans out, or co-located components build but never deploy.
      helm_values_key_mappings: '{"midaz-ledger":"ledger","midaz-tracer":"tracer","midaz-reporter-manager":"manager","midaz-reporter-worker":"worker"}'
    secrets: inherit

  # =========================
  # GITOPS UPDATE
  # =========================
  update_gitops:
    needs: [build]
    if: >-
      !cancelled() &&
      needs.build.result == 'success' &&
      needs.build.outputs.has_builds == 'true'
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/gitops-update.yml@v1.33.0
    with:
      runner_type: "firmino-lxc-runners"
      gitops_repository: "LerianStudio/midaz-firmino-gitops"
      app_name: "midaz"
      deploy_in_firmino: true
      deploy_in_clotilde: true
      artifact_pattern: "gitops-tags-midaz-*"
      # DEPLOY-GATED (P8-T20 ops lockstep, R12): DISTINCT schema from
      # helm_values_key_mappings — keys carry a .tag SUFFIX, values are full dotted
      # YAML paths (.image.tag). midaz-firmino-gitops MUST update these targets and
      # drop crm/fees BEFORE a real tag fans out.
      yaml_key_mappings: '{"midaz-ledger.tag":".ledger.image.tag","midaz-tracer.tag":".tracer.image.tag","midaz-reporter-manager.tag":".manager.image.tag","midaz-reporter-worker.tag":".worker.image.tag"}'
      commit_message_prefix: "midaz"
      enable_argocd_sync: true
      enable_docker_login: false
    secrets: inherit

  # =========================
  # UPLOAD MIGRATIONS TO S3
  # =========================
  # Ledger ships S3-uploaded migrations (onboarding + transaction), consumed
  # out-of-band by ops for managed-Postgres customers. Tracer migrations are ALSO
  # published to S3 (Q15-RESOLVED, overrides the P5 Decision 2 exclusion), but the
  # publish is ADDITIVE only: tracer's runtime applied-by path is UNCHANGED — its
  # migrations remain an ordered, hash-chained sequence applied exclusively via
  # tracer's bootstrap migration runner (keeping ONE applied-by path is a
  # correctness property). The S3 copy serves the managed-deploy pipeline, not the
  # in-cluster bootstrap. KEY-LAYOUT CAVEAT (R45, Ops X2/X3 register item): the
  # tracer s3_prefix `tracer/postgresql` must be reconciled against the
  # managed-deploy pipeline's expected key layout before a real tag fans out — the
  # verify-pipeline and managed-deploy-pipeline key conventions are an Ops sign-off,
  # not settled in-repo. Reporter manager/worker have no SQL migrations. crm/fees
  # are collapsed into ledger and emit no image/migrations.
  upload-onboarding-migrations:
    needs: [build]
    if: needs.build.result == 'success'
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/s3-upload.yml@v1.33.0
    with:
      s3_bucket: "lerian-migration-files"
      file_pattern: "components/ledger/migrations/onboarding/*.sql"
      s3_prefix: "ledger/onboarding/postgresql"
      strip_prefix: "components/ledger/migrations/onboarding"
      flatten: false
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_MIGRATIONS_ROLE_ARN }}

  upload-transaction-migrations:
    needs: [build]
    if: needs.build.result == 'success'
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/s3-upload.yml@v1.33.0
    with:
      s3_bucket: "lerian-migration-files"
      file_pattern: "components/ledger/migrations/transaction/*.sql"
      s3_prefix: "ledger/transaction/postgresql"
      strip_prefix: "components/ledger/migrations/transaction"
      flatten: false
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_MIGRATIONS_ROLE_ARN }}

  upload-tracer-migrations:
    needs: [build]
    if: needs.build.result == 'success'
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/s3-upload.yml@v1.33.0
    with:
      s3_bucket: "lerian-migration-files"
      file_pattern: "components/tracer/migrations/*.sql"
      s3_prefix: "tracer/postgresql"
      strip_prefix: "components/tracer/migrations"
      flatten: false
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_MIGRATIONS_ROLE_ARN }}

  # =========================
  # E2E TESTS
  # =========================
  api_dog_e2e_tests:
    needs: [update_gitops]
    if: needs.update_gitops.result == 'success'
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/api-dog-e2e-tests.yml@v1.33.0
    with:
      runner_type: "firmino-lxc-runners"
      auto_detect_environment: true
    secrets:
      test_scenario_id: ${{ secrets.MIDAZ_APIDOG_TEST_SCENARIO_ID }}
      apidog_access_token: ${{ secrets.APIDOG_ACCESS_TOKEN }}
      dev_environment_id: ${{ secrets.MIDAZ_APIDOG_DEV_ENVIRONMENT_ID }}
      stg_environment_id: ${{ secrets.MIDAZ_APIDOG_STG_ENVIRONMENT_ID }}
