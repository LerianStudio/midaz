name: Authorizer Benchmark Guard

on:
  pull_request:
    branches:
      - develop
      - release-candidate
      - main
    paths:
      - components/authorizer/**
      - go.mod
      - go.sum

jobs:
  benchmark-guard:
    name: Authorizer benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run authorizer tests
        run: go test ./components/authorizer/...

      - name: Run benchmark smoke
        run: |
          go test ./components/authorizer/tests -run '^$' -bench 'BenchmarkAuthorize(SingleOp|ParallelSameShard|ParallelCrossShard)$' -benchmem -benchtime=1000x | tee benchmark.out

      - name: Enforce allocations guardrail
        run: |
          python - <<'PY'
          import re
          import sys

          # Allocation thresholds — HOW THESE VALUES WERE DETERMINED
          # ─────────────────────────────────────────────────────────
          # These are CEILING GUARDS, not measured steady-state baselines.
          # They exist to catch regressions (new allocations on the hot path)
          # before they merge. They were set conservatively above the expected
          # overhead introduced by each major engine feature.
          #
          # Overhead accounted for per benchmark:
          #   SingleOp / ParallelSameShard (+6 vs pre-locking baseline of 14):
          #     - Per-balance mutex embedded in Balance struct (1 alloc: sync.Mutex)
          #     - WAL entry metadata slice (Mutations, Operations headers)
          #     - map[string]*Balance for shard lock-order deduplication
          #
          #   ParallelCrossShard (+8 vs same-shard ceiling):
          #     - 2PC PrepareAuthorize sub-request proto clone
          #     - PreparedTx store entry (prepStore.Put allocation)
          #     - Cross-shard nonce HMAC computation (mgrpc.SignPeerAuth)
          #     - commitIntent struct + participant slice for WAL reconciler
          #
          # TODO: After the first successful benchmark run in CI, replace these
          # ceiling values with the measured p99 allocs/op + a small margin (e.g. +3).
          # Run the following locally to capture baseline measurements:
          #
          #   go test -bench='BenchmarkAuthorize(SingleOp|ParallelSameShard|ParallelCrossShard)' \
          #           -benchmem -count=5 \
          #           ./components/authorizer/tests/...
          #
          # Then update each limit to: ceil(mean_allocs_across_runs) + 3
          # Commit the updated values with a comment recording the measurement date
          # and the Go / hardware configuration used.
          limits = {
              "BenchmarkAuthorizeSingleOp": 20,
              "BenchmarkAuthorizeParallelSameShard": 20,
              "BenchmarkAuthorizeParallelCrossShard": 28,
          }

          text = open("benchmark.out", "r", encoding="utf-8").read()
          failed = False

          for benchmark, max_allocs in limits.items():
              pattern = re.compile(rf"{benchmark}-\d+\s+\d+\s+[0-9.]+\s+ns/op\s+\d+\s+B/op\s+(\d+)\s+allocs/op")
              match = pattern.search(text)
              if not match:
                  print(f"ERROR: benchmark result not found for {benchmark}")
                  failed = True
                  continue

              allocs = int(match.group(1))
              if allocs > max_allocs:
                  print(f"ERROR: {benchmark} allocs/op={allocs} exceeded max={max_allocs}")
                  failed = True
              else:
                  print(f"OK: {benchmark} allocs/op={allocs} (max={max_allocs})")

          if failed:
              sys.exit(1)
          PY
