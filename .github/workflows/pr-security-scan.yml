name: "PR Security Scan"

on:
  pull_request:
    branches:
      - develop
      - release-candidate
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - 'LICENSE'
      - 'CODEOWNERS'
      - '.gitignore'
      - '.editorconfig'
      - '*.png'
      - '*.jpg'
      - '*.svg'

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write
  actions: read

jobs:
  security-scan:
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/pr-security-scan.yml@v1.33.0
    with:
      runner_type: "blacksmith-4vcpu-ubuntu-2404"
      # IMAGE filter — mirrors build.yml filter_paths exactly. Each entry must have a
      # Dockerfile at <path>/Dockerfile; the shared workflow derives the image name
      # from the directory basename and builds from repo root (default context='.').
      filter_paths: |-
        components/ledger
        components/tracer
      shared_paths: |
        go.mod
        go.sum
        pkg/
        Makefile
      path_level: "2"
      dockerhub_org: "lerianstudio"
    secrets: inherit
