name: "PR Security Scan"

on:
  pull_request:
    branches:
      - develop
      - release-candidate
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - 'LICENSE'
      - 'CODEOWNERS'
      - '.gitignore'
      - '.editorconfig'
      - '*.png'
      - '*.jpg'
      - '*.svg'

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write
  actions: read

jobs:
  security-scan:
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/pr-security-scan.yml@v1.33.0
    with:
      runner_type: "blacksmith-4vcpu-ubuntu-2404"
      # Analysis-class filter: covers every component that has Go code in-tree
      # (CRM now lives under components/ledger/internal/crm, so it rolls up into the
      # components/ledger entry at path_level 2), so it differs by design from
      # build.yml's IMAGE filter (the four image dirs only).
      filter_paths: |-
        components/ledger
        components/tracer
        components/reporter
      shared_paths: |
        go.mod
        go.sum
        pkg/
        Makefile
      path_level: "2"
      dockerhub_org: "lerianstudio"
    secrets: inherit
