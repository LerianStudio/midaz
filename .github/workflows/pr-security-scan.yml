name: "PR Security Scan"

on:
  pull_request:
    branches:
      - develop
      - release-candidate
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - 'LICENSE'
      - 'CODEOWNERS'
      - '.gitignore'
      - '.editorconfig'
      - '*.png'
      - '*.jpg'
      - '*.svg'

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write
  actions: read

jobs:
  security-scan:
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/pr-security-scan.yml@v1.28.9
    with:
      runner_type: "blacksmith-4vcpu-ubuntu-2404"
      # Analysis-class filter: covers every component that still has Go code in-tree
      # (crm code remains pending the P9 teardown even though it emits no image), so
      # it differs by design from build.yml's IMAGE filter (the four image dirs only).
      filter_paths: |-
        components/crm
        components/ledger
        components/tracer
        components/reporter-manager
        components/reporter-worker
      shared_paths: |
        go.mod
        go.sum
        pkg/
        Makefile
      path_level: "2"
      dockerhub_org: "lerianstudio"
    secrets: inherit
