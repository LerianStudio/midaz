name: "Go Combined Analysis"

on:
  pull_request:
    branches:
      - develop
      - release-candidate
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - 'LICENSE'
      - 'CODEOWNERS'
      - '.gitignore'
      - '.editorconfig'
      - '*.png'
      - '*.jpg'
      - '*.svg'
      - 'images/**'
      - '*.txt'

permissions:
  id-token: write
  actions: read
  contents: read
  pull-requests: write
  security-events: write

jobs:
  go-analysis:
    name: Go Analysis
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/go-pr-analysis.yml@v1.35.0
    with:
      app_name_prefix: "midaz"
      go_version: "1.26.4"
      golangci_lint_version: "v2.4.0"
      golangci_lint_args: "--timeout=5m"
      coverage_threshold: 85
      fail_on_coverage_threshold: true
      go_private_modules: "github.com/LerianStudio/*"
    secrets: inherit
