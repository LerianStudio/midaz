name: "Go Combined Analysis"

on:
  pull_request:
    branches:
      - develop
      - release-candidate
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - 'LICENSE'
      - 'CODEOWNERS'
      - '.gitignore'
      - '.editorconfig'
      - '*.png'
      - '*.jpg'
      - '*.svg'

jobs:
  go-analysis:
    name: Go Analysis
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/go-pr-analysis.yml@v1.33.0
    with:
      runner_type: "blacksmith-4vcpu-ubuntu-2404"
      # Analysis-class filter: every component with in-tree Go code (CRM rolls up
      # under components/ledger at path_level 2). Differs from build.yml's image
      # filter, which lists only the image dirs. The tracer BDD suite is not gated
      # here; it runs as a separate job (`make tracer COMMAND=test-e2e`).
      filter_paths: '["components/ledger", "components/tracer"]'
      path_level: 2
      app_name_prefix: "midaz"
      go_version: "1.26.4"
      golangci_lint_version: "v2.12.2"
      golangci_lint_args: "--timeout=5m"
      coverage_threshold: 85
      fail_on_coverage_threshold: true
      enable_lint: true
      enable_security: true
      enable_tests: true
      enable_coverage: true
      enable_build: true
    secrets: inherit
