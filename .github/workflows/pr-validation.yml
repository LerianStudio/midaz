name: PR Validation

on:
  pull_request:
    branches: [develop, release-candidate, main]
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  actions: read
  contents: read
  id-token: write
  issues: write
  pull-requests: write
  security-events: write

jobs:
  validate:
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/go-pr-validation.yml@v1.46.5
    with:
      enforce_source_branches: true
      allowed_source_branches: 'hotfix/*|release-candidate'
      target_branches_for_source_check: 'main'
      pr_title_scopes: |
        crm
        ledger
        api
        pkg
        infra
        migrations
        scripts
        deps
        ci
        docs
        tests
      go_version: "1.26.5"
      golangci_lint_version: "v2.4.0"
      app_name_prefix: "midaz"
      filter_paths: |
        components/crm
        components/ledger
      go_private_modules: "github.com/LerianStudio/*"
      ignore_file: ".trivyignore"
      shared_paths: |
        go.mod
        go.sum
        components/
        pkg/
        Makefile
    secrets: inherit
