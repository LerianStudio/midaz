name: PR Validation

on:
  pull_request:
    branches: [develop, release-candidate, main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate:
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/pr-validation.yml@v1.33.0
    with:
      runner_type: "blacksmith-4vcpu-ubuntu-2404"
      pr_title_types: |
        feat
        fix
        docs
        style
        refactor
        perf
        test
        chore
        ci
        build
        revert
      # crm is retained as a warn-only scope (require_scope: false) until the P9 code
      # teardown removes crm-in-ledger; fees is a valid scope since fees code now
      # lives inside the ledger binary.
      pr_title_scopes: |
        crm
        ledger
        tracer
        reporter
        fees
        api
        pkg
        infra
        migrations
        scripts
        deps
        workflows
      require_scope: false
      enable_auto_labeler: false
      enforce_source_branches: true
      allowed_source_branches: 'develop|release-candidate|hotfix/*'
      target_branches_for_source_check: 'main'
    secrets: inherit

  # Required gate: regenerate every component's OpenAPI/Swagger docs and fail if the
  # committed artifacts under components/<c>/api and postman/specs are stale. Docker is
  # required for the openapi.yaml step (openapitools/openapi-generator-cli), which the
  # blacksmith ubuntu runner provides.
  check-docs:
    name: Check Docs
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Install swag
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.6
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify docs are up to date
        run: CHECK_DOCS_REGEN=1 make check-docs
