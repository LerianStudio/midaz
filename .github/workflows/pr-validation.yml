name: PR Validation

on:
  pull_request:
    branches: [develop, release-candidate, main]
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate:
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/pr-validation.yml@v1.35.0
    with:
      pr_title_scopes: |
        crm
        ledger
        api
        pkg
        infra
        migrations
        scripts
        deps
        ci
        docs
        tests
      enforce_source_branches: true
    secrets: inherit
