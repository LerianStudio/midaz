version: 2
updates:
  # Go modules - single root module (monorepo has ONE go.mod at repo root)
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "develop"
    open-pull-requests-limit: 10
    labels:
      - "area: dependencies"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "develop"
    open-pull-requests-limit: 5
    labels:
      - "area: ci/cd"
    commit-message:
      prefix: "ci(deps)"

  # Docker - ledger (image-bearing component)
  - package-ecosystem: "docker"
    directory: "/components/ledger"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "develop"
    open-pull-requests-limit: 5
    labels:
      - "area: build"
      - "component: ledger"
    commit-message:
      prefix: "build(deps)"

  # Docker - tracer (image-bearing component)
  - package-ecosystem: "docker"
    directory: "/components/tracer"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "develop"
    open-pull-requests-limit: 5
    labels:
      - "area: build"
      - "component: tracer"
    commit-message:
      prefix: "build(deps)"

  # Docker - reporter-manager (image-bearing component)
  - package-ecosystem: "docker"
    directory: "/components/reporter-manager"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "develop"
    open-pull-requests-limit: 5
    labels:
      - "area: build"
      - "component: reporter-manager"
    commit-message:
      prefix: "build(deps)"

  # Docker - reporter-worker (image-bearing component)
  - package-ecosystem: "docker"
    directory: "/components/reporter-worker"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "develop"
    open-pull-requests-limit: 5
    labels:
      - "area: build"
      - "component: reporter-worker"
    commit-message:
      prefix: "build(deps)"
