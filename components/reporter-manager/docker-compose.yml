services:
  reporter-manager:
    container_name: midaz-reporter-manager
    restart: always
    build:
      context: ../../
      dockerfile: ./components/reporter-manager/Dockerfile
    env_file:
      - .env
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    # Manager image is distroless (no shell), so the container HEALTHCHECK is the
    # orchestrator's responsibility (Kubernetes probe against /health). No
    # compose-level healthcheck — mirrors ledger's distroless service.
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    networks:
      - infra-network
      - reporter-network

networks:
  infra-network:
    name: infra-network
    driver: bridge
    external: true
  reporter-network:
    name: reporter-network
    driver: bridge
