      parameters:
      - description: Client-provided idempotency key to prevent duplicate report creation
        in: header
        name: X-Idempotency
        type: string
      - description: Report Input
        in: body
        name: reports
        required: true
        schema:
          $ref: '#/definitions/CreateReportInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
