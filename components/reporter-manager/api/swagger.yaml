  /v1/reports:
    get:
      description: List all the reports
      parameters:
      - description: Report status
        enum:
        - Processing
        - Finished
        - Error
        - PendingExtraction
        - Partial
        in: query
        name: status
        type: string
      - description: Template UUID (also accepts templateId)
        format: uuid
        in: query
        name: template_id
        type: string
      - description: Created at date, YYYY-MM-DD (also accepts createdAt)
        format: date
        in: query
        name: created_at
        type: string
      - description: Filter window start, YYYY-MM-DD
        format: date
        in: query
        name: start_date
        type: string
      - description: Filter window end, YYYY-MM-DD
        format: date
        in: query
        name: end_date
        type: string
      - description: Filter by description
        in: query
        name: description
        type: string
      - description: Filter by output format
        enum:
        - PDF
        - HTML
        - XML
        - TXT
        - CSV
        in: query
        name: output_format
        type: string
      - description: Filter by active flag
        in: query
        name: active
        type: boolean
      - description: Filter by type
        in: query
        name: type
        type: string
      - description: Opaque cursor for cursor-based pagination
        in: query
        name: cursor
        type: string
      - default: desc
        description: Sort order
        enum:
        - asc
        - desc
        in: query
        name: sort_order
        type: string
      - default: 10
        description: Page size
        in: query
        name: limit
        type: integer
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/Pagination'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/report.Report'
                  type: array
                limit:
                  type: integer
                page:
                  type: integer
                total:
                  type: integer
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_LerianStudio_midaz_v4_pkg_reporter.HTTPError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_LerianStudio_midaz_v4_pkg_reporter.HTTPError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_LerianStudio_midaz_v4_pkg_reporter.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_LerianStudio_midaz_v4_pkg_reporter.HTTPError'
