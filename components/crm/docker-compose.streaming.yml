# Opt-in local Redpanda broker for the CRM streaming-events pilot.
#
# This file is a SEPARATE compose stack (not part of `make up`) so the broker
# only runs for developers exercising streaming. It joins the pre-existing
# external `infra-network` (created by `make up` in components/infra) so the
# broker is reachable both from the host (localhost:19092) and from other
# containers on that network (midaz-redpanda:9092).
#
# Usage:
#   1. Ensure infra-network exists first: `cd ../infra && make up` (or any
#      command that starts the infra stack — it declares the network).
#   2. `make streaming-up`   -> starts midaz-redpanda + pre-provisions topics
#   3. Point the CRM at it:  STREAMING_ENABLED=true
#                            STREAMING_BROKERS=localhost:19092
#                            STREAMING_CLOUDEVENTS_SOURCE=lerian.midaz.crm
#   4. `make streaming-down` -> tears the broker down
#
# Topics are pre-provisioned EXPLICITLY (no auto-create): a typo would
# otherwise become a silent ghost topic. The seven topic names below MUST stay
# 1:1 with crmEventDefinitions() in internal/bootstrap/streaming.go.

services:
  midaz-redpanda:
    container_name: midaz-redpanda
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      # Two named listeners: `internal` for containers on infra-network
      # (advertised as midaz-redpanda:9092) and `external` for the host
      # (advertised as localhost:19092). Splitting them keeps the container
      # port (9092) distinct from the host port (19092).
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://midaz-redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - infra-network

  # One-shot topic provisioner. Waits for the broker to report healthy, then
  # creates the seven canonical CRM topics. Mirrors the midaz-mongodb-init /
  # midaz-hc-vault-init init-container pattern from the infra compose.
  midaz-redpanda-init:
    container_name: midaz-redpanda-init
    image: redpandadata/redpanda:v24.2.7
    depends_on:
      midaz-redpanda:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        BROKER=midaz-redpanda:9092
        echo "Pre-provisioning CRM streaming topics on $${BROKER}..."
        for topic in \
          lerian.streaming.holder.created \
          lerian.streaming.holder.updated \
          lerian.streaming.holder.deleted \
          lerian.streaming.alias.created \
          lerian.streaming.alias.updated \
          lerian.streaming.alias.deleted \
          lerian.streaming.alias.related-party-deleted; do
          echo "  creating $${topic}"
          rpk topic create "$${topic}" --brokers "$${BROKER}"
        done
        echo "Topic provisioning complete:"
        rpk topic list --brokers "$${BROKER}"
    networks:
      - infra-network
    restart: "no"

networks:
  infra-network:
    name: infra-network
    driver: bridge
    external: true
