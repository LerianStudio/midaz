services:
  crm:
    container_name: midaz-crm
    restart: always
    build:
      context: ../../
      dockerfile: ./components/crm/Dockerfile
    env_file:
      - .env
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    volumes:
      - .:/usr/src/app
    networks:
      - infra-network
      - crm-network
    # Note: No dependency on Vault - CRM works in legacy mode (KMS_VENDOR=none) without Vault.
    # For envelope encryption (KMS_VENDOR=hashicorp-vault), use: make up
    # Manual alternative: docker compose up vault -d && docker compose up vault-init && docker compose up crm -d

  # HashiCorp Vault for KMS/Transit secrets engine (OPTIONAL - only for envelope encryption)
  # Required when: KMS_VENDOR=hashicorp-vault
  # Not required when: KMS_VENDOR=none or empty (legacy mode, default)
  # For saas/byoc, use a managed Vault instance with AppRole auth
  vault:
    container_name: midaz-crm-vault
    image: hashicorp/vault:1.15
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${KMS_VAULT_TOKEN:-root-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - crm-network

  # Vault initialization service - enables Transit secrets engine
  # Runs once after Vault is healthy, then exits
  vault-init:
    container_name: midaz-crm-vault-init
    image: hashicorp/vault:1.15
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: ${KMS_VAULT_TOKEN:-root-token}
      TRANSIT_MOUNT_PATH: ${KMS_VAULT_MOUNT_PATH:-transit}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Checking if Transit is already enabled at $${TRANSIT_MOUNT_PATH}..."
        if vault secrets list | grep -q "^$${TRANSIT_MOUNT_PATH}/"; then
          echo "Transit already enabled at $${TRANSIT_MOUNT_PATH}"
        else
          echo "Enabling Transit secrets engine at $${TRANSIT_MOUNT_PATH}..."
          vault secrets enable -path="$${TRANSIT_MOUNT_PATH}" transit
          echo "Transit enabled successfully"
        fi
        echo "Vault initialization complete"
    networks:
      - crm-network
    restart: "no"

networks:
  infra-network:
    name: infra-network
    driver: bridge
    external: true
  crm-network:
    name: crm-network
    driver: bridge
