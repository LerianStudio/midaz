services:
  crm:
    container_name: midaz-crm
    restart: always
    build:
      context: ../../
      dockerfile: ./components/crm/Dockerfile
    env_file:
      - .env
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    volumes:
      - .:/usr/src/app
    networks:
      - infra-network
      - crm-network
    depends_on:
      vault:
        condition: service_healthy

  # HashiCorp Vault for KMS/Transit secrets engine (local development only)
  # For production, use a managed Vault instance with AppRole auth
  vault:
    container_name: midaz-crm-vault
    image: hashicorp/vault:1.15
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${KMS_VAULT_TOKEN:-root-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - crm-network

networks:
  infra-network:
    name: infra-network
    driver: bridge
    external: true
  crm-network:
    name: crm-network
    driver: bridge
