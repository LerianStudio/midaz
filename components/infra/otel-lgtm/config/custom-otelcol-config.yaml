receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

  # Add resource processor to ensure proper attribution of metrics
  resource:
    attributes:
      - action: insert
        key: deployment.environment
        value: development

exporters:
  otlphttp/metrics:
    endpoint: http://localhost:9090/api/v1/otlp
    tls:
      insecure: true
  otlphttp/traces:
    endpoint: http://localhost:4418
    tls:
      insecure: true
  otlphttp/logs:
    endpoint: http://localhost:3100/otlp
    tls:
      insecure: true

  # Add Prometheus exporter for direct scraping
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: midaz

  # Keep debug exporters for troubleshooting
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/traces, debug]
    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlphttp/metrics, prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/logs, debug]

  telemetry:
    metrics:
      address: 0.0.0.0:8888
    logs:
      level: debug
