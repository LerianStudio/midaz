# Shared environment blocks to reduce duplication between ledger and consumer.
x-redis-env: &redis_env
  REDIS_HOST: midaz-valkey:${REDIS_PORT}
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  REDIS_DB: "0"
  REDIS_PROTOCOL: "3"
  REDIS_POOL_SIZE: "1024"
  REDIS_MIN_IDLE_CONNS: "128"
  REDIS_READ_TIMEOUT: "10"
  REDIS_WRITE_TIMEOUT: "10"
  REDIS_POOL_TIMEOUT: "5"

x-redpanda-env: &redpanda_env
  REDPANDA_BROKERS: midaz-redpanda:9092
  REDPANDA_BALANCE_CREATE_TOPIC: ledger.balance.create
  REDPANDA_BALANCE_OPS_TOPIC: ledger.balance.operations
  REDPANDA_EVENTS_TOPIC: ledger.transaction.events
  REDPANDA_AUDIT_TOPIC: ledger.audit.log
  REDPANDA_CONSUMER_GROUP: midaz-balance-projector
  REDPANDA_NUMBERS_OF_WORKERS: "120"
  REDPANDA_PARTITION_COUNT: "8"
  REDPANDA_COMMIT_INTERVAL_MS: "1000"
  REDPANDA_FETCH_MAX_BYTES: "50000000"
  REDPANDA_PRODUCER_LINGER_MS: "5"
  REDPANDA_MAX_BUFFERED_RECORDS: "10000"

x-consumer-batch-env: &consumer_batch_env
  TRANSACTION_ASYNC: "true"
  TRANSACTION_EVENTS_ENABLED: "false"
  BALANCE_SYNC_WORKER_ENABLED: "false"
  REDIS_SHARD_COUNT: "8"
  CONSUMER_BATCH_ENABLED: "true"
  CONSUMER_BATCH_SIZE: "50"
  CONSUMER_BATCH_WINDOW_MS: "10"
  CONSUMER_IDLE_FLUSH_MS: "100"
  CONSUMER_BACKPRESSURE_ENABLED: "false"
  CONSUMER_MAX_DB_TPS: "0"
  CONSUMER_MAX_DB_BURST: "100"
  CONSUMER_LAG_FENCE_ENABLED: "false"
  CONSUMER_LAG_CACHE_TTL_MS: "500"
  CONSUMER_ENABLED: "false"
  DEDICATED_CONSUMER_ENABLED: "true"
  SHARD_REBALANCE_WORKER_ENABLED: "false"

x-authorizer-client-env: &authorizer_client_env
  AUTHORIZER_ENABLED: "true"
  AUTHORIZER_HOST: authorizer
  AUTHORIZER_PORT: "50051"
  AUTHORIZER_ROUTING_MODE: "sharded"
  AUTHORIZER_INSTANCES: "authorizer:50051,authorizer-2:50051"
  AUTHORIZER_SHARD_RANGES: "0-3,4-7"
  AUTHORIZER_TIMEOUT_MS: "3000"
  AUTHORIZER_POOL_SIZE: "16"
  AUTHORIZER_USE_STREAMING: "false"
  AUTHORIZER_PEER_AUTH_TOKEN: ${AUTHORIZER_PEER_AUTH_TOKEN:?AUTHORIZER_PEER_AUTH_TOKEN must be set to a strong shared secret}

x-presplit-env: &presplit_env
  EXTERNAL_PRESPLIT_SHARD_COUNT: "8"
  EXTERNAL_PRESPLIT_PREWARM: "true"
  EXTERNAL_PRESPLIT_ORGANIZATION_ID: ${BENCH_ORGANIZATION_ID:-019819da-dfb9-7a68-b3f6-a8906de0d639}
  EXTERNAL_PRESPLIT_LEDGER_ID: ${BENCH_LEDGER_ID:-019819db-c78c-77b9-a22b-9d018febd0a5}

services:
  midaz-mongodb:
    container_name: midaz-mongodb
    image: mongo:8
    env_file:
      - .env
    restart: always
    healthcheck:
      test: echo 'db.runCommand("ping").ok'
      interval: 10s
      timeout: 5s
      retries: 5
    user: root
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - ${MONGO_PORT}:${MONGO_PORT}
    command: [ "sh", "-c", "chmod 400 /data/mongo-keyfile && mongod --replSet rs0 --bind_ip_all --port ${MONGO_PORT}" ]
    volumes:
      - ./mongo/mongo-keyfile:/data/mongo-keyfile
      - mongodb-data:/data/db
    networks:
      - infra-network

  midaz-mongodb-init:
    container_name: midaz-mongodb-init
    env_file:
      - .env
    image: mongo:8
    depends_on:
      midaz-mongodb:
        condition: service_healthy
    volumes:
      - ./mongo/mongo.sh:/data/mongo.sh
    entrypoint: [ "sh", "-c", "chmod +x /data/mongo.sh && sh /data/mongo.sh" ]
    networks:
      - infra-network

  midaz-valkey:
    container_name: midaz-valkey
    image: valkey/valkey:8
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_USER=${REDIS_USER}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command:
      [
        "redis-server",
        "--requirepass", "${REDIS_PASSWORD}",
        "--port", "${REDIS_PORT}",
        "--lua-time-limit", "3000",
        "--stop-writes-on-bgsave-error", "no",
        "--appendonly", "yes",
        "--appendfsync", "everysec"
      ]
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}
    volumes:
      - redis-data:/data
    networks:
      - infra-network

  midaz-postgres-primary:
    container_name: midaz-postgres-primary
    image: postgres:17
    restart: always
    user: ${USER_EXECUTE_COMMAND}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -p ${DB_PORT}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - ${DB_PORT}:${DB_PORT}
    environment:
      PGPORT: ${DB_PORT}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256\nhost replication all 0.0.0.0/0 md5"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    command: |
      postgres
      -c wal_level=logical
      -c hot_standby=on
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby_feedback=on
      -c max_connections=${MAX_CONNECTIONS}
      -c shared_buffers=${SHARED_BUFFERS}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - infra-network

  midaz-postgres-replica:
    container_name: midaz-postgres-replica
    image: postgres:17
    restart: always
    user: ${USER_EXECUTE_COMMAND}
    ports:
      - ${DB_REPLICA_PORT}:${DB_REPLICA_PORT}
    environment:
      PGPORT: ${DB_REPLICA_PORT}
      PGUSER: ${REPLICATION_USER}
      PGPASSWORD: ${REPLICATION_PASSWORD}
    command: |
      bash -c "
      if [ ! -d \"/var/lib/postgresql/data\" ] || [ ! -f \"/var/lib/postgresql/data/postgresql.conf\" ]; then
        until pg_basebackup --pgdata=/var/lib/postgresql/data -R --slot=replication_slot --host=midaz-postgres-primary --port=${DB_PORT}
        do
          echo 'Waiting for midaz-postgres-primary to connect...'
          sleep 1s
        done

        echo 'Backup done..., starting midaz-postgres-replica...'
        chmod 0700 /var/lib/postgresql/data
      fi

      # Keep replica config aligned with current environment on every boot
      sed -i 's/^#port.*/port = ${DB_REPLICA_PORT}/' /var/lib/postgresql/data/postgresql.conf
      sed -i 's/^#*max_connections.*/max_connections = ${MAX_CONNECTIONS}/' /var/lib/postgresql/data/postgresql.conf
      sed -i 's/^#*shared_buffers.*/shared_buffers = ${SHARED_BUFFERS}/' /var/lib/postgresql/data/postgresql.conf

      exec postgres -c config_file=/var/lib/postgresql/data/postgresql.conf
      "
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_REPLICA_USER} -p ${DB_REPLICA_PORT}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      midaz-postgres-primary:
        condition: service_healthy
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
    networks:
      - infra-network

  midaz-otel-lgtm:
    container_name: midaz-otel-lgtm
    image: grafana/otel-lgtm:latest
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${OTEL_LGTM_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${OTEL_LGTM_ADMIN_PASSWORD}
    ports:
      - ${OTEL_LGTM_EXTERNAL_PORT}:${OTEL_LGTM_INTERNAL_PORT}
      - ${OTEL_LGTM_RECEIVER_GRPC_PORT:-4317}:4317
      - ${OTEL_LGTM_RECEIVER_HTTP_PORT:-4318}:4318
    volumes:
      - ./grafana/otelcol-config.yaml:/otel-lgtm/otelcol-config.yaml:ro
      - ./grafana/run-grafana.sh:/otel-lgtm/run-grafana.sh
      - grafana-data:/otel-lgtm/grafana/data
    networks:
      - infra-network

  midaz-redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: midaz-redpanda
    restart: always
    command:
      - redpanda
      - start
      - --smp
      - "${REDPANDA_SMP:-2}"
      - --memory
      - ${REDPANDA_MEMORY:-4G}
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://midaz-redpanda:9092
    ports:
      - ${REDPANDA_PORT_HOST:-9092}:9092
      - 127.0.0.1:${REDPANDA_ADMIN_PORT:-9644}:9644
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - infra-network

  midaz-redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: midaz-redpanda-init
    depends_on:
      - midaz-redpanda
    entrypoint:
      [
        "sh",
        "-c",
        "until rpk cluster health -X admin.hosts=midaz-redpanda:9644 2>/dev/null | grep -q 'Healthy.*true'; do sleep 1; done; sh /scripts/create-topics.sh",
      ]
    environment:
      REDPANDA_BROKER: midaz-redpanda:9092
    volumes:
      - ./redpanda/create-topics.sh:/scripts/create-topics.sh:ro
    networks:
      - infra-network

  authorizer:
    build:
      context: ../../
      dockerfile: ./components/authorizer/Dockerfile
    container_name: midaz-authorizer-1
    environment:
      AUTHORIZER_GRPC_ADDRESS: ":50051"
      AUTHORIZER_INSTANCE_ADDRESS: "authorizer:50051"
      AUTHORIZER_SHARD_COUNT: "8"
      AUTHORIZER_SHARD_IDS: "0,1,2,3"
      AUTHORIZER_MAX_CONCURRENT_STREAMS: "10000"
      AUTHORIZER_MAX_OPERATIONS_PER_REQUEST: "2048"
      AUTHORIZER_MAX_UNIQUE_BALANCES_PER_REQUEST: "2048"
      AUTHORIZER_WAL_REPLAY_MAX_MUTATIONS_PER_ENTRY: "2048"
      AUTHORIZER_WAL_REPLAY_MAX_UNIQUE_BALANCES_PER_ENTRY: "2048"
      AUTHORIZER_WAL_REPLAY_STRICT_MODE: "false"
      AUTHORIZER_REDPANDA_ENABLED: "true"
      AUTHORIZER_REDPANDA_BROKERS: midaz-redpanda:9092
      AUTHORIZER_REDPANDA_PRODUCER_LINGER_MS: "0"
      AUTHORIZER_REDPANDA_PUBLISH_TIMEOUT_MS: "2000"
      AUTHORIZER_REDPANDA_DELIVERY_TIMEOUT_MS: "5000"
      AUTHORIZER_PEER_INSTANCES: "authorizer-2:50051"
      AUTHORIZER_PEER_AUTH_TOKEN: ${AUTHORIZER_PEER_AUTH_TOKEN:?AUTHORIZER_PEER_AUTH_TOKEN must be set to a strong shared secret}
      AUTHORIZER_PEER_INSECURE_ALLOWED: ${AUTHORIZER_PEER_INSECURE_ALLOWED:-false}
      AUTHORIZER_PEER_PREPARE_MAX_INFLIGHT: "256"
      AUTHORIZER_PEER_NONCE_MAX_ENTRIES: "100000"
      AUTHORIZER_PEER_AUTH_MAX_SKEW_MS: "5000"
      AUTHORIZER_ASYNC_COMMIT_INTENT: "true"
      AUTHORIZER_WAL_RECONCILER_ENABLED: "true"
      AUTHORIZER_OWNED_SHARD_START: "0"
      AUTHORIZER_OWNED_SHARD_END: "3"
      DB_TRANSACTION_HOST: midaz-postgres-primary
      DB_TRANSACTION_PORT: ${DB_PORT}
      DB_TRANSACTION_USER: ${DB_USER}
      DB_TRANSACTION_PASSWORD: ${DB_PASSWORD}
      DB_TRANSACTION_NAME: transaction
      DB_TRANSACTION_SSLMODE: ${DB_TRANSACTION_SSLMODE:-disable}
      # Telemetry ON so benchmark numbers reflect real production overhead.
      # Collector has memory_limiter + per-exporter queues/retries (see grafana/otelcol-config.yaml).
      # Authorizer sits on the hottest path — strongly recommended to enable
      # head-based trace sampling at very high TPS. Uncomment below for 5% sampling.
      # OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
      # OTEL_TRACES_SAMPLER_ARG: "0.05"
      OTEL_EXPORTER_OTLP_ENDPOINT: "midaz-otel-lgtm:4317"
      ENABLE_TELEMETRY: "true"
    depends_on:
      midaz-postgres-primary:
        condition: service_healthy
      midaz-redpanda:
        condition: service_started
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    networks:
      - infra-network

  authorizer-2:
    build:
      context: ../../
      dockerfile: ./components/authorizer/Dockerfile
    container_name: midaz-authorizer-2
    environment:
      AUTHORIZER_GRPC_ADDRESS: ":50051"
      AUTHORIZER_INSTANCE_ADDRESS: "authorizer-2:50051"
      AUTHORIZER_SHARD_COUNT: "8"
      AUTHORIZER_SHARD_IDS: "4,5,6,7"
      AUTHORIZER_MAX_CONCURRENT_STREAMS: "10000"
      AUTHORIZER_MAX_OPERATIONS_PER_REQUEST: "2048"
      AUTHORIZER_MAX_UNIQUE_BALANCES_PER_REQUEST: "2048"
      AUTHORIZER_WAL_REPLAY_MAX_MUTATIONS_PER_ENTRY: "2048"
      AUTHORIZER_WAL_REPLAY_MAX_UNIQUE_BALANCES_PER_ENTRY: "2048"
      AUTHORIZER_WAL_REPLAY_STRICT_MODE: "false"
      AUTHORIZER_REDPANDA_ENABLED: "true"
      AUTHORIZER_REDPANDA_BROKERS: midaz-redpanda:9092
      AUTHORIZER_REDPANDA_PRODUCER_LINGER_MS: "0"
      AUTHORIZER_REDPANDA_PUBLISH_TIMEOUT_MS: "2000"
      AUTHORIZER_REDPANDA_DELIVERY_TIMEOUT_MS: "5000"
      AUTHORIZER_PEER_INSTANCES: "authorizer:50051"
      AUTHORIZER_PEER_AUTH_TOKEN: ${AUTHORIZER_PEER_AUTH_TOKEN:?AUTHORIZER_PEER_AUTH_TOKEN must be set to a strong shared secret}
      AUTHORIZER_PEER_INSECURE_ALLOWED: ${AUTHORIZER_PEER_INSECURE_ALLOWED:-false}
      AUTHORIZER_PEER_PREPARE_MAX_INFLIGHT: "256"
      AUTHORIZER_PEER_NONCE_MAX_ENTRIES: "100000"
      AUTHORIZER_PEER_AUTH_MAX_SKEW_MS: "5000"
      AUTHORIZER_ASYNC_COMMIT_INTENT: "true"
      AUTHORIZER_WAL_RECONCILER_ENABLED: "true"
      AUTHORIZER_OWNED_SHARD_START: "4"
      AUTHORIZER_OWNED_SHARD_END: "7"
      DB_TRANSACTION_HOST: midaz-postgres-primary
      DB_TRANSACTION_PORT: ${DB_PORT}
      DB_TRANSACTION_USER: ${DB_USER}
      DB_TRANSACTION_PASSWORD: ${DB_PASSWORD}
      DB_TRANSACTION_NAME: transaction
      DB_TRANSACTION_SSLMODE: ${DB_TRANSACTION_SSLMODE:-disable}
      # Telemetry ON so benchmark numbers reflect real production overhead.
      # Collector has memory_limiter + per-exporter queues/retries (see grafana/otelcol-config.yaml).
      # Authorizer sits on the hottest path — strongly recommended to enable
      # head-based trace sampling at very high TPS. Uncomment below for 5% sampling.
      # OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
      # OTEL_TRACES_SAMPLER_ARG: "0.05"
      OTEL_EXPORTER_OTLP_ENDPOINT: "midaz-otel-lgtm:4317"
      ENABLE_TELEMETRY: "true"
    depends_on:
      midaz-postgres-primary:
        condition: service_healthy
      midaz-redpanda:
        condition: service_started
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    networks:
      - infra-network

  ledger-1:
    build:
      context: ../../
      dockerfile: ./components/ledger/Dockerfile
    container_name: midaz-ledger-1
    environment: &ledger_env
      ENV_NAME: local
      SERVER_ADDRESS: ":3002"
      PLUGIN_AUTH_ENABLED: "false"
      DB_ONBOARDING_HOST: midaz-postgres-primary
      DB_ONBOARDING_PORT: ${DB_PORT}
      DB_ONBOARDING_USER: ${DB_USER}
      DB_ONBOARDING_PASSWORD: ${DB_PASSWORD}
      DB_ONBOARDING_NAME: onboarding
      DB_ONBOARDING_SSLMODE: disable
      DB_ONBOARDING_REPLICA_HOST: midaz-postgres-replica
      DB_ONBOARDING_REPLICA_PORT: ${DB_REPLICA_PORT}
      DB_ONBOARDING_REPLICA_USER: ${DB_REPLICA_USER}
      DB_ONBOARDING_REPLICA_PASSWORD: ${DB_REPLICA_PASSWORD}
      DB_ONBOARDING_REPLICA_NAME: onboarding
      DB_ONBOARDING_REPLICA_SSLMODE: disable
      DB_ONBOARDING_MAX_OPEN_CONNS: "120"
      DB_ONBOARDING_MAX_IDLE_CONNS: "60"
      DB_TRANSACTION_HOST: midaz-postgres-primary
      DB_TRANSACTION_PORT: ${DB_PORT}
      DB_TRANSACTION_USER: ${DB_USER}
      DB_TRANSACTION_PASSWORD: ${DB_PASSWORD}
      DB_TRANSACTION_NAME: transaction
      DB_TRANSACTION_SSLMODE: disable
      DB_TRANSACTION_REPLICA_HOST: midaz-postgres-replica
      DB_TRANSACTION_REPLICA_PORT: ${DB_REPLICA_PORT}
      DB_TRANSACTION_REPLICA_USER: ${DB_REPLICA_USER}
      DB_TRANSACTION_REPLICA_PASSWORD: ${DB_REPLICA_PASSWORD}
      DB_TRANSACTION_REPLICA_NAME: transaction
      DB_TRANSACTION_REPLICA_SSLMODE: disable
      DB_TRANSACTION_MAX_OPEN_CONNS: "320"
      DB_TRANSACTION_MAX_IDLE_CONNS: "160"
      MONGO_ONBOARDING_URI: mongodb
      MONGO_ONBOARDING_HOST: midaz-mongodb
      MONGO_ONBOARDING_PORT: ${MONGO_PORT}
      MONGO_ONBOARDING_USER: ${MONGO_USER}
      MONGO_ONBOARDING_PASSWORD: ${MONGO_PASSWORD}
      MONGO_ONBOARDING_NAME: onboarding
      MONGO_TRANSACTION_URI: mongodb
      MONGO_TRANSACTION_HOST: midaz-mongodb
      MONGO_TRANSACTION_PORT: ${MONGO_PORT}
      MONGO_TRANSACTION_USER: ${MONGO_USER}
      MONGO_TRANSACTION_PASSWORD: ${MONGO_PASSWORD}
      MONGO_TRANSACTION_NAME: transaction
      <<: [*redis_env, *redpanda_env, *consumer_batch_env, *presplit_env, *authorizer_client_env]
      # Telemetry ON so benchmark numbers reflect real production overhead.
      # Collector has memory_limiter + per-exporter queues/retries (see grafana/otelcol-config.yaml).
      # To reduce trace cardinality at very high TPS, uncomment the sampler below (5% parent-based).
      # OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
      # OTEL_TRACES_SAMPLER_ARG: "0.05"
      OTEL_EXPORTER_OTLP_ENDPOINT: "midaz-otel-lgtm:4317"
      ENABLE_TELEMETRY: "true"
    depends_on:
      midaz-postgres-primary:
        condition: service_healthy
      midaz-redpanda:
        condition: service_started
      midaz-valkey:
        condition: service_started
      midaz-mongodb:
        condition: service_healthy
      midaz-mongodb-init:
        condition: service_completed_successfully
      authorizer:
        condition: service_started
      authorizer-2:
        condition: service_started
    restart: on-failure
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    networks:
      - infra-network

  ledger-2:
    build:
      context: ../../
      dockerfile: ./components/ledger/Dockerfile
    container_name: midaz-ledger-2
    environment:
      <<: *ledger_env
      SERVER_ADDRESS: ":3002"
    depends_on:
      midaz-postgres-primary:
        condition: service_healthy
      midaz-redpanda:
        condition: service_started
      midaz-valkey:
        condition: service_started
      midaz-mongodb:
        condition: service_healthy
      midaz-mongodb-init:
        condition: service_completed_successfully
      authorizer:
        condition: service_started
      authorizer-2:
        condition: service_started
    restart: on-failure
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    networks:
      - infra-network

  ledger-3:
    build:
      context: ../../
      dockerfile: ./components/ledger/Dockerfile
    container_name: midaz-ledger-3
    environment:
      <<: *ledger_env
      SERVER_ADDRESS: ":3002"
    depends_on:
      midaz-postgres-primary:
        condition: service_healthy
      midaz-redpanda:
        condition: service_started
      midaz-valkey:
        condition: service_started
      midaz-mongodb:
        condition: service_healthy
      midaz-mongodb-init:
        condition: service_completed_successfully
      authorizer:
        condition: service_started
      authorizer-2:
        condition: service_started
    restart: on-failure
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    networks:
      - infra-network

  ledger-4:
    build:
      context: ../../
      dockerfile: ./components/ledger/Dockerfile
    container_name: midaz-ledger-4
    environment:
      <<: *ledger_env
      SERVER_ADDRESS: ":3002"
    depends_on:
      midaz-postgres-primary:
        condition: service_healthy
      midaz-redpanda:
        condition: service_started
      midaz-valkey:
        condition: service_started
      midaz-mongodb:
        condition: service_healthy
      midaz-mongodb-init:
        condition: service_completed_successfully
      authorizer:
        condition: service_started
      authorizer-2:
        condition: service_started
    restart: on-failure
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    networks:
      - infra-network

  consumer:
    build:
      context: ../../
      dockerfile: ./components/consumer/Dockerfile
    container_name: midaz-consumer
    environment:
      ENV_NAME: local
      # Consumer uses unprefixed DB vars (different from ledger's DB_TRANSACTION_* prefix).
      DB_HOST: midaz-postgres-primary
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: transaction
      DB_SSLMODE: disable
      DB_REPLICA_HOST: midaz-postgres-replica
      DB_REPLICA_PORT: ${DB_REPLICA_PORT}
      DB_REPLICA_USER: ${DB_REPLICA_USER}
      DB_REPLICA_PASSWORD: ${DB_REPLICA_PASSWORD}
      DB_REPLICA_NAME: transaction
      DB_REPLICA_SSLMODE: disable
      DB_MAX_OPEN_CONNS: "320"
      DB_MAX_IDLE_CONNS: "160"
      MONGO_URI: mongodb
      MONGO_HOST: midaz-mongodb
      MONGO_PORT: ${MONGO_PORT}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_NAME: transaction
      <<: [*redis_env, *redpanda_env, *consumer_batch_env, *presplit_env, *authorizer_client_env]
      # Telemetry ON so benchmark numbers reflect real production overhead.
      # Collector has memory_limiter + per-exporter queues/retries (see grafana/otelcol-config.yaml).
      # To reduce trace cardinality at very high TPS, uncomment the sampler below (5% parent-based).
      # OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
      # OTEL_TRACES_SAMPLER_ARG: "0.05"
      OTEL_EXPORTER_OTLP_ENDPOINT: "midaz-otel-lgtm:4317"
      ENABLE_TELEMETRY: "true"
    depends_on:
      midaz-redpanda-init:
        condition: service_completed_successfully
      midaz-postgres-primary:
        condition: service_healthy
      midaz-valkey:
        condition: service_started
      midaz-mongodb:
        condition: service_healthy
      midaz-mongodb-init:
        condition: service_completed_successfully
      authorizer:
        condition: service_started
      authorizer-2:
        condition: service_started
    healthcheck:
      test: ["CMD", "/app", "--healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: on-failure
    networks:
      - infra-network

  midaz-nginx:
    image: nginx:1.27-alpine
    container_name: midaz-nginx
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    volumes:
      - ./nginx/nginx-bench.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3010:3000"
    # Ledger containers use distroless (no shell, no wget/curl), so container-level
    # healthchecks are impossible. Instead we start nginx after a short delay to
    # give the ledger backends time to bind their listen port. The upstream block
    # uses least_conn, and proxy_next_upstream handles any backend that is still
    # booting when the first request arrives.
    command: ["/bin/sh", "-c", "sleep 5 && nginx -g 'daemon off;'"]
    depends_on:
      - ledger-1
      - ledger-2
      - ledger-3
      - ledger-4
    networks:
      - infra-network

volumes:
  postgres-data:
  postgres-replica-data:
  redis-data:
  grafana-data:
  mongodb-data:
  redpanda-data:

networks:
  infra-network:
    name: infra-network
    driver: bridge
