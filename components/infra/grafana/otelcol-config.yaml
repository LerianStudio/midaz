receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - http://*
  prometheus/collector:
    config:
      scrape_configs:
        - job_name: "opentelemetry-collector"
          scrape_interval: 1s
          static_configs:
            - targets: ["127.0.0.1:8888"]

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: "/ready"

processors:
  # Mask log body and trace payload for sensitive fields
  transform/mask-log-body:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          # JSON-style keys
          - replace_pattern(
            body,
            "(?i)(\"legalDocument\"|\"accountAlias\"|\"password\"|\"newpassword\"|\"oldpassword\"|\"passwordsalt\"|\"token\"|\"secret\"|\"key\"|\"authorization\"|\"auth\"|\"credential\"|\"credentials\"|\"apikey\"|\"api_key\"|\"access_token\"|\"accesstoken\"|\"refresh_token\"|\"refreshtoken\"|\"private_key\"|\"privatekey\"|\"clientid\"|\"client_id\"|\"clientsecret\"|\"client_secret\")\\s*:\\s*\"[^\"]+\"",
            "$1:\"********\""
            )
          # Go-struct–style keys (unquoted)
          - replace_pattern(
            body,
            "(?i)\\b(legalDocument|accountAlias|password|newpassword|oldpassword|passwordsalt|token|secret|key|authorization|auth|credential|credentials|apikey|api_key|access_token|accesstoken|refresh_token|refreshtoken|private_key|privatekey|clientid|client_id|clientsecret|client_secret)\\s*:\\s*([^,}\\s]+)",
            "$1:********"
            )

  transform/mask-trace-fields:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          # JSON-style keys within the JSON blob in the span attribute "app.request.payload"
          - replace_pattern(
            attributes["app.request.payload"],
            "(?i)(\"legalDocument\"|\"accountAlias\"|\"password\"|\"newpassword\"|\"oldpassword\"|\"passwordsalt\"|\"token\"|\"secret\"|\"key\"|\"authorization\"|\"auth\"|\"credential\"|\"credentials\"|\"apikey\"|\"api_key\"|\"access_token\"|\"accesstoken\"|\"refresh_token\"|\"refreshtoken\"|\"private_key\"|\"privatekey\"|\"clientid\"|\"client_id\"|\"clientsecret\"|\"client_secret\")\\s*:\\s*\"[^\"]+\"",
            "$1:\"********\""
            )
          # struct-style replacements inside that blob in the span attribute "app.request.payload"
          - replace_pattern(
            attributes["app.request.payload"],
            "(?i)\\b(legalDocument|accountAlias|password|newpassword|oldpassword|passwordsalt|token|secret|key|authorization|auth|credential|credentials|apikey|api_key|access_token|accesstoken|refresh_token|refreshtoken|private_key|privatekey|clientid|client_id|clientsecret|client_secret)\\s*:\\s*([^,}\\s]+)",
            "$1:********"
            )

  # Backpressure: drop/refuse telemetry before the collector OOMs and starts
  # blocking Midaz hot-path exporters. Runs BEFORE batch in every pipeline.
  # soft_limit = limit_mib - spike_limit_mib (384 MiB) → start refusing.
  # hard_limit = limit_mib (512 MiB) → force GC + refuse.
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  batch: {}

exporters:
  otlphttp/metrics:
    endpoint: http://127.0.0.1:9090/api/v1/otlp
    tls:
      insecure: true
    timeout: 30s
    sending_queue:
      enabled: true
      queue_size: 1000
      num_consumers: 2
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
  otlphttp/traces:
    endpoint: http://127.0.0.1:4418
    tls:
      insecure: true
    timeout: 30s
    sending_queue:
      enabled: true
      queue_size: 1000
      num_consumers: 2
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
  otlphttp/logs:
    endpoint: http://127.0.0.1:3100/otlp
    tls:
      insecure: true
    timeout: 30s
    sending_queue:
      enabled: true
      queue_size: 1000
      num_consumers: 2
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
  debug/metrics:
    verbosity: detailed
  debug/traces:
    verbosity: detailed
  debug/logs:
    verbosity: detailed

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      # memory_limiter MUST be first so we shed load before expensive work.
      processors: [memory_limiter, transform/mask-trace-fields, batch]
      exporters: [debug/traces, otlphttp/traces]
    metrics:
      receivers: [otlp, prometheus/collector]
      processors: [memory_limiter, batch]
      exporters: [debug/metrics, otlphttp/metrics]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, transform/mask-log-body, batch]
      exporters: [debug/logs, otlphttp/logs]
