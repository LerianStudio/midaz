worker_processes auto;
worker_rlimit_nofile 200000;

events {
  use epoll;
  multi_accept on;
  worker_connections 8192;
}

http {
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 30;
  keepalive_requests 100000;

  upstream ledger_upstream {
    least_conn;
    server ledger-1:3001;
    server ledger-2:3002;
    server ledger-3:3003;
    server ledger-4:3004;
    keepalive 256;
  }

  server {
    listen 3000;

    # Benchmark-only reverse proxy. Keep baseline hardening headers to reduce
    # accidental reuse as a production config.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'" always;

    location / {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;
      proxy_connect_timeout 3s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
      proxy_pass http://ledger_upstream;
    }
  }
}
