worker_processes auto;
worker_rlimit_nofile 524288;

events {
  # nginx auto-selects the best event method for the platform (epoll on Linux,
  # kqueue on macOS/BSD). Hardcoding "use epoll" breaks non-Linux environments.
  multi_accept on;
  worker_connections 65535;
}

http {
  server_tokens off;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000000;

  # DNS resolution note: nginx resolves upstream server names at startup and
  # caches the results for the lifetime of the process. This is fine for
  # docker-compose because container IPs are stable within a compose session.
  # If containers are recreated at runtime, nginx must be reloaded/restarted.
  # The ledger containers use gcr.io/distroless/static-debian12 (no shell, no
  # wget/curl), so container-level healthchecks are not feasible. Instead,
  # nginx starts after a short delay and proxy_next_upstream handles transient
  # failures during the ledger boot window.
  upstream ledger_upstream {
    least_conn;
    server ledger-1:3002;
    server ledger-2:3002;
    server ledger-3:3002;
    server ledger-4:3002;
    keepalive 4096;
    keepalive_timeout 60s;
    keepalive_requests 1000000;
  }

  server {
    listen 3000;

    # Benchmark-only reverse proxy. Keep baseline hardening headers to reduce
    # accidental reuse as a production config.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'" always;

    location / {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;
      proxy_connect_timeout 3s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
      proxy_buffering off;
      proxy_next_upstream error timeout http_502 http_503;
      proxy_pass http://ledger_upstream;
    }
  }
}
