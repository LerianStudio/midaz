openapi: 3.0.1
info:
  contact:
    name: Discord community
    url: https://discord.gg/DnhqKwkGv3
  description: This is a swagger documentation for Reporter. The unified reporter
    binary serves the REST API (RUN_MODE=api) and/or the RabbitMQ report-generation
    worker (RUN_MODE=worker); RUN_MODE=all runs both in one process for local development.
    All REST endpoints documented here serve only when RUN_MODE=api or all (port :4005);
    the worker (port :4006) exposes health/readyz only.
  license:
    name: Elastic License 2.0
    url: https://www.elastic.co/licensing/elastic-license
  termsOfService: https://www.elastic.co/licensing/elastic-license
  title: Midaz Reporter API
  version: 4.0.0
servers:
- url: http://localhost:4005/
- url: https://localhost:4005/
paths:
  /v1/data-sources:
    get:
      description: Retrieves all data sources connected on plugin with all information
        from the database
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DataSourceInformation'
                type: array
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Get all data sources connected on reporter
      tags:
      - Data source
  /v1/data-sources/{dataSourceId}:
    get:
      description: Retrieves a data sources information with data source id passed
      parameters:
      - description: Data source ID
        in: path
        name: dataSourceId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataSourceDetails'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Get a data sources information
      tags:
      - Data source
  /v1/deadlines:
    get:
      description: List all the deadlines
      parameters:
      - description: Deadline status
        in: query
        name: status
        schema:
          enum:
          - pending
          - overdue
          - delivered
          type: string
      - description: Limit
        in: query
        name: limit
        schema:
          default: 10
          type: integer
      - description: Page
        in: query
        name: page
        schema:
          default: 1
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_v1_deadlines_get_200_response'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Get all Deadlines
      tags:
      - Deadlines
    post:
      description: Create a Deadline with the input payload
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeadlineInput'
        description: Deadline Input
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/deadline.Deadline'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Create a Deadline
      tags:
      - Deadlines
      x-codegen-request-body-name: deadline
  /v1/deadlines/notifications:
    get:
      description: "Returns active deadlines within their notification window, sorted\
        \ by urgency"
      parameters:
      - description: Maximum number of notifications (1-100)
        in: query
        name: limit
        schema:
          default: 10
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_manager_adapters_http_in.notificationResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Get deadline notifications
      tags:
      - Deadlines
  /v1/deadlines/{id}:
    delete:
      description: Delete a Deadline by its ID
      parameters:
      - description: Deadline ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "204":
          content: {}
          description: No Content
        "400":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Bad Request
        "401":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Not Found
        "500":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Delete a Deadline
      tags:
      - Deadlines
    patch:
      description: Update a Deadline by its ID
      parameters:
      - description: Deadline ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeadlineInput'
        description: Deadline Update Input
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/deadline.Deadline'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Update a Deadline
      tags:
      - Deadlines
      x-codegen-request-body-name: deadline
  /v1/deadlines/{id}/deliver:
    patch:
      description: Mark a Deadline as delivered by its ID
      parameters:
      - description: Deadline ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliverDeadlineInput'
        description: Deliver Deadline Input
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/deadline.Deadline'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Deliver a Deadline
      tags:
      - Deadlines
      x-codegen-request-body-name: deadline
  /v1/metrics:
    get:
      description: "Returns aggregated counts of templates, reports, data sources,\
        \ and errors"
      parameters:
      - description: Number of days for error period
        in: query
        name: errorPeriodDays
        schema:
          default: 7
          maximum: 365
          minimum: 1
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_manager_adapters_http_in.metricsResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Get system metrics
      tags:
      - Metrics
  /v1/reports:
    get:
      description: List all the reports
      parameters:
      - description: Report status
        in: query
        name: status
        schema:
          enum:
          - Processing
          - Finished
          - Error
          - PendingExtraction
          - Partial
          type: string
      - description: Template UUID (also accepts templateId)
        in: query
        name: template_id
        schema:
          format: uuid
          type: string
      - description: "Created at date, YYYY-MM-DD (also accepts createdAt)"
        in: query
        name: created_at
        schema:
          format: date
          type: string
      - description: "Filter window start, YYYY-MM-DD"
        in: query
        name: start_date
        schema:
          format: date
          type: string
      - description: "Filter window end, YYYY-MM-DD"
        in: query
        name: end_date
        schema:
          format: date
          type: string
      - description: Filter by description
        in: query
        name: description
        schema:
          type: string
      - description: Filter by output format
        in: query
        name: output_format
        schema:
          enum:
          - PDF
          - HTML
          - XML
          - TXT
          - CSV
          type: string
      - description: Filter by active flag
        in: query
        name: active
        schema:
          type: boolean
      - description: Filter by type
        in: query
        name: type
        schema:
          type: string
      - description: Opaque cursor for cursor-based pagination
        in: query
        name: cursor
        schema:
          type: string
      - description: Sort order
        in: query
        name: sort_order
        schema:
          default: desc
          enum:
          - asc
          - desc
          type: string
      - description: Page size
        in: query
        name: limit
        schema:
          default: 10
          type: integer
      - description: Page number
        in: query
        name: page
        schema:
          default: 1
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_v1_reports_get_200_response'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Get all reports
      tags:
      - Reports
    post:
      description: Create a Report of existent template with the input payload
      parameters:
      - description: Client-provided idempotency key to prevent duplicate report creation
        in: header
        name: X-Idempotency
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportInput'
        description: Report Input
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/report.Report'
          description: Created
          headers:
            X-Idempotency-Replayed:
              description: Set to 'true' when the response is a replay of a previously
                processed idempotent request
              schema:
                type: string
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Create a Report
      tags:
      - Reports
      x-codegen-request-body-name: reports
  /v1/reports/{id}:
    get:
      description: Get information of a Report passing the ID
      parameters:
      - description: Report ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/report.Report'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Get a Report
      tags:
      - Reports
  /v1/reports/{id}/download:
    get:
      description: Make a download of a Report passing the ID
      parameters:
      - description: Report ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                format: binary
                type: string
            application/octet-stream:
              schema:
                format: binary
                type: string
          description: OK
          headers:
            Content-Disposition:
              description: attachment; filename=report.pdf
              schema:
                type: string
            Content-Type:
              description: application/pdf | text/html | application/xml | text/csv
              schema:
                type: string
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Download a Report
      tags:
      - Reports
  /v1/templates:
    get:
      description: List all the templates
      parameters:
      - description: Limit
        in: query
        name: limit
        schema:
          default: 10
          type: integer
      - description: Page
        in: query
        name: page
        schema:
          default: 1
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_v1_templates_get_200_response'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Get all Templates
      tags:
      - Templates
    post:
      description: Create a Template with the input payload (multipart form)
      parameters:
      - description: Client-provided idempotency key to prevent duplicate template
          creation
        in: header
        name: X-Idempotency
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/_v1_templates_post_request'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Create a Template
      tags:
      - Templates
  /v1/templates/blocks-config:
    get:
      description: Returns all available block type definitions including properties
        and categories
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pongo.BlocksConfigResponse'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Get block definitions for template builder
      tags:
      - Template Builder
  /v1/templates/filters:
    get:
      description: Returns all available Pongo2 filter definitions including DIMP
        filters
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pongo.FiltersResponse'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Get filter definitions for template builder
      tags:
      - Template Builder
  /v1/templates/generate-code:
    post:
      description: Converts a JSON block structure into Pongo2 template code and extracts
        mapped fields
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/template_builder.GenerateCodeInput'
        description: Block structure
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/template_builder.GenerateCodeResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pkg.HTTPError'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Generate Pongo2 code from template blocks
      tags:
      - Template Builder
      x-codegen-request-body-name: body
  /v1/templates/validate:
    post:
      description: Validates a sequence of template blocks. Validation errors are
