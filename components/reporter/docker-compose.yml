# Unified reporter component compose. ONE codebase (components/reporter), TWO
# images built by the two Dockerfile build-contexts that pin the stable image
# names Helm depends on:
#   - reporter-api    → components/reporter-manager/Dockerfile (distroless, RUN_MODE=api, :4005)
#   - reporter-worker → components/reporter-worker/Dockerfile  (alpine+Chromium, RUN_MODE=worker, :4006)
# Both build the SAME components/reporter/cmd/app/main.go from the repo-root
# context (../../). Production splits these into two Deployments from one image;
# local dev runs both surfaces as two containers here.
services:
  reporter-api:
    container_name: midaz-reporter-manager
    restart: always
    build:
      context: ../../
      dockerfile: ./components/reporter-manager/Dockerfile
    env_file:
      - .env
    environment:
      - RUN_MODE=api
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    # API image is distroless (no shell), so the container HEALTHCHECK is the
    # orchestrator's responsibility (Kubernetes probe against /health). No
    # compose-level healthcheck — mirrors ledger's distroless service.
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    networks:
      - infra-network

  reporter-worker:
    container_name: midaz-reporter-worker
    restart: always
    build:
      context: ../../
      dockerfile: ./components/reporter-worker/Dockerfile
    env_file:
      - .env
    environment:
      - RUN_MODE=worker
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${HEALTH_PORT}/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    # The worker renders PDFs to the SeaweedFS S3 store (midaz-seaweedfs) on
    # infra-network — OBJECT_STORAGE_ENDPOINT in .env targets it. KEDA autoscaling
    # is staged under the infra compose's `keda` profile (Kubernetes-only).
    networks:
      - infra-network

networks:
  infra-network:
    name: infra-network
    driver: bridge
    external: true
