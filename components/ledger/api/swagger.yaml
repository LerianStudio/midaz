info:
  contact:
    name: Discord community
    url: https://discord.gg/DnhqKwkGv3
  description: This is a swagger documentation for the Midaz Ledger API. This API
    combines all Onboarding endpoints (organizations, ledgers, accounts, assets, portfolios,
    segments), Transaction endpoints (transactions, balances, operations, asset-rates),
    and Metadata Index endpoints in a single service.
  license:
    name: Elastic License 2.0
    url: https://www.elastic.co/licensing/elastic-license
  termsOfService: http://swagger.io/terms/
  title: Midaz Ledger API
  version: v3.7.0
paths:
  /v1/organizations:
    get:
      description: Returns a paginated list of organizations, optionally filtered
        by metadata, date range, and other criteria
      parameters:
      - description: 'Bearer token authentication. Format: Bearer {access_token}.
          Only required when auth plugin is enabled.'
        in: header
        name: Authorization
        type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        type: string
      - description: JSON string to filter organizations by metadata fields
        in: query
        name: metadata
        type: string
      - default: 10
        description: Maximum number of records to return per page
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - default: 1
        description: Page number for pagination
        in: query
        minimum: 1
        name: page
        type: integer
      - description: 'Filter organizations created on or after this date (format:
          YYYY-MM-DD)'
        in: query
        name: start_date
        type: string
      - description: 'Filter organizations created on or before this date (format:
          YYYY-MM-DD)'
        in: query
        name: end_date
        type: string
      - description: Sort direction for results based on creation date
        enum:
        - asc
        - desc
        in: query
        name: sort_order
        type: string
      - description: Filter organizations by legal name (case-insensitive, prefix
          match)
        in: query
        maxLength: 256
        name: legal_name
        type: string
      - description: Filter organizations by doing business as name (case-insensitive,
          prefix match)
        in: query
        maxLength: 256
        name: doing_business_as
        type: string
      - description: Filter organizations by status
        in: query
        name: status
        type: string
      - description: Filter organizations by legal document (exact match)
        in: query
        name: legal_document
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved organizations list
          schema:
            allOf:
            - $ref: '#/definitions/http.Pagination'
            - properties:
                items:
                  items:
                    $ref: '#/definitions/Organization'
                  type: array
              type: object
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/Error'
        "401":
          description: Unauthorized access
          schema:
            $ref: '#/definitions/Error'
        "403":
          description: Forbidden access
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'
      summary: List all organizations
      tags:
      - Organizations
    post:
      consumes:
      - application/json
      description: Creates a new organization with the provided details including
        legal name, legal document, and optional address information
      parameters:
      - description: 'Bearer token authentication. Format: Bearer {access_token}.
          Only required when auth plugin is enabled.'
        in: header
        name: Authorization
        type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        type: string
      - description: Organization details including legal name, legal document, and
          optional address information
        in: body
        name: organization
        required: true
        schema:
          $ref: '#/definitions/CreateOrganizationInput'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully created organization
          schema:
            $ref: '#/definitions/Organization'
        "400":
          description: Invalid input, validation errors
          schema:
            $ref: '#/definitions/Error'
        "401":
          description: Unauthorized access
          schema:
            $ref: '#/definitions/Error'
        "403":
          description: Forbidden access
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'
      summary: Create a new organization
      tags:
      - Organizations
  /v1/organizations/{organization_id}:
    delete:
      description: 'Permanently removes an organization identified by its UUID. Note:
        This operation is not available in production environments.'
      parameters:
      - description: 'Bearer token authentication. Format: Bearer {access_token}.
          Only required when auth plugin is enabled.'
        in: header
        name: Authorization
        type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        type: string
      - description: Organization ID in UUID format
        in: path
        name: organization_id
        required: true
        type: string
      responses:
        "204":
          description: Organization successfully deleted
        "401":
          description: Unauthorized access
          schema:
            $ref: '#/definitions/Error'
        "403":
          description: Forbidden action or not permitted in production environment
          schema:
            $ref: '#/definitions/Error'
        "404":
          description: Organization not found
          schema:
            $ref: '#/definitions/Error'
        "409":
          description: 'Conflict: Cannot delete organization with dependent resources'
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'
      summary: Delete an organization
      tags:
      - Organizations
    get:
      description: Returns detailed information about an organization identified by
        its UUID
      parameters:
      - description: 'Bearer token authentication. Format: Bearer {access_token}.
          Only required when auth plugin is enabled.'
        in: header
        name: Authorization
        type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        type: string
      - description: Organization ID in UUID format
        in: path
        name: organization_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved organization
          schema:
            $ref: '#/definitions/Organization'
        "401":
          description: Unauthorized access
          schema:
            $ref: '#/definitions/Error'
        "403":
          description: Forbidden access
          schema:
            $ref: '#/definitions/Error'
        "404":
          description: Organization not found
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'
      summary: Retrieve a specific organization
      tags:
      - Organizations
    patch:
      consumes:
      - application/json
      description: Updates an organization's information such as legal name, address,
        or status. Only supplied fields will be updated.
      parameters:
      - description: 'Bearer token authentication. Format: Bearer {access_token}.
          Only required when auth plugin is enabled.'
        in: header
        name: Authorization
        type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        type: string
      - description: Organization ID in UUID format
        in: path
        name: organization_id
        required: true
        type: string
      - description: Organization fields to update. Only supplied fields will be modified.
        in: body
        name: organization
        required: true
        schema:
          $ref: '#/definitions/UpdateOrganizationInput'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated organization
          schema:
            $ref: '#/definitions/Organization'
        "400":
          description: Invalid input, validation errors
          schema:
            $ref: '#/definitions/Error'
        "401":
          description: Unauthorized access
          schema:
            $ref: '#/definitions/Error'
        "403":
          description: Forbidden access
          schema:
            $ref: '#/definitions/Error'
        "404":
          description: Organization not found
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'
      summary: Update an existing organization
      tags:
      - Organizations
