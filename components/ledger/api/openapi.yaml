    AccountingEntries:
      description: "AccountingEntries object containing optional accounting entries\
        \ for each action type (direct, hold, commit, cancel, revert, overdraft, refund)."
      properties:
        cancel:
          allOf:
          - $ref: '#/components/schemas/AccountingEntry'
          description: The accounting entry for the cancel action.
          type: object
        commit:
          allOf:
          - $ref: '#/components/schemas/AccountingEntry'
          description: The accounting entry for the commit action.
          type: object
        direct:
          allOf:
          - $ref: '#/components/schemas/AccountingEntry'
          description: The accounting entry for the direct action.
          type: object
        hold:
          allOf:
          - $ref: '#/components/schemas/AccountingEntry'
          description: The accounting entry for the hold action.
          type: object
        overdraft:
          allOf:
          - $ref: '#/components/schemas/AccountingEntry'
          description: |-
            The accounting entry for the overdraft lifecycle. Debit rubric classifies
            overdraft usage (deficit grows); credit rubric classifies overdraft
            repayment (deficit shrinks). Both rubrics are REQUIRED when this entry
            is present.
          type: object
        revert:
          allOf:
          - $ref: '#/components/schemas/AccountingEntry'
          description: The accounting entry for the revert action.
          type: object
      type: object
    AccountingEntry:
      description: "AccountingEntry object containing debit and credit rubrics for\
        \ a specific action.  Field requirements depend on the parent operationType\
        \ and scenario: - source + direct or commit: debit is REQUIRED, credit is\
        \ optional. - source + hold or cancel: both debit AND credit are REQUIRED.\
        \ - destination + direct or commit: credit is REQUIRED, debit is optional.\
        \ - destination + hold or cancel: NOT ALLOWED (rejected at creation). - destination\
        \ + revert: NOT ALLOWED (rejected at creation). - source + revert: NOT ALLOWED\
        \ (rejected at creation). - bidirectional (all scenarios including revert):\
        \ both debit AND credit are REQUIRED.  An entry with neither debit nor credit\
        \ is always rejected."
      properties:
        credit:
          allOf:
          - $ref: '#/components/schemas/AccountingRubric'
          description: The credit rubric for this entry. Required based on operationType/scenario
            matrix (see type description).
          type: object
        debit:
          allOf:
          - $ref: '#/components/schemas/AccountingRubric'
          description: The debit rubric for this entry. Required based on operationType/scenario
            matrix (see type description).
          type: object
      type: object
