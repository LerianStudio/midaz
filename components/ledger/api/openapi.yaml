components:
  schemas:
    Account:
      description: "Complete account entity containing all fields including system-generated\
        \ fields like ID, creation timestamps, and metadata. This is the response\
        \ format for account operations. Accounts represent individual financial entities\
        \ (bank accounts, cards, expense categories, etc.) within a ledger and are\
        \ the primary structures for tracking balances and transactions."
      example:
        metadata:
          key: "{}"
        assetCode: USD
        entityId: EXT-ACC-12345
        type: deposit
        holderId: 00000000-0000-0000-0000-000000000000
        ledgerId: 00000000-0000-0000-0000-000000000000
        organizationId: 00000000-0000-0000-0000-000000000000
        parentAccountId: 00000000-0000-0000-0000-000000000000
        createdAt: 2021-01-01T00:00:00Z
        deletedAt: 2021-01-01T00:00:00Z
        portfolioId: 00000000-0000-0000-0000-000000000000
        blocked: true
        segmentId: 00000000-0000-0000-0000-000000000000
        name: Corporate Checking Account
        alias: '@treasury_checking'
        id: 00000000-0000-0000-0000-000000000000
        status: "{}"
        updatedAt: 2021-01-01T00:00:00Z
      properties:
        alias:
          description: |-
            Unique alias for the account (makes referencing easier)
            example: @treasury_checking
            maxLength: 100
          example: '@treasury_checking'
          maxLength: 100
          type: string
        assetCode:
          description: |-
            Asset code associated with this account (determines currency/asset type)
            example: USD
            maxLength: 100
          example: USD
          maxLength: 100
          type: string
        blocked:
          description: Indicates if the account is blocked
          type: boolean
        createdAt:
          description: |-
            Timestamp when the account was created (RFC3339 format)
            example: 2021-01-01T00:00:00Z
            format: date-time
          example: 2021-01-01T00:00:00Z
          format: date-time
          type: string
        deletedAt:
          description: |-
            Timestamp when the account was soft deleted, null if not deleted (RFC3339 format)
            example: null
            format: date-time
          example: 2021-01-01T00:00:00Z
          format: date-time
          type: string
        entityId:
          description: |-
            Free-form external reference for linking to external systems. This is NOT the
            ownership link: holderId is the formal owner of the account.
            example: EXT-ACC-12345
            maxLength: 256
          example: EXT-ACC-12345
          maxLength: 256
          type: string
        holderId:
          description: |-
            ID of the holder that formally owns this account (UUID format)
            example: 00000000-0000-0000-0000-000000000000
            format: uuid
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        id:
          description: |-
            Unique identifier for the account (UUID format)
            example: 00000000-0000-0000-0000-000000000000
            format: uuid
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        ledgerId:
          description: |-
            ID of the ledger this account belongs to (UUID format)
            example: 00000000-0000-0000-0000-000000000000
            format: uuid
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        metadata:
          additionalProperties:
            type: object
          description: |-
            Custom key-value pairs for extending the account information
            example: {"department": "Treasury", "purpose": "Operating Expenses", "region": "Global"}
          type: object
        name:
          description: |-
            Human-readable name of the account
            example: Corporate Checking Account
            maxLength: 256
          example: Corporate Checking Account
          maxLength: 256
          type: string
        organizationId:
          description: |-
            ID of the organization that owns this account (UUID format)
            example: 00000000-0000-0000-0000-000000000000
            format: uuid
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        parentAccountId:
          description: |-
            ID of the parent account if this is a sub-account (UUID format)
            example: 00000000-0000-0000-0000-000000000000
            format: uuid
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        portfolioId:
          description: |-
            ID of the portfolio this account belongs to (UUID format)
            example: 00000000-0000-0000-0000-000000000000
            format: uuid
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        segmentId:
          description: |-
            ID of the segment this account belongs to (UUID format)
            example: 00000000-0000-0000-0000-000000000000
            format: uuid
          example: 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/Status'
          description: Current operating status of the account
          type: object
        type:
          description: |-
            Type of the account.
            example: deposit
          example: deposit
          type: string
        updatedAt:
          description: |-
            Timestamp when the account was last updated (RFC3339 format)
            example: 2021-01-01T00:00:00Z
            format: date-time
          example: 2021-01-01T00:00:00Z
          format: date-time
          type: string
      type: object
    AccountRule:
      description: AccountRule object containing the rule type and condition for account
        selection in operation routes.
      properties:
        ruleType:
          description: The rule type for account selection.
          example: alias
          type: string
        validIf:
          description: "The rule condition for account selection. String for alias\
            \ type (e.g. \"@cash_account\"), array for account_type."
          type: object
      type: object
    AccountType:
      description: AccountType object
      example:
        ledgerId: 01965ed9-7fa4-75b2-8872-fc9e8509ab0a
        organizationId: 01965ed9-7fa4-75b2-8872-fc9e8509ab0a
        createdAt: 2021-01-01T00:00:00Z
        deletedAt: 2021-01-01T00:00:00Z
        metadata:
          key: "{}"
        keyValue: current_assets
        name: Current Assets
        description: Assets that are expected to be converted to cash within one year
        id: 01965ed9-7fa4-75b2-8872-fc9e8509ab0a
        updatedAt: 2021-01-01T00:00:00Z
      properties:
        createdAt:
          description: The timestamp when the account type was created.
          example: 2021-01-01T00:00:00Z
          format: date-time
          type: string
        deletedAt:
          description: The timestamp when the account type was deleted.
          example: 2021-01-01T00:00:00Z
          format: date-time
          type: string
        description:
          description: Detailed description of the account type.
          example: Assets that are expected to be converted to cash within one year
          type: string
        id:
          description: The unique identifier of the Account Type.
          example: 01965ed9-7fa4-75b2-8872-fc9e8509ab0a
          type: string
        keyValue:
          description: A unique key value identifier for the account type.
          example: current_assets
          type: string
        ledgerId:
          description: The unique identifier of the Ledger.
          example: 01965ed9-7fa4-75b2-8872-fc9e8509ab0a
          type: string
        metadata:
          additionalProperties:
            type: object
          description: |-
            Custom key-value pairs for extending the account type information
