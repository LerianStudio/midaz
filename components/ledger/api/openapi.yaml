openapi: 3.0.1
info:
  contact:
    name: Discord community
    url: https://discord.gg/DnhqKwkGv3
  description: "This is a swagger documentation for the Midaz Ledger API. This unified\
    \ service combines Onboarding endpoints (organizations, ledgers, accounts, assets,\
    \ portfolios, segments), Transaction endpoints (transactions, balances, operations,\
    \ asset-rates), Holders and Instruments endpoints (holder and instrument account\
    \ management), Fees endpoints (packages, estimates, billing), the Holder-Account\
    \ composition endpoint, and Metadata Index endpoints in a single service."
  license:
    name: Elastic License 2.0
    url: https://www.elastic.co/licensing/elastic-license
  termsOfService: https://www.elastic.co/licensing/elastic-license
  title: Midaz Ledger API
  version: 4.0.0
servers:
- url: http://localhost:3002/
- url: https://localhost:3002/
tags:
- description: Top-level tenant entities that own ledgers and all nested resources.
  name: Organizations
- description: "Bookkeeping containers scoping assets, accounts, and transactions."
  name: Ledgers
- description: Balance-holding entries that transactions debit and credit.
  name: Accounts
- description: Currencies and instruments tracked within a ledger.
  name: Assets
- description: Logical groupings of accounts under a holder.
  name: Portfolios
- description: Sub-classifications for organizing accounts.
  name: Segments
- description: Reusable account classification definitions.
  name: Account Types
- description: Double-entry postings that move value between accounts.
  name: Transactions
- description: "Per-account available, on-hold, and scale state."
  name: Balances
- description: The individual debit and credit legs of a transaction.
  name: Operations
- description: Conversion rates between assets.
  name: Asset Rates
- description: Templates constraining which accounts an operation leg may touch.
  name: Operation Routes
- description: Ordered sets of operation routes describing a transaction shape.
  name: Transaction Routes
- description: Index definitions over entity metadata for queryable lookups.
  name: Metadata Indexes
- description: Holder identity records (the party behind accounts).
  name: Holders
- description: Financial instrument records bound to holders.
  name: Instruments
- description: Holder + account creation in a single call.
  name: Composition
- description: Fee package definitions applied during transaction processing.
  name: Packages
- description: Fee estimation and application for transactions.
  name: Fees
- description: Billing package definitions for charge aggregation.
  name: Billing Packages
- description: On-demand billing charge calculation.
  name: Billing Calculate
paths:
  /v1/organizations:
    get:
      description: "Returns a paginated list of organizations, optionally filtered\
        \ by metadata, date range, and other criteria"
      parameters:
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      - description: JSON string to filter organizations by metadata fields
        in: query
        name: metadata
        schema:
          type: string
      - description: Maximum number of records to return per page
        in: query
        name: limit
        schema:
          default: 10
          maximum: 100
          minimum: 1
          type: integer
      - description: Page number for pagination
        in: query
        name: page
        schema:
          default: 1
          minimum: 1
          type: integer
      - description: "Filter organizations created on or after this date (format:\
          \ YYYY-MM-DD)"
        in: query
        name: start_date
        schema:
          type: string
      - description: "Filter organizations created on or before this date (format:\
          \ YYYY-MM-DD)"
        in: query
        name: end_date
        schema:
          type: string
      - description: Sort direction for results based on creation date
        in: query
        name: sort_order
        schema:
          enum:
          - asc
          - desc
          type: string
      - description: "Filter organizations by legal name (case-insensitive, prefix\
          \ match)"
        in: query
        name: legal_name
        schema:
          maxLength: 256
          type: string
      - description: "Filter organizations by doing business as name (case-insensitive,\
          \ prefix match)"
        in: query
        name: doing_business_as
        schema:
          maxLength: 256
          type: string
      - description: Filter organizations by status
        in: query
        name: status
        schema:
          type: string
      - description: Filter organizations by legal document (exact match)
        in: query
        name: legal_document
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_v1_organizations_get_200_response'
          description: Successfully retrieved organizations list
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid query parameters
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - BearerAuth: []
      summary: List all organizations
      tags:
      - Organizations
    post:
      description: "Creates a new organization with the provided details including\
        \ legal name, legal document, and optional address information"
      parameters:
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationInput'
        description: "Organization details including legal name, legal document, and\
          \ optional address information"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: Successfully created organization
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: "Invalid input, validation errors"
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - BearerAuth: []
      summary: Create a new organization
      tags:
      - Organizations
      x-codegen-request-body-name: organization
  /v1/organizations/metrics/count:
    head:
      description: Returns the total count of organizations as a header without a
        response body
      parameters:
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      responses:
        "204":
          content: {}
          description: No content with X-Total-Count header containing the count
        "401":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        "403":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Organization not found
        "500":
          content:
            '*/*':
              schema:
