            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: "Conflict: Cannot delete organization with dependent resources"
        "500":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      security:
      - BearerAuth: []
      summary: Delete an organization
      tags:
      - Organizations
    get:
