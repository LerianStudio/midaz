openapi: 3.0.1
info:
  contact:
    name: Discord community
    url: https://discord.gg/DnhqKwkGv3
  description: This is a swagger documentation for the Midaz Ledger API (unified onboarding
    + transaction)
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Midaz Ledger API
  version: v1.48.0
servers:
- url: //localhost:3000/
paths:
  /v1/organizations:
    get:
      description: Returns a paginated list of organizations, optionally filtered
        by metadata, date range, and other criteria
      parameters:
      - description: 'Authorization Bearer Token with format: Bearer {token}'
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      - description: JSON string to filter organizations by metadata fields
        in: query
        name: metadata
        schema:
          type: string
      - description: Maximum number of records to return per page
        in: query
        name: limit
        schema:
          default: 10
          maximum: 100
          minimum: 1
          type: integer
      - description: Page number for pagination
        in: query
        name: page
        schema:
          default: 1
          minimum: 1
          type: integer
      - description: 'Filter organizations created on or after this date (format:
          YYYY-MM-DD)'
        in: query
        name: start_date
        schema:
          type: string
      - description: 'Filter organizations created on or before this date (format:
          YYYY-MM-DD)'
        in: query
        name: end_date
        schema:
          type: string
      - description: Sort direction for results based on creation date
        in: query
        name: sort_order
        schema:
          enum:
          - asc
          - desc
          type: string
      - description: Filter organizations by legal name (case-insensitive, prefix
          match)
        in: query
        name: legal_name
        schema:
          maxLength: 256
          type: string
      - description: Filter organizations by doing business as name (case-insensitive,
          prefix match)
        in: query
        name: doing_business_as
        schema:
          maxLength: 256
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_200'
          description: Successfully retrieved organizations list
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid query parameters
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      summary: List all organizations
      tags:
      - Organizations
    post:
      description: Creates a new organization with the provided details including
        legal name, legal document, and optional address information
      parameters:
      - description: 'Authorization Bearer Token with format: Bearer {token}'
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationInput'
        description: Organization details including legal name, legal document, and
          optional address information
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: Successfully created organization
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid input, validation errors
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      summary: Create a new organization
      tags:
      - Organizations
      x-codegen-request-body-name: organization
  /v1/organizations/metrics/count:
    head:
      description: Returns the total count of organizations as a header without a
        response body
      parameters:
      - description: 'Authorization Bearer Token with format: Bearer {token}'
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      responses:
        "204":
          content: {}
          description: No content with X-Total-Count header containing the count
        "401":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        "403":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Organization not found
        "500":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      summary: Count total organizations
      tags:
      - Organizations
  /v1/organizations/{id}:
    delete:
      description: 'Permanently removes an organization identified by its UUID. Note:
        This operation is not available in production environments.'
      parameters:
      - description: 'Authorization Bearer Token with format: Bearer {token}'
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      - description: Organization ID in UUID format
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "204":
          content: {}
          description: Organization successfully deleted
        "401":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        "403":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden action or not permitted in production environment
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Organization not found
        "409":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: 'Conflict: Cannot delete organization with dependent resources'
        "500":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      summary: Delete an organization
      tags:
      - Organizations
    get:
      description: Returns detailed information about an organization identified by
        its UUID
      parameters:
      - description: 'Authorization Bearer Token with format: Bearer {token}'
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      - description: Organization ID in UUID format
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: Successfully retrieved organization
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Organization not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      summary: Retrieve a specific organization
      tags:
      - Organizations
    patch:
      description: Updates an organization's information such as legal name, address,
        or status. Only supplied fields will be updated.
      parameters:
      - description: 'Authorization Bearer Token with format: Bearer {token}'
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      - description: Organization ID in UUID format
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationInput'
        description: Organization fields to update. Only supplied fields will be modified.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: Successfully updated organization
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid input, validation errors
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Organization not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      summary: Update an existing organization
      tags:
      - Organizations
      x-codegen-request-body-name: organization
  /v1/organizations/{organization_id}/ledgers:
    get:
      description: Returns a paginated list of ledgers within the specified organization,
        optionally filtered by metadata, date range, and other criteria
      parameters:
      - description: 'Authorization Bearer Token with format: Bearer {token}'
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      - description: Organization ID in UUID format
        in: path
        name: organization_id
        required: true
        schema:
          type: string
      - description: JSON string to filter ledgers by metadata fields
        in: query
        name: metadata
        schema:
          type: string
      - description: Maximum number of records to return per page
        in: query
        name: limit
        schema:
          default: 10
          maximum: 100
          minimum: 1
          type: integer
      - description: Page number for pagination
        in: query
        name: page
        schema:
          default: 1
          minimum: 1
          type: integer
      - description: 'Filter ledgers created on or after this date (format: YYYY-MM-DD)'
        in: query
        name: start_date
        schema:
          type: string
      - description: 'Filter ledgers created on or before this date (format: YYYY-MM-DD)'
        in: query
        name: end_date
        schema:
          type: string
      - description: Sort direction for results based on creation date
        in: query
        name: sort_order
        schema:
          enum:
          - asc
          - desc
          type: string
      - description: Filter ledgers by name (case-insensitive, prefix match)
        in: query
        name: name
        schema:
          maxLength: 256
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_200_1'
          description: Successfully retrieved ledgers list
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid query parameters
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Organization not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      summary: List all ledgers
      tags:
      - Ledgers
    post:
      description: Creates a new ledger within the specified organization. A ledger
        is a financial record-keeping system for tracking assets, accounts, and transactions.
      parameters:
      - description: 'Authorization Bearer Token with format: Bearer {token}'
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      - description: Organization ID in UUID format
        in: path
        name: organization_id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLedgerInput'
        description: Ledger details including name, status, and optional metadata
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ledger'
          description: Successfully created ledger
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid input, validation errors
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Organization not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      summary: Create a new ledger
      tags:
      - Ledgers
      x-codegen-request-body-name: ledger
  /v1/organizations/{organization_id}/ledgers/metrics/count:
    head:
      description: Returns the total count of ledgers for a specific organization
        as a header without a response body
      parameters:
      - description: 'Authorization Bearer Token with format: Bearer {token}'
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      - description: Organization ID in UUID format
        in: path
        name: organization_id
        required: true
        schema:
          type: string
      responses:
        "204":
          content: {}
          description: No content with X-Total-Count header containing the count
        "401":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        "403":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Organization not found
        "500":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      summary: Count total ledgers
      tags:
      - Ledgers
  /v1/organizations/{organization_id}/ledgers/{id}:
    delete:
      description: 'Permanently removes a ledger identified by its UUID. Note: This
        operation is not available in production environments.'
      parameters:
      - description: 'Authorization Bearer Token with format: Bearer {token}'
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      - description: Organization ID in UUID format
        in: path
        name: organization_id
        required: true
        schema:
          type: string
      - description: Ledger ID in UUID format
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "204":
          content: {}
          description: Ledger successfully deleted
        "401":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        "403":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden action or not permitted in production environment
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Ledger or organization not found
        "409":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: 'Conflict: Cannot delete ledger with dependent resources'
        "500":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      summary: Delete a ledger
      tags:
      - Ledgers
    get:
      description: Returns detailed information about a ledger identified by its UUID
        within the specified organization
      parameters:
      - description: 'Authorization Bearer Token with format: Bearer {token}'
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      - description: Organization ID in UUID format
        in: path
        name: organization_id
        required: true
        schema:
          type: string
      - description: Ledger ID in UUID format
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ledger'
          description: Successfully retrieved ledger
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Ledger or organization not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      summary: Retrieve a specific ledger
      tags:
      - Ledgers
    patch:
      description: Updates a ledger's information such as name, status, or metadata.
        Only supplied fields will be updated.
      parameters:
      - description: 'Authorization Bearer Token with format: Bearer {token}'
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      - description: Organization ID in UUID format
        in: path
        name: organization_id
        required: true
        schema:
          type: string
      - description: Ledger ID in UUID format
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLedgerInput'
        description: Ledger fields to update. Only supplied fields will be modified.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ledger'
          description: Successfully updated ledger
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid input, validation errors
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Ledger or organization not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      summary: Update an existing ledger
      tags:
      - Ledgers
      x-codegen-request-body-name: ledger
  /v1/organizations/{organization_id}/ledgers/{id}/settings:
    get:
      description: Returns the current configuration settings for a specific ledger.
        If no settings have been persisted, returns the default settings object.
      parameters:
      - description: 'Authorization Bearer Token with format: Bearer {token}'
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      - description: Organization ID in UUID format
        in: path
        name: organization_id
        required: true
        schema:
          type: string
      - description: Ledger ID in UUID format
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mmodel.LedgerSettings'
          description: Successfully retrieved ledger settings
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Ledger not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      summary: Get ledger settings
      tags:
      - Ledgers
    patch:
      description: 'Updates the configuration settings for a specific ledger using
        schema-aware deep merge. Only known settings fields are allowed - unknown
        fields return error 0147 (ErrUnknownSettingsField). Type validation is enforced
        - incorrect types return error 0148 (ErrInvalidSettingsFieldType). Nested
        objects (like ''accounting'') are deep-merged, preserving existing properties
        not specified in the update. Example: updating only ''accounting.validateRoutes''
        preserves the existing ''accounting.validateAccountType'' value. Allowed fields:
        accounting.validateAccountType (boolean), accounting.validateRoutes (boolean).'
      parameters:
      - description: 'Authorization Bearer Token with format: Bearer {token}'
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      - description: Organization ID in UUID format
        in: path
        name: organization_id
        required: true
        schema:
          type: string
      - description: Ledger ID in UUID format
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
        description: 'Settings to merge with existing settings. Only known fields
          allowed: accounting.validateAccountType (bool), accounting.validateRoutes
          (bool)'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mmodel.LedgerSettings'
          description: Successfully updated ledger settings
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid request body, unknown field (0147), or invalid field
            type (0148)
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Unauthorized access
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Forbidden access
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Ledger not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error
      summary: Update ledger settings
      tags:
      - Ledgers
      x-codegen-request-body-name: settings
  /v1/organizations/{organization_id}/ledgers/{ledger_id}/account-types:
    get:
      description: Returns a paginated list of all account types for the specified
        organization and ledger, optionally filtered by metadata
      parameters:
      - description: 'Authorization Bearer Token with format: Bearer {token}'
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      - description: Request ID for tracing
        in: header
        name: X-Request-Id
        schema:
          type: string
      - description: Organization ID in UUID format
        in: path
        name: organization_id
        required: true
        schema:
          type: string
      - description: Ledger ID in UUID format
        in: path
        name: ledger_id
        required: true
        schema:
          type: string
      - description: JSON string to filter account types by metadata fields
        in: query
        name: metadata
        schema:
          type: string
      - description: 'Limit of account types per page (default: 10, max: 100)'
        in: query
