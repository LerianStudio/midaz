  /v1/organizations/{organization_id}/holders:
    get:
      description: "List all Holders. CRM listing endpoints support pagination using\
        \ the page, limit, and sort parameters. The sort parameter orders results\
        \ by the entity ID using the UUID v7 standard, which is time-sortable, ensuring\
        \ chronological ordering of the results."
      parameters:
      - description: The unique identifier of the Organization.
        in: path
        name: organization_id
        required: true
        schema:
          type: string
      - description: Metadata
        in: query
        name: metadata
        schema:
          type: string
      - description: Limit
        in: query
        name: limit
        schema:
          default: 10
          type: integer
      - description: Page
        in: query
        name: page
        schema:
          default: 1
          type: integer
      - description: Sort Order
        in: query
        name: sort_order
        schema:
          enum:
          - asc
          - desc
          type: string
      - description: Return includes logically deleted holders.
        in: query
        name: include_deleted
        schema:
          type: string
      - description: Filter holders by externalID
        in: query
        name: external_id
        schema:
          type: string
      - description: Filter holders by document
        in: query
        name: document
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_v1_organizations__organization_id__holders_get_200_response'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: List Holders
      tags:
      - Holders
    post:
      description: Creates a new holder with the provided details.
      parameters:
      - description: The unique identifier of the Organization.
        in: path
        name: organization_id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHolderRequest'
        description: Holder Input
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HolderResponse'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal Server Error
      security:
