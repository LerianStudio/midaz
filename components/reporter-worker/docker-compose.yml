services:
  reporter-worker:
    container_name: midaz-reporter-worker
    restart: always
    build:
      context: ../../
      dockerfile: ./components/reporter-worker/Dockerfile
    env_file:
      - .env
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${HEALTH_PORT}/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    networks:
      - infra-network
      - reporter-network
    # Phase-8 TODO (P8): the worker renders PDFs to S3-compatible object storage.
    # The SeaweedFS S3 service (chrislusf/seaweedfs:4.05) and KEDA autoscaling
    # (ghcr.io/kedacore/keda:2.16.0) are reporter-only net-new infra owned by
    # Phase 8 — their SERVICE definitions are NOT added to midaz's infra compose
    # in P6. The SeaweedFS config is already staged at components/infra/seaweedfs/
    # {s3.json,init-bucket.sh}; OBJECT_STORAGE_ENDPOINT in .env points at the
    # future seaweedfs service on infra-network. Until P8 brings it up, configure
    # OBJECT_STORAGE_* at any S3-compatible endpoint reachable on infra-network.

networks:
  infra-network:
    name: infra-network
    driver: bridge
    external: true
  reporter-network:
    name: reporter-network
    driver: bridge
