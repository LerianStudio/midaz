services:
  reporter-worker:
    container_name: midaz-reporter-worker
    restart: always
    build:
      context: ../../
      dockerfile: ./components/reporter-worker/Dockerfile
    env_file:
      - .env
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${HEALTH_PORT}/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    # The worker renders PDFs to the SeaweedFS S3 store (midaz-seaweedfs) on
    # infra-network — OBJECT_STORAGE_ENDPOINT in .env targets it. KEDA autoscaling
    # is staged under the infra compose's `keda` profile (Kubernetes-only).
    networks:
      - infra-network

networks:
  infra-network:
    name: infra-network
    driver: bridge
    external: true
