services:
  tracer:
    image: tracer:${VERSION:-dev}
    container_name: tracer
    restart: always
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    volumes:
      - .:/usr/src/app
    depends_on:
      tracer-postgres:
        condition: service_healthy
    # Note: healthcheck uses wget which is included in Alpine base image
    # Production (Kubernetes) uses liveness/readiness probes instead.
    # The path is /readyz (canonical Lerian readiness probe — not /health,
    # which only verifies the process is alive). start_period matches
    # Dockerfile.dev to give the self-probe time to complete.
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:${SERVER_PORT}/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # stop_grace_period must exceed READYZ_DRAIN_GRACE_SECONDS (default 12s)
    # so `docker compose stop` does not SIGKILL during the drain window.
    stop_grace_period: 25s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - tracer-network

  tracer-postgres:
    image: postgres:16-alpine
    container_name: tracer-postgres
    restart: always
    ports:
      - ${DB_PORT}:5432
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - tracer-network

volumes:
  postgres-data:

networks:
  tracer-network:
    driver: bridge
