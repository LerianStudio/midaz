services:
  # One-shot migration gate. Builds the dedicated golang-migrate runner image
  # and applies the tracer schema (single DB), then exits.
  #
  # No depends_on is possible here: Postgres lives in components/infra
  # (a separate compose file) and cannot be referenced cross-compose. Postgres
  # readiness is guaranteed by the root `make up` flow, which runs infra +
  # wait-for-infra (blocks until midaz-postgres-primary is healthy) BEFORE
  # bringing up this component. The runner therefore needs no retry/wait loop.
  tracer-migrate:
    container_name: midaz-tracer-migrate
    build:
      context: ../../
      dockerfile: ./components/tracer/migrations-image/Dockerfile
    restart: "no"
    env_file:
      - .env
    networks:
      - infra-network

  tracer:
    container_name: midaz-tracer
    restart: always
    build:
      context: ../../
      dockerfile: ./components/tracer/Dockerfile.dev
    env_file:
      - .env
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    # Note: healthcheck uses wget which is included in the Alpine dev image.
    # Production (Kubernetes) uses liveness/readiness probes instead.
    # The path is /readyz (canonical Lerian readiness probe — not /health,
    # which only verifies the process is alive). start_period matches
    # Dockerfile.dev to give the self-probe time to complete.
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:${SERVER_PORT}/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # stop_grace_period must exceed READYZ_DRAIN_GRACE_SECONDS (default 12s)
    # so `docker compose stop` does not SIGKILL during the drain window.
    stop_grace_period: 25s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - infra-network
    # Intra-compose gate: the app boots only after migrations run to completion
    # (the in-process startup migration was removed in Epic 2.2).
    depends_on:
      tracer-migrate:
        condition: service_completed_successfully

networks:
  infra-network:
    name: infra-network
    driver: bridge
    external: true
