            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List transaction validation records
      tags:
      - validations
    post:
      consumes:
      - application/json
      description: Validates a transaction against configured rules and limits.
      operationId: validateTransaction
      parameters:
      - description: Validation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_LerianStudio_midaz_v3_components_tracer_pkg_model.ValidationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Duplicate request (idempotent)
          schema:
            $ref: '#/definitions/github_com_LerianStudio_midaz_v3_components_tracer_pkg_model.ValidationResponse'
        "201":
          description: New validation created
          schema:
            $ref: '#/definitions/github_com_LerianStudio_midaz_v3_components_tracer_pkg_model.ValidationResponse'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "413":
          description: Payload too large (exceeds 100KB)
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "503":
          description: Service unavailable
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "504":
          description: Gateway timeout
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Validate a transaction
      tags:
      - validations
