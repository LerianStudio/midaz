host: localhost:4020
info:
  contact: {}
  description: Transaction validation service with rules and limits
  termsOfService: http://swagger.io/terms/
  title: Tracer API
  version: 0.1.0
paths:
  /health:
    get:
      consumes:
      - text/plain
      description: Returns 503 until startup self-probe completes; 200 "healthy" thereafter.
      operationId: getHealth
      produces:
      - text/plain
      responses:
        "200":
          description: healthy
          schema:
            type: string
        "503":
          description: self-probe has not completed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check (liveness probe)
      tags:
      - health
  /readyz:
    get:
      consumes:
      - application/json
      description: Live dependency probes — never cached. Returns 200 only when every
        check is up/skipped/n/a; any down or degraded forces 503.
      operationId: getReadyz
      produces:
      - application/json
      responses:
        "200":
          description: Service is ready
          schema:
