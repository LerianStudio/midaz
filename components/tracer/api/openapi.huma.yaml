components:
  schemas:
    AccountContext:
      additionalProperties: false
      properties:
        accountId:
          examples:
            - 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        metadata:
          additionalProperties: {}
          type: object
        status:
          examples:
            - active
          type: string
        type:
          examples:
            - checking
          type: string
      required:
        - accountId
        - type
        - status
      type: object
    Actor:
      additionalProperties: false
      properties:
        actorType:
          examples:
            - user
          type: string
        id:
          examples:
            - 00000000-0000-0000-0000-000000000000
          type: string
        ipAddress:
          examples:
            - 203.0.113.42
          type: string
        name:
          examples:
            - Jane Doe
          type: string
        role:
          examples:
            - admin
          type: string
      required:
        - actorType
        - id
        - name
        - ipAddress
      type: object
    AuditEvent:
      additionalProperties: false
      properties:
        action:
          examples:
            - VALIDATE
          type: string
        actor:
          $ref: "#/components/schemas/Actor"
        context:
          additionalProperties: {}
          type: object
        createdAt:
          examples:
            - "2021-01-01T00:00:00Z"
          format: date-time
          type: string
        eventId:
          examples:
            - 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        eventType:
          examples:
            - TRANSACTION_VALIDATED
          type: string
        hash:
          examples:
            - a3f1e2b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2
          type: string
        metadata:
          additionalProperties: {}
          type: object
        previousHash:
          examples:
            - b4e2f3a5c6d7e8f9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3
          type: string
        resourceId:
          examples:
            - 00000000-0000-0000-0000-000000000000
          type: string
        resourceType:
          examples:
            - transaction
          type: string
        result:
          examples:
            - ALLOW
          type: string
      required:
        - eventId
        - eventType
        - createdAt
        - action
        - result
        - resourceId
        - resourceType
        - actor
      type: object
    Error:
      additionalProperties: false
      properties:
        code:
          description: "Stable, machine-readable domain error code scoped to the emitting service (format: <SERVICE>-NNNN)."
          examples:
            - ERR-0001
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    HashChainVerificationResult:
      additionalProperties: false
      properties:
        firstInvalidId:
          examples:
            - 42
          format: int64
          type: integer
        isValid:
          examples:
            - true
          type: boolean
        message:
          examples:
            - hash chain intact
          type: string
        totalChecked:
          examples:
            - 1000
          format: int64
          type: integer
      required:
        - isValid
        - totalChecked
        - message
      type: object
    Limit:
      additionalProperties: false
      properties:
        activeTimeEnd:
          examples:
            - "17:00"
          type: string
        activeTimeStart:
          examples:
            - "09:00"
          type: string
        createdAt:
          examples:
            - "2021-01-01T00:00:00Z"
          format: date-time
          type: string
        currency:
          examples:
            - USD
          type: string
        customEndDate:
          examples:
            - "2021-12-31T23:59:59Z"
          format: date-time
          type: string
        customStartDate:
          examples:
            - "2021-01-01T00:00:00Z"
          format: date-time
          type: string
        deletedAt:
          examples:
            - "2021-01-01T00:00:00Z"
          format: date-time
          type: string
        description:
          examples:
            - Caps daily USD outflows for retail accounts
          type: string
        limitId:
          examples:
            - 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        limitType:
          examples:
            - DAILY
          type: string
        maxAmount:
          examples:
            - "1000.00"
          type: string
        name:
          examples:
            - Daily USD spending cap
          maxLength: 255
          type: string
        resetAt:
          examples:
            - "2021-01-02T00:00:00Z"
          format: date-time
          type: string
        scopes:
          items:
            $ref: "#/components/schemas/Scope"
          type:
            - array
            - "null"
        status:
          examples:
            - ACTIVE
          type: string
        updatedAt:
          examples:
            - "2021-01-01T00:00:00Z"
          format: date-time
          type: string
      required:
        - limitId
        - name
        - limitType
        - maxAmount
        - currency
        - scopes
        - status
        - createdAt
        - updatedAt
      type: object
    LimitUsageDetail:
      additionalProperties: false
      properties:
        attemptedAmount:
          examples:
            - "100.00"
          type: string
        currentUsage:
          examples:
            - "500.00"
          type: string
        exceeded:
          type: boolean
        limitAmount:
          examples:
            - "1000.00"
          type: string
        limitId:
          examples:
            - 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        period:
          examples:
            - DAILY
          type: string
        scope:
          examples:
            - account:00000000-0000-0000-0000-000000000000
          type: string
        skipReason:
          examples:
            - outside_time_window
          type: string
        skipped:
          type: boolean
      required:
        - limitId
        - limitAmount
        - scope
        - period
        - currentUsage
        - attemptedAmount
        - exceeded
      type: object
    ListAuditEventsResponse:
      additionalProperties: false
      properties:
        auditEvents:
          items:
            $ref: "#/components/schemas/AuditEvent"
          maxItems: 1000
          type:
            - array
            - "null"
        hasMore:
          examples:
            - true
          type: boolean
        nextCursor:
          examples:
            - eyJpZCI6IjAxOTI4In0=
          type: string
      required:
        - auditEvents
        - hasMore
      type: object
    ListLimitsResponse:
      additionalProperties: false
      properties:
        hasMore:
          examples:
            - true
          type: boolean
        limits:
          items:
            $ref: "#/components/schemas/Limit"
          type:
            - array
            - "null"
        nextCursor:
          examples:
            - eyJpZCI6IjAxOTI4In0=
          type: string
      required:
        - limits
        - hasMore
      type: object
    ListRulesResponse:
      additionalProperties: false
      properties:
        hasMore:
          examples:
            - true
          type: boolean
        nextCursor:
          examples:
            - eyJpZCI6IjAxOTI4In0=
          type: string
        rules:
          items:
            $ref: "#/components/schemas/Rule"
          type:
            - array
            - "null"
      required:
        - rules
        - hasMore
      type: object
    ListTransactionValidationsResponse:
      additionalProperties: false
      properties:
        hasMore:
          examples:
            - true
          type: boolean
        nextCursor:
          examples:
            - eyJpZCI6IjAxOTI4In0=
          type: string
        transactionValidations:
          items:
            $ref: "#/components/schemas/ValidationSummary"
          type:
            - array
            - "null"
      required:
        - transactionValidations
        - hasMore
      type: object
    MerchantContext:
      additionalProperties: false
      properties:
        category:
          examples:
            - "5411"
          type: string
        country:
          examples:
            - US
          type: string
        merchantId:
          examples:
            - 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        metadata:
          additionalProperties: {}
          type: object
        name:
          examples:
            - Acme Store
          type: string
      required:
        - merchantId
        - name
        - category
        - country
      type: object
    PortfolioContext:
      additionalProperties: false
      properties:
        metadata:
          additionalProperties: {}
          type: object
        name:
          examples:
            - growth
          type: string
        portfolioId:
          examples:
            - 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
      required:
        - portfolioId
      type: object
    ReservationActionResponse:
      additionalProperties: false
      properties:
        reservationId:
          format: uuid
          type: string
        status:
          examples:
            - CONFIRMED
          type: string
      required:
        - reservationId
        - status
      type: object
    ReserveResponse:
      additionalProperties: false
      properties:
        denied:
          examples:
            - false
          type: boolean
        reservationIds:
          items:
            format: uuid
            type: string
          type:
            - array
            - "null"
        transactionId:
          format: uuid
          type: string
      required:
        - transactionId
        - denied
        - reservationIds
      type: object
    Rule:
      additionalProperties: false
      properties:
        action:
          examples:
            - DENY
          type: string
        activatedAt:
          examples:
            - "2021-01-01T00:00:00Z"
          format: date-time
