          type: string
        requestId:
          examples:
            - 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        segment:
          $ref: "#/components/schemas/SegmentContext"
        subType:
          examples:
            - purchase
          maxLength: 50
          type: string
        totalRulesLoaded:
          examples:
            - 42
          format: int64
          type: integer
        transactionTimestamp:
          examples:
            - "2021-01-01T00:00:00Z"
          format: date-time
          type: string
        transactionType:
          examples:
            - CARD
          type: string
        truncated:
          examples:
            - false
          type: boolean
        validationId:
          examples:
            - 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
      required:
