    BearerAuth:
      bearerFormat: JWT
      description: JWT bearer token issued by the identity provider.
      scheme: bearer
      type: http
info:
  title: Midaz Tracer API
  version: test
openapi: 3.1.0
paths:
  /audit-events:
    get:
      operationId: listAuditEvents
      parameters:
        - description: Start date (RFC3339 format)
          explode: false
          in: query
          name: start_date
          schema:
            description: Start date (RFC3339 format)
            type: string
        - description: End date (RFC3339 format)
          explode: false
          in: query
          name: end_date
          schema:
            description: End date (RFC3339 format)
            type: string
        - description: Filter by event type (TRANSACTION_VALIDATED, RULE_*, LIMIT_*)
          explode: false
          in: query
          name: event_type
          schema:
            description: Filter by event type (TRANSACTION_VALIDATED, RULE_*, LIMIT_*)
            type: string
        - description: Filter by action (VALIDATE, CREATE, UPDATE, DELETE, ACTIVATE, DEACTIVATE, DRAFT)
          explode: false
          in: query
          name: action
          schema:
            description: Filter by action (VALIDATE, CREATE, UPDATE, DELETE, ACTIVATE, DEACTIVATE, DRAFT)
            type: string
        - description: Filter by result (SUCCESS, FAILED, ALLOW, DENY, REVIEW)
          explode: false
          in: query
          name: result
          schema:
            description: Filter by result (SUCCESS, FAILED, ALLOW, DENY, REVIEW)
            type: string
        - description: Filter by resource type (transaction, rule, limit)
          explode: false
          in: query
          name: resource_type
          schema:
            description: Filter by resource type (transaction, rule, limit)
            type: string
        - description: Filter by resource ID (UUID)
          explode: false
          in: query
          name: resource_id
          schema:
            description: Filter by resource ID (UUID)
            type: string
        - description: Filter by actor type (user, system)
          explode: false
          in: query
          name: actor_type
          schema:
            description: Filter by actor type (user, system)
            type: string
        - description: Filter by actor ID
          explode: false
          in: query
          name: actor_id
          schema:
            description: Filter by actor ID
            type: string
        - description: Filter by account ID (UUID)
          explode: false
          in: query
          name: account_id
          schema:
            description: Filter by account ID (UUID)
            type: string
        - description: Filter by segment ID (UUID)
          explode: false
          in: query
          name: segment_id
          schema:
            description: Filter by segment ID (UUID)
            type: string
        - description: Filter by portfolio ID (UUID)
          explode: false
          in: query
          name: portfolio_id
          schema:
            description: Filter by portfolio ID (UUID)
            type: string
        - description: Filter by transaction type (CARD, WIRE, PIX, CRYPTO)
          explode: false
          in: query
          name: transaction_type
          schema:
            description: Filter by transaction type (CARD, WIRE, PIX, CRYPTO)
            type: string
        - description: Filter by matched rule ID (UUID)
          explode: false
          in: query
          name: matched_rule_id
          schema:
            description: Filter by matched rule ID (UUID)
            type: string
        - description: "Max items per page (1-1000, default: 100)"
          explode: false
          in: query
          name: limit
          schema:
            description: "Max items per page (1-1000, default: 100)"
            type: string
        - description: Pagination token (empty for first page)
          explode: false
          in: query
          name: cursor
          schema:
            description: Pagination token (empty for first page)
            type: string
        - description: Sort field (created_at, event_type)
          explode: false
          in: query
          name: sort_by
          schema:
            description: Sort field (created_at, event_type)
            type: string
        - description: Sort direction (ASC, DESC)
          explode: false
          in: query
          name: sort_order
          schema:
            description: Sort direction (ASC, DESC)
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAuditEventsResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      summary: List audit events
      tags:
        - Audit
  /audit-events/{id}:
    get:
      operationId: getAuditEvent
      parameters:
        - description: Audit event ID (UUID)
          in: path
          name: id
          required: true
          schema:
            description: Audit event ID (UUID)
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEvent"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      summary: Get an audit event by ID
      tags:
        - Audit
  /audit-events/{id}/verify:
    get:
      operationId: verifyAuditEvent
      parameters:
        - description: Audit event ID (UUID)
          in: path
          name: id
          required: true
          schema:
            description: Audit event ID (UUID)
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HashChainVerificationResult"
          description: OK
        default:
          content:
