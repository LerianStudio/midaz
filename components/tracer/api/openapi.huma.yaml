            - transaction.amount > 1000 && account.type == 'checking'
          type: string
        name:
          examples:
            - Block high-value checking transactions
          maxLength: 255
          type: string
        ruleId:
          examples:
            - 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        scopes:
          items:
            $ref: "#/components/schemas/Scope"
          type:
            - array
            - "null"
        status:
          examples:
            - ACTIVE
          type: string
        updatedAt:
          examples:
            - "2021-01-01T00:00:00Z"
          format: date-time
          type: string
      required:
        - ruleId
        - name
        - expression
        - action
        - scopes
        - status
        - createdAt
        - updatedAt
      type: object
    Scope:
      additionalProperties: false
      properties:
        accountId:
          examples:
            - 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        merchantId:
          examples:
            - 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        portfolioId:
          examples:
            - 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        segmentId:
          examples:
            - 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        subType:
          examples:
            - purchase
          maxLength: 50
          type: string
        transactionType:
          examples:
            - CARD
          type: string
      type: object
    SegmentContext:
      additionalProperties: false
      properties:
        metadata:
          additionalProperties: {}
          type: object
        name:
          examples:
            - retail
          type: string
        segmentId:
          examples:
            - 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
      required:
        - segmentId
      type: object
    TransactionActionResponse:
      additionalProperties: false
      properties:
        flipped:
          examples:
            - 2
          format: int64
          type: integer
        status:
          examples:
            - CONFIRMED
          type: string
        transactionId:
          format: uuid
          type: string
      required:
        - transactionId
        - status
        - flipped
      type: object
    TransactionValidation:
      additionalProperties: false
      properties:
        account:
          $ref: "#/components/schemas/AccountContext"
        amount:
          examples:
            - "100.00"
          type: string
        createdAt:
          examples:
            - "2021-01-01T00:00:00Z"
          format: date-time
          type: string
        currency:
          examples:
            - USD
          type: string
        decision:
          examples:
            - ALLOW
          type: string
        evaluatedRuleIds:
          items:
            format: uuid
            type: string
          type:
            - array
            - "null"
        limitUsageDetails:
          items:
            $ref: "#/components/schemas/LimitUsageDetail"
          type:
            - array
            - "null"
        matchedRuleIds:
          items:
            format: uuid
            type: string
          type:
            - array
            - "null"
        merchant:
          $ref: "#/components/schemas/MerchantContext"
        metadata:
          additionalProperties: {}
          type: object
        portfolio:
          $ref: "#/components/schemas/PortfolioContext"
        processingTimeMs:
          examples:
            - 12.5
          format: double
          type: number
        reason:
          examples:
