    ValidationResponse:
      additionalProperties: false
      properties:
        decision:
          examples:
            - ALLOW
          type: string
        evaluatedAt:
          examples:
            - "2021-01-01T00:00:00Z"
          format: date-time
          type: string
        evaluatedRuleIds:
          items:
            format: uuid
            type: string
          type:
            - array
            - "null"
        limitUsageDetails:
          items:
            $ref: "#/components/schemas/LimitUsageDetail"
          type:
            - array
            - "null"
        matchedRuleIds:
          items:
            format: uuid
            type: string
          type:
            - array
            - "null"
        processingTimeMs:
          examples:
            - 12.5
          format: double
          type: number
        reason:
          examples:
            - Transaction denied by rule 'Block high-value checking transactions'
          type: string
        requestId:
          examples:
            - 00000000-0000-0000-0000-000000000000
          format: uuid
          type: string
        totalRulesLoaded:
          examples:
            - 42
          format: int64
          type: integer
        truncated:
          examples:
